// Comprimir imagen a base64
const compressImage=(file,maxSize=200)=>new Promise(resolve=>{
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const ratio=Math.min(maxSize/img.width,maxSize/img.height);
    canvas.width=img.width*ratio;
    canvas.height=img.height*ratio;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    URL.revokeObjectURL(url);
    resolve(canvas.toDataURL('image/jpeg',0.6));
  };
  img.src=url;
});

const formatTime=s=>{
  const abs=Math.abs(s);
  const m=Math.floor(abs/60).toString().padStart(2,'0');
  const sec=(abs%60).toString().padStart(2,'0');
  return `${s<0?'-':''}${m}:${sec}`;
};

/* ════════════════════════ TIMER ════════════════════════ */
function useTimer(startTime,duration){
  const[elapsed,setElapsed]=useState(0);
  useEffect(()=>{
    if(!startTime) return;
    const iv=setInterval(()=>{
      setElapsed(Math.floor((Date.now()-startTime)/1000));
    },1000);
    return()=>clearInterval(iv);
  },[startTime]);
  const remaining=duration-elapsed;
  return{elapsed,remaining,over:remaining<=0};
}

function TimerDisplay({remaining,color='#ffd000',large=false}){
  const abs=Math.abs(remaining);
  const over=remaining<0;
  const s=large?72:36;
  const stroke=large?7:4;
  const r=(s-stroke)/2;
  const circ=2*Math.PI*r;
  const pct=over?0:Math.max(0,remaining/(PHASE_DURATIONS.confra||600));
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <div style={{position:'relative',width:s*2,height:s*2}}>
        <svg width={s*2} height={s*2} style={{transform:'rotate(-90deg)'}}>
          <circle cx={s} cy={s} r={r} fill="none"
            stroke="rgba(255,255,255,.08)" strokeWidth={stroke}/>
          <circle cx={s} cy={s} r={r} fill="none"
            stroke={over?'#ef4444':color} strokeWidth={stroke}
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
            strokeLinecap="round"
            style={{transition:'stroke-dashoffset 1s linear'}}/>
        </svg>
        <div style={{
          position:'absolute',inset:0,display:'flex',alignItems:'center',
          justifyContent:'center',flexDirection:'column',
        }}>
          <span style={{
            fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:large?28:14,color:over?'#ef4444':color,letterSpacing:'-.02em',
            animation:over?'timerTick 1s infinite':undefined,
          }}>
            {over?'-':''}{formatTime(abs)}
          </span>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════ ROOM CANVAS ════════════════════════ */
function RoomCanvas({users,myId,session,selectedChar,onSelectChar,onMoveTo,roomRef,full,reactions,moveTarget}){
  const entries=Object.entries(users);
  const phase=session?.phase||'waiting';

  const handleRoomClick=useCallback(e=>{
    if(full||!selectedChar) return;
    const rect=roomRef.current?.getBoundingClientRect();
    if(!rect) return;
    const cx=e.touches?.[0]?.clientX??e.clientX;
    const cy=e.touches?.[0]?.clientY??e.clientY;
    const x=Math.max(3,Math.min(95,((cx-rect.left)/rect.width)*100));
    const y=Math.max(14,Math.min(92,((cy-rect.top)/rect.height)*100));
    onMoveTo(x,y);
  },[full,selectedChar,onMoveTo,roomRef]);

  const zoneStyle=(key)=>{
    const z=ZONES[key];
    const isActive=phase===key;
    return{
      position:'absolute',
      left:`${z.x1}%`,top:`${z.y1}%`,
      width:`${z.x2-z.x1}%`,height:`${z.y2-z.y1}%`,
      background:isActive?`${z.bg.replace('.1','.18')}`:`${z.bg}`,
      border:`1.5px solid ${isActive?z.color+'88':z.color+'33'}`,
      borderRadius:12,
      display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'flex-start',
      paddingTop:8,
      transition:'all .3s',
      boxShadow:isActive?`0 0 18px ${z.color}22`:undefined,
    };
  };

  return(
    <div
      ref={roomRef}
      onClick={handleRoomClick}
      style={{
        width:'100%',height:'100%',position:'relative',overflow:'hidden',
        background:'var(--navy)',userSelect:'none',
        cursor:selectedChar&&!full?'crosshair':'default',
        backgroundImage:`linear-gradient(rgba(255,208,0,.03) 1px,transparent 1px),
                         linear-gradient(90deg,rgba(255,208,0,.03) 1px,transparent 1px)`,
        backgroundSize:'44px 44px',
      }}>

      {/* Luces ambientales */}
      <div style={{position:'absolute',top:'8%',left:'4%',width:'30%',height:'30%',borderRadius:'50%',
        background:'radial-gradient(circle,rgba(245,158,11,.04),transparent 70%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:'12%',right:'4%',width:'28%',height:'28%',borderRadius:'50%',
        background:'radial-gradient(circle,rgba(139,92,246,.04),transparent 70%)',pointerEvents:'none'}}/>

      {/* Tres zonas */}
      {['confra','repaso','juegos'].map(key=>{
        const z=ZONES[key];
        const count=entries.filter(([,u])=>u.zone===key).length;
        return(
          <div key={key} style={zoneStyle(key)}>
            <div style={{
              fontSize:full?13:8,fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
              color:z.color,textTransform:'uppercase',letterSpacing:'.06em',
              textShadow:`0 0 10px ${z.color}55`,
              display:'flex',alignItems:'center',gap:4,
            }}>
              <span>{z.icon}</span>
              <span style={{maxWidth:'90%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {full?z.label:z.label.split(' ')[0]}
              </span>
            </div>
            {count>0&&(
              <div style={{fontSize:9,color:`${z.color}88`,marginTop:2,
                fontFamily:'Barlow Condensed,sans-serif'}}>
                {count} {count===1?'joven':'jóvenes'}
              </div>
            )}
          </div>
        );
      })}

      {/* Hint de movimiento */}
      {!full&&selectedChar&&(
        <div style={{position:'absolute',bottom:0,left:0,right:0,
          background:'linear-gradient(transparent,rgba(7,9,31,.9))',
          padding:'8px 0 6px',display:'flex',alignItems:'center',justifyContent:'center',
          pointerEvents:'none',zIndex:15}}>
          <div style={{background:'rgba(255,208,0,.12)',border:'1px solid rgba(255,208,0,.3)',
            borderRadius:20,padding:'5px 16px',fontFamily:'Barlow Condensed,sans-serif',
            fontWeight:700,fontSize:11,color:'#ffd000',letterSpacing:'.05em',textTransform:'uppercase'}}>
            ✦ Toca donde quieres ir
          </div>
        </div>
      )}
      {!full&&!selectedChar&&(
        <div style={{position:'absolute',bottom:4,left:0,right:0,textAlign:'center',
          fontSize:8,color:'var(--muted)',pointerEvents:'none',
          fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.05em',textTransform:'uppercase'}}>
          Toca tu personaje para moverte
        </div>
      )}

      {/* Ripple en destino */}
      {moveTarget&&(
        <div key={moveTarget.id} style={{
          position:'absolute',left:`${moveTarget.x}%`,top:`${moveTarget.y}%`,
          width:30,height:30,borderRadius:'50%',pointerEvents:'none',
          border:'2px solid #ffd000',zIndex:20,
          animation:'moveRipple .55s ease-out forwards',
        }}/>
      )}

      {/* Overlay proyección */}
      {full&&(<>
        <div style={{position:'absolute',top:16,left:'50%',transform:'translateX(-50%)',
          background:'rgba(7,9,31,.95)',border:'1px solid rgba(255,208,0,.25)',
          borderRadius:14,padding:'8px 22px',textAlign:'center',
          backdropFilter:'blur(10px)',zIndex:20}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:20,
            color:'#ffd000',letterSpacing:'.05em',textTransform:'uppercase'}}>MARANATA CLASS</div>
          <div style={{fontSize:10,color:'var(--muted)'}}>
            {new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'})}
          </div>
        </div>
        <div style={{position:'absolute',bottom:18,left:'50%',transform:'translateX(-50%)',
          background:'rgba(7,9,31,.95)',border:'1px solid rgba(255,208,0,.2)',
          borderRadius:20,padding:'6px 18px',display:'flex',alignItems:'center',gap:8,zIndex:20}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:'#ffd000',
            animation:'pulse 1.5s infinite'}}/>
          <span style={{color:'#ffd000',fontSize:12,fontFamily:'Barlow Condensed',fontWeight:700}}>
            {entries.length} JÓVENES EN SALA
          </span>
        </div>
      </>)}

      {/* Personajes */}
      {entries.map(([uid,u])=>{
        const myReactions=reactions?.[uid]||{};
        const reactionCounts=REACTIONS.map(r=>({
          ...r,count:Object.values(myReactions).filter(v=>v===r.id).length
        })).filter(r=>r.count>0);
        const isMine=uid===myId;
        const isCharSelected=isMine&&selectedChar;
        return(
          <div key={uid}
            onClick={isMine&&!full?(e)=>{e.stopPropagation();onSelectChar();}:undefined}
            style={{
              position:'absolute',left:`${u.x??50}%`,top:`${u.y??50}%`,
              transform:'translate(-50%,-50%)',
              transition:`left .55s cubic-bezier(0.23,1,0.32,1), top .55s cubic-bezier(0.23,1,0.32,1)`,
              display:'flex',flexDirection:'column',alignItems:'center',
              cursor:isMine&&!full?'grab':'default',
              zIndex:isMine?10:5,
              animation:uid===myId?'pop .45s ease':'none',
              pointerEvents:full?'none':'auto',
            }}>
            {reactionCounts.length>0&&(
              <div style={{display:'flex',gap:2,marginBottom:2}}>
                {reactionCounts.map(r=>(
                  <div key={r.id} style={{
                    background:'rgba(7,9,31,.85)',borderRadius:20,
                    padding:'1px 5px',fontSize:full?13:9,
                    display:'flex',alignItems:'center',gap:2,
                    border:'1px solid rgba(255,255,255,.1)',
                  }}>
                    <span>{r.e}</span>
                    <span style={{fontSize:full?10:7,color:'#ffd000',
                      fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>
                      {r.count>1?r.count:''}
                    </span>
                  </div>
                ))}
              </div>
            )}
            <AvatarBubble profile={u} size={full?58:42} glow={uid===myId} isMe={uid===myId}/>
            <div style={{
              marginTop:-2,fontSize:full?11:8,color:'white',
              background:'rgba(7,9,31,.92)',padding:'2px 8px',borderRadius:20,
              maxWidth:full?90:64,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
              fontFamily:'Barlow,sans-serif',fontWeight:600,
              border:`1px solid ${u.color||'#ffd000'}33`,
            }}>
              {uid===myId?'⭐ '+u.name:u.name}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ════════════════════════ CONFRA: SPEAKER PANEL ════════════════════════ */
function ConfraSpeakerPanel({session,users,myId,isAdmin,onNext,onEnd,onReact,myReaction}){
  const confra=session?.confra;
  if(!confra?.active) return null;
  const queue=confra.queue||[];
  const idx=confra.currentIdx||0;
  const speakerUid=queue[idx];
  const speaker=users[speakerUid];
  const isMe=speakerUid===myId;
  const remaining=queue.length-idx-1;

  if(!speaker) return null;

  const isLast=remaining===0;

  return(
    <div style={{
      position:'fixed',inset:0,zIndex:150,
      background:'rgba(7,9,31,.92)',backdropFilter:'blur(10px)',
      display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',padding:'20px 16px',gap:14,
      overflowY:'auto',
    }}>

      {/* Chip de estado */}
      <div style={{
        background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',
        borderRadius:20,padding:'5px 16px',
        fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
        fontSize:11,color:'#f59e0b',letterSpacing:'.1em',textTransform:'uppercase',
        display:'flex',alignItems:'center',gap:6,
      }}>
        <span style={{width:6,height:6,borderRadius:'50%',background:'#f59e0b',
          display:'inline-block',animation:'pulse 1.5s infinite'}}/>
        Confraternización · {idx+1} de {queue.length}
      </div>

      {/* Tarjeta del speaker */}
      <div style={{
        background:'linear-gradient(145deg,rgba(245,158,11,.08),rgba(7,9,31,.6))',
        border:`2px solid ${speaker.color||'#f59e0b'}55`,
        borderRadius:22,padding:'22px 20px',
        textAlign:'center',width:'100%',maxWidth:340,
        animation:'speakerPop .55s ease',
        boxShadow:`0 0 40px ${speaker.color||'#f59e0b'}18`,
      }}>
        {/* Personaje */}
        <div style={{display:'flex',justifyContent:'center',marginBottom:10}}>
          <AvatarBubble profile={speaker} size={90} glow={true}/>
        </div>

        {/* Nombre */}
        <div style={{
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:30,letterSpacing:'-.01em',
          color:speaker.color||'#ffd000',
          textShadow:`0 0 20px ${speaker.color||'#ffd000'}66`,
        }}>
          {isMe?'¡Es tu turno!':speaker.name}
        </div>
        {!isMe&&(
          <div style={{fontSize:12,color:'var(--muted)',marginTop:2,
            fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em'}}>
            está compartiendo
          </div>
        )}

        {/* Pregunta */}
        <div style={{
          marginTop:14,
          background:'rgba(255,255,255,.04)',
          border:'1px solid rgba(255,255,255,.08)',
          borderRadius:14,padding:'12px 14px',
          fontSize:14,color:'var(--white)',lineHeight:1.55,
          fontStyle:'italic',
        }}>
          🙏 {isMe
            ? '¿Quieres contarnos, pedir o agradecer algo?'
            : `¿Quieres contarnos, pedir o agradecer algo, ${speaker.name.split(' ')[0]}?`}
        </div>
      </div>

      {/* Reacciones — todos menos el speaker */}
      {!isMe&&(
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
          {REACTIONS.map(r=>(
            <button key={r.id} onClick={()=>onReact(r.id)} style={{
              background:myReaction===r.id?`${speaker.color||'#ffd000'}22`:'rgba(255,255,255,.05)',
              border:myReaction===r.id?`2px solid ${speaker.color||'#ffd000'}`:'2px solid rgba(255,255,255,.1)',
              borderRadius:50,width:50,height:50,fontSize:24,
              display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:myReaction===r.id?`0 0 14px ${speaker.color||'#ffd000'}55`:undefined,
              transition:'all .15s',
            }}>
              {r.e}
            </button>
          ))}
        </div>
      )}
      {!isMe&&!isAdmin&&(
        <div style={{fontSize:11,color:'var(--muted)',textAlign:'center'}}>
          Reacciona mientras escuchas 👆
        </div>
      )}

      {/* Progreso — puntitos */}
      <div style={{display:'flex',gap:7,alignItems:'center'}}>
        {queue.map((_,i)=>(
          <div key={i} style={{
            width:i===idx?22:8,height:8,borderRadius:4,
            background:i<idx?'#10b981':i===idx?speaker.color||'#ffd000':'rgba(255,255,255,.12)',
            transition:'all .35s cubic-bezier(0.23,1,0.32,1)',
          }}/>
        ))}
      </div>

      {/* Botón del speaker: terminar turno */}
      {isMe&&(
        <button onClick={isLast?onEnd:onNext} style={{
          background:`linear-gradient(135deg,${speaker.color||'#ffd000'},${speaker.color||'#ffd000'}bb)`,
          border:'none',borderRadius:14,padding:'14px 32px',
          color:'#07091f',fontWeight:900,fontSize:16,
          fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.05em',textTransform:'uppercase',
          boxShadow:`0 0 28px ${speaker.color||'#ffd000'}44`,
          marginTop:4,
        }}>
          {isLast?'Listo, todos compartieron ✨':'Terminé → Siguiente'}
        </button>
      )}

      {/* Botones del admin */}
      {isAdmin&&(
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
          {!isLast&&(
            <button onClick={onNext} style={{
              background:'rgba(245,158,11,.12)',border:'1px solid rgba(245,158,11,.35)',
              borderRadius:12,padding:'10px 20px',
              color:'#f59e0b',fontWeight:800,fontSize:12,
              fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',textTransform:'uppercase',
            }}>⏭ Saltar</button>
          )}
          <button onClick={onEnd} style={{
            background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.3)',
            borderRadius:12,padding:'10px 20px',
            color:'#10b981',fontWeight:800,fontSize:12,
            fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',textTransform:'uppercase',
          }}>✓ Finalizar confra</button>
        </div>
      )}

      {/* Instrucción si no es speaker ni admin */}
      {!isMe&&!isAdmin&&(
        <div style={{
          background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',
          borderRadius:12,padding:'8px 16px',fontSize:11,color:'var(--muted)',
          textAlign:'center',maxWidth:280,lineHeight:1.5,
        }}>
          Cuando {speaker.name.split(' ')[0]} termine, tocará el botón para pasar al siguiente
        </div>
      )}
    </div>
  );
}

function RepasoChat({msgs,session,myId,users,onSend,onClose}){
  const repaso=session?.repaso;
  const{remaining}=useTimer(repaso?.startTime,PHASE_DURATIONS.repaso);
  const[text,setText]=useState('');
  const[showEmojis,setShowEmojis]=useState(false);
  const[imgLoading,setImgLoading]=useState(false);
  const endRef=useRef(null);
  const inputRef=useRef(null);
  const fileRef=useRef(null);

  useEffect(()=>{
    setTimeout(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),60);
  },[msgs.length]);

  const send=(t,extra={})=>{
    if(!t&&!extra.imageData) return;
    onSend(t,extra);
    setText('');
    setShowEmojis(false);
    inputRef.current?.focus();
  };

  const handleImg=async(e)=>{
    const f=e.target.files[0]; if(!f) return;
    setImgLoading(true);
    e.target.value='';
    const b64=await compressImage(f,480);
    send('',{type:'image',imageData:b64});
    setImgLoading(false);
  };

  const isOver=remaining<=0;

  return(
    <div style={{position:'fixed',inset:0,zIndex:155,display:'flex',flexDirection:'column',

          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:17,color:'#3b82f6',textTransform:'uppercase',letterSpacing:'.05em',
            display:'flex',alignItems:'center',gap:7}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:'#3b82f6',
              display:'inline-block',animation:isOver?undefined:'pulse 1.5s infinite'}}/>
            📖 Repaso Bíblico
          </div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>
            {Object.values(users).filter(u=>u.zone==='repaso').length} en sala ·{' '}
            <span style={{color:isOver?'#ef4444':'#3b82f6',fontWeight:600}}>
              {isOver?'Tiempo extra':'Tiempo: '+formatTime(remaining)}

                  fontSize:13,color:'var(--white)',lineHeight:1.5,wordBreak:'break-word',

        background:'rgba(7,9,31,.98)',flexShrink:0}}>

        {/* Tag buttons */}
        <div style={{display:'flex',gap:5,marginBottom:8,overflowX:'auto',paddingBottom:2}}>
          {[
            {label:'❓ Pregunta',tag:'Pregunta',color:'#f59e0b'},
            {label:'💬 Comentario',tag:'Comentario',color:'#3b82f6'},
            {label:'📝 Reflexión',tag:'Reflexión',color:'#10b981'},
            {label:'🙏 Oración',tag:'Oración',color:'#8b5cf6'},
          ].map(t=>(
            <button key={t.tag}
              onClick={()=>text.trim()&&send(text,{tag:t.tag})}
              style={{
                background:`${t.color}14`,border:`1px solid ${t.color}44`,
                borderRadius:20,padding:'4px 10px',
                color:t.color,fontSize:10,fontWeight:700,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
                whiteSpace:'nowrap',flexShrink:0,
              }}>{t.label}</button>
          ))}
        </div>

        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {/* Imagen */}
          <button onClick={()=>fileRef.current?.click()}
            disabled={imgLoading}
            style={{width:38,height:38,flexShrink:0,borderRadius:'50%',
              background:'rgba(59,130,246,.1)',border:'1px solid rgba(59,130,246,.25)',
              color:'#3b82f6',fontSize:17,
              display:'flex',alignItems:'center',justifyContent:'center'}}>

            width:38,height:38,flexShrink:0,borderRadius:'50%',
            background:showEmojis?'rgba(59,130,246,.2)':'rgba(59,130,246,.1)',
            border:`1px solid rgba(59,130,246,${showEmojis?.4:.25})`,
            color:'#3b82f6',fontSize:18,
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            😊
          </button>

          {/* Text input */}
          <input
            ref={inputRef}
            value={text}
            onChange={e=>setText(e.target.value)}
            onKeyDown={e=>{
              if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(text);}
            }}
            placeholder="Escribe tu pregunta o comentario..."
            style={{flex:1,padding:'10px 14px',borderRadius:22,
              background:'rgba(255,255,255,.05)',border:'1px solid rgba(59,130,246,.2)',
              color:'var(--white)',fontSize:13,outline:'none',
              fontFamily:'Barlow,sans-serif'}}/>

          {/* Send */}
          <button onClick={()=>send(text)}
            disabled={!text.trim()}
            style={{width:38,height:38,flexShrink:0,borderRadius:'50%',
              background:text.trim()?'linear-gradient(135deg,#3b82f6,#1d4ed8)':'rgba(255,255,255,.05)',
              border:'none',color:'white',fontSize:17,fontWeight:900,
              display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:text.trim()?'0 0 14px rgba(59,130,246,.4)':undefined}}>
            ↑
          </button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════ NUBE DE PALABRAS ════════════════════════ */
const wordHash=w=>{let h=0;for(const c of w)h=(h*31+c.charCodeAt(0))|0;return Math.abs(h);};

function WordCloudActivity({wordcloud,myId,users,isAdmin,SID,onClose}){
  const[input,setInput]=useState('');
  const[sending,setSending]=useState(false);
  const inputRef=useRef(null);

  if(!wordcloud?.active) return null;

  const rawWords=wordcloud.words?Object.values(wordcloud.words):[];
  const myCount=rawWords.filter(w=>w.uid===myId).length;
  const MAX=5;

  // Frecuencias
  const freq={};
  rawWords.forEach(w=>{
    const key=w.word.toLowerCase().trim();
    if(!freq[key]) freq[key]={display:w.word,count:0,color:w.color||'#ffd000',uid:w.uid};
    freq[key].count++;
    freq[key].color=w.color||'#ffd000'; // último que envió
  });

  const sorted=Object.entries(freq).sort((a,b)=>b[1].count-a[1].count);
  const maxCount=sorted[0]?.[1].count||1;

  const getFontSize=count=>{
    if(maxCount===1) return 26;
    const ratio=(count-1)/(maxCount-1);
    return Math.round(17+ratio*55); // 17→72px
  };
  const getWeight=count=>count>=3?900:count>=2?800:600;
  const getRotation=key=>{
    const h=wordHash(key);
    const opts=[0,0,0,-12,12,-20,20,-8,8]; // mayoría horizontal
    return opts[h%opts.length];
  };
  const getGlow=(color,size)=>size>36?`0 0 ${size*.6}px ${color}55`:undefined;

  const handleSend=async()=>{
    const w=input.trim();
    if(!w||myCount>=MAX||sending) return;
    setSending(true);
    const clean=w.replace(/\s+/g,' ').split(' ').slice(0,3).join(' ');
    await db.ref(`sessions/${SID}/wordcloud/words`).push({
      word:clean,uid:myId,
      color:users[myId]?.color||'#ffd000',
      ts:Date.now(),
    });
    setInput('');
    setSending(false);
    setTimeout(()=>inputRef.current?.focus(),60);
  };

  const handleClear=async()=>{
    await db.ref(`sessions/${SID}/wordcloud/words`).remove();
  };
  const handleStop=async()=>{
    await db.ref(`sessions/${SID}/wordcloud`).update({active:false});
    if(onClose) onClose();
  };

  const canSend=myCount<MAX&&!sending;
  const remaining=MAX-myCount;

  return(
    <div style={{position:'fixed',inset:0,zIndex:175,display:'flex',flexDirection:'column',
      background:'radial-gradient(ellipse at 50% 40%,#0a0e2a,#07091f)',overflow:'hidden'}}>

      {/* Fondo: estrellas/partículas decorativas */}
      <div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden'}}>
        {[...Array(18)].map((_,i)=>(
          <div key={i} style={{
            position:'absolute',
            left:`${(wordHash('star'+i)%95)+2}%`,
            top:`${(wordHash('dot'+i)%88)+4}%`,
            width:wordHash('s'+i)%3+1,height:wordHash('s'+i)%3+1,
            borderRadius:'50%',background:'rgba(255,255,255,.15)',
          }}/>
        ))}
      </div>

      {/* Header */}
      <div style={{
        background:'rgba(7,9,31,.9)',borderBottom:'1px solid rgba(255,208,0,.15)',
        padding:'10px 14px',flexShrink:0,zIndex:2,
        display:'flex',alignItems:'center',gap:10,
      }}>
        <div style={{flex:1}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:18,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.07em',
            display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:20}}>☁️</span> Nube de Palabras
            {sorted.length>0&&(
              <span style={{background:'rgba(255,208,0,.12)',border:'1px solid rgba(255,208,0,.25)',
                borderRadius:20,padding:'2px 9px',fontSize:12,fontWeight:700,color:'#ffd000'}}>
                {rawWords.length} enviadas
              </span>
            )}
          </div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>
            {Object.keys(users).filter(u=>users[u].zone==='repaso').length} en sala · Repaso Bíblico
          </div>
        </div>
        {isAdmin&&(
          <div style={{display:'flex',gap:6}}>
            {sorted.length>0&&(
              <button onClick={handleClear} style={{
                background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',
                borderRadius:8,padding:'5px 10px',color:'var(--muted)',
                fontSize:10,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                textTransform:'uppercase',letterSpacing:'.04em'}}>
                🗑 Limpiar
              </button>
            )}
            <button onClick={handleStop} style={{
              background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.25)',
              borderRadius:8,padding:'5px 10px',color:'#f87171',
              fontSize:10,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              textTransform:'uppercase',letterSpacing:'.04em'}}>
              ⏹ Terminar
            </button>
          </div>
        )}
        {!isAdmin&&(
          <button onClick={onClose} style={{background:'rgba(255,255,255,.06)',
            border:'1px solid rgba(255,255,255,.1)',borderRadius:'50%',
            width:30,height:30,color:'var(--muted)',fontSize:14,
            display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        )}
      </div>

      {/* Nube */}
      <div style={{
        flex:1,position:'relative',display:'flex',
        flexWrap:'wrap',alignItems:'center',justifyContent:'center',
        alignContent:'center',
        padding:'16px 20px',gap:'6px 10px',
        overflowY:'auto',zIndex:1,
      }}>
        {sorted.length===0&&(
          <div style={{textAlign:'center',opacity:.35,pointerEvents:'none'}}>
            <div style={{fontSize:72,filter:'grayscale(1)'}}>☁️</div>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
              fontSize:16,color:'white',textTransform:'uppercase',letterSpacing:'.1em',marginTop:8}}>
              Esperando palabras...
            </div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>
              Los jóvenes escriben abajo 👇
            </div>
          </div>
        )}
        {sorted.map(([key,data],idx)=>{
          const sz=getFontSize(data.count);
          const rot=getRotation(key);
          const c=data.color;
          return(
            <span key={key} style={{
              display:'inline-block',
              fontSize:sz,
              fontFamily:'Barlow Condensed,sans-serif',
              fontWeight:getWeight(data.count),
              color:c,
              transform:`rotate(${rot}deg)`,
              textShadow:getGlow(c,sz),
              letterSpacing:'-.01em',
              lineHeight:1.1,
              padding:'2px 4px',
              cursor:'default',
              animation:`fadeUp ${.2+idx*.04}s ease both`,
              transition:'font-size .6s cubic-bezier(0.23,1,0.32,1), text-shadow .6s',
              userSelect:'none',
              opacity:.88+Math.min(data.count/maxCount,.12),
            }}>
              {data.display}
              {data.count>1&&sz>=32&&(
                <span style={{
                  fontSize:sz*.35,verticalAlign:'super',
                  opacity:.65,fontWeight:700,marginLeft:2,
                }}>
                  {data.count}×
                </span>
              )}
            </span>
          );
        })}
      </div>

      {/* Input */}
      <div style={{
        background:'rgba(7,9,31,.96)',borderTop:'1px solid rgba(255,208,0,.1)',
        padding:'10px 14px 18px',flexShrink:0,zIndex:2,
      }}>
        {canSend?(
          <>
            <div style={{fontSize:10,color:'var(--muted)',marginBottom:8,
              fontFamily:'Barlow Condensed,sans-serif',textTransform:'uppercase',letterSpacing:'.06em',
              display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span>Escribe una palabra o frase corta</span>
              <span style={{color:'#ffd000',fontWeight:700}}>{remaining} envío{remaining!==1?'s':''} restante{remaining!==1?'s':''}</span>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input
                ref={inputRef}
                value={input}
                onChange={e=>setInput(e.target.value.slice(0,40))}
                onKeyDown={e=>e.key==='Enter'&&handleSend()}
                placeholder="Ej: fe, gracia, esperanza..."
                autoComplete="off"
                style={{flex:1,padding:'11px 16px',borderRadius:24,
                  background:'rgba(255,255,255,.06)',
                  border:`1px solid ${canSend?'rgba(255,208,0,.25)':'rgba(255,255,255,.08)'}`,
                  color:'var(--white)',fontSize:15,outline:'none',
                  fontFamily:'Barlow,sans-serif',fontWeight:500}}/>
              <button onClick={handleSend} disabled={!input.trim()||sending} style={{
                width:46,height:46,flexShrink:0,borderRadius:'50%',border:'none',
                background:input.trim()&&!sending
                  ?'linear-gradient(135deg,#ffd000,#e6a800)':'rgba(255,255,255,.06)',
                color:input.trim()&&!sending?'#07091f':'var(--muted)',
                fontSize:20,fontWeight:900,
                display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:input.trim()&&!sending?'0 0 18px rgba(255,208,0,.5)':undefined,
                transition:'all .18s',
              }}>
                {sending?<Spinner size={18} color="#07091f"/>:'↑'}
              </button>
            </div>
            {/* Mini-indicador de mis palabras */}
            {myCount>0&&(
              <div style={{marginTop:8,display:'flex',gap:5,flexWrap:'wrap'}}>
                {rawWords.filter(w=>w.uid===myId).map((w,i)=>(
                  <span key={i} style={{
                    background:`${w.color||'#ffd000'}18`,
                    border:`1px solid ${w.color||'#ffd000'}33`,
                    borderRadius:20,padding:'2px 9px',
                    fontSize:11,color:w.color||'#ffd000',
                    fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                  }}>✓ {w.word}</span>
                ))}
              </div>
            )}
          </>
        ):(
          <div style={{textAlign:'center',padding:'10px 0'}}>
            <div style={{fontSize:13,color:'#10b981',fontFamily:'Barlow Condensed,sans-serif',
              fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase'}}>
              ✓ Enviaste todas tus palabras
            </div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>
              Observa la nube crecer en tiempo real 👆
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════ ADMIN PANEL ════════════════════════ */

    <>

        position:'fixed',bottom:20,right:20,zIndex:120,

        border:'none',fontSize:20,

          position:'fixed',bottom:78,right:16,zIndex:120,

        }}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:14,color:'#ffd000',textTransform:'uppercase',

            display:'flex',alignItems:'center',gap:8}}>

            <span style={{fontSize:11,color:phaseColor,

            </span>
          </div>

          {/* Conteos por zona */}

              <button onClick={()=>{onStartConfra(confraUsers);setOpen(false);}}
                disabled={confraUsers.length===0} style={{
                background:confraUsers.length?'linear-gradient(135deg,#f59e0b,#d97706)':'var(--muted2)',
                border:'none',borderRadius:10,padding:'10px',
                color:confraUsers.length?'#07091f':'var(--muted)',
                fontWeight:800,fontSize:12,fontFamily:'Barlow Condensed,sans-serif',
                letterSpacing:'.04em',textTransform:'uppercase',
              }}>
                🤝 Iniciar Confraternización ({confraUsers.length})
              </button>
              <button onClick={()=>{onStartRepaso();setOpen(false);}}
                disabled={repasoUsers.length===0} style={{

                color:repasoUsers.length?'white':'var(--muted)',

                border:'none',borderRadius:10,padding:'10px',
                color:'#07091f',fontWeight:800,fontSize:12,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',textTransform:'uppercase',

/* ════════════════════════ MODAL EDITAR PERFIL ════════════════════════ */
function EditProfileModal({profile,onSave,onClose}){
  const[name,  setName]  =useState(profile.name  ||'');
  const[avatar,setAvatar]=useState(profile.avatar||null);
  const[color, setColor] =useState(profile.color ||'#ffd000');
  const[photo, setPhoto] =useState(profile.photo ||null);
  const[saving,setSaving]=useState(false);
  const[err,   setErr]   =useState('');
  const fileRef=useRef();

  const handlePhoto=async(e)=>{
    const f=e.target.files[0];
    if(!f) return;
    setSaving(true);
    const base64=await compressImage(f,200);
    setPhoto(base64);
    setSaving(false);
  };

  const handleSave=async()=>{
    if(!name.trim()||saving) return;
    setSaving(true);
    try{ await onSave({name:name.trim(),avatar,color,photo}); }
    catch(e){ setErr('Error al guardar. Intenta de nuevo.'); setSaving(false); }
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,
      display:'flex',alignItems:'flex-end',justifyContent:'center',
      background:'rgba(0,0,0,.75)',backdropFilter:'blur(4px)'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:480,overflowY:'auto',maxHeight:'90vh',
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(255,208,0,.2)',
        borderRadius:'20px 20px 0 0',padding:'20px 20px 32px',
        animation:'modalIn .3s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,
          background:'rgba(255,208,0,.2)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <h3 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:20,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            Editar perfil
          </h3>
          <button onClick={onClose} style={{background:'none',border:'none',
            color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>

        {/* Foto de perfil */}
        <div style={{marginBottom:16,display:'flex',alignItems:'center',gap:14}}>
          <div style={{position:'relative',cursor:'pointer'}} onClick={()=>fileRef.current?.click()}>
            <AvatarBubble profile={{...profile,photo,avatar,color}} size={72}/>
            <div style={{
              position:'absolute',bottom:-2,right:-2,
              width:22,height:22,borderRadius:'50%',
              background:'#ffd000',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:12,color:'#07091f',fontWeight:800,
            }}>📷</div>

          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'var(--white)',marginBottom:6}}>Foto de perfil</div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>fileRef.current?.click()} style={{
                background:'rgba(255,208,0,.08)',border:'1px solid rgba(255,208,0,.2)',
                borderRadius:8,padding:'6px 10px',color:'#ffd000',fontSize:11,
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              }}>📁 Subir foto</button>
              {photo&&(
                <button onClick={()=>setPhoto(null)} style={{
                  background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',
                  borderRadius:8,padding:'6px 10px',color:'#f87171',fontSize:11,
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                }}>Quitar</button>
              )}
            </div>
            <input ref={fileRef} type="file" accept="image/*"
              onChange={handlePhoto} style={{display:'none'}}/>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>
              También puedes usar un avatar de abajo
            </div>
          </div>
        </div>

        {/* Nombre */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
            textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:6,

              color:'var(--white)',fontSize:14,fontFamily:'Barlow,sans-serif'}}/>
        </div>

        {/* Avatar */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
            textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:6,

            fontFamily:'Barlow Condensed,sans-serif'}}>Color de aura</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {COLORS.map(c=>(
              <div key={c} onClick={()=>setColor(c)} style={{
                width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                border:color===c?'3px solid white':'3px solid transparent',
                boxShadow:color===c?`0 0 14px ${c}`:'none',transition:'all .15s',
              }}/>

          background:'rgba(239,68,68,.08)',borderRadius:8,padding:'8px 12px'}}>⚠️ {err}</div>}

        <button onClick={handleSave} disabled={!name.trim()||saving} style={{

          background:!name.trim()||saving?'var(--muted2)':'linear-gradient(135deg,#ffd000,#e6a800)',
          color:!name.trim()||saving?'var(--muted)':'#07091f',
          fontSize:15,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
          letterSpacing:'.06em',textTransform:'uppercase',
          display:'flex',alignItems:'center',justifyContent:'center',gap:8,
        }}>
          {saving?<><Spinner size={18} color="#07091f"/>Guardando...</>:'Guardar cambios ✓'}
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════ MODAL ASISTENCIA ════════════════════════ */
function AttendanceModal({myAtt,gameHistory,onClose}){
  const[activeTab,setActiveTab]=useState('asistencia');
  const sessions=Object.entries(myAtt||{}).sort((a,b)=>b[0].localeCompare(a[0]));
  // Agrupar por mes
  const byMonth={};
  sessions.forEach(([sid])=>{
    const d=new Date(sid+'T12:00:00');
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!byMonth[key]) byMonth[key]=[];
    byMonth[key].push(sid);
  });

  const monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio',
    'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,
      display:'flex',alignItems:'flex-end',justifyContent:'center',
      background:'rgba(0,0,0,.75)',backdropFilter:'blur(4px)'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:480,maxHeight:'85vh',overflowY:'auto',
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(255,208,0,.2)',
        borderRadius:'20px 20px 0 0',padding:'20px 18px 32px',
        animation:'modalIn .3s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,
          background:'rgba(255,208,0,.2)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <h3 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:20,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            📊 Mi asistencia
          </h3>
          <button onClick={onClose} style={{background:'none',border:'none',
            color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>

        {/* Resumen */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:18}}>
          {[
            {label:'Total clases',  value:sessions.length,    color:'#ffd000'},
            {label:'Este año',      value:sessions.filter(([s])=>s.startsWith(new Date().getFullYear().toString())).length, color:'#10b981'},
            {label:'Último mes',    value:Object.values(byMonth)[0]?.length||0, color:'#22d3ee'},
          ].map(st=>(
            <div key={st.label} style={{
              background:'rgba(255,255,255,.03)',borderRadius:10,padding:'10px 8px',
              borderLeft:`3px solid ${st.color}`,textAlign:'center',
            }}>
              <div style={{fontSize:24,fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:900,color:st.color,lineHeight:1}}>{st.value}</div>
              <div style={{fontSize:9,color:'var(--muted)',marginTop:3,
                textTransform:'uppercase',letterSpacing:'.05em'}}>{st.label}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:'flex',background:'rgba(255,255,255,.04)',borderRadius:10,
          padding:3,marginBottom:16,border:'1px solid rgba(255,208,0,.08)'}}>
          {[{id:'asistencia',l:'📅 Asistencia'},{id:'juegos',l:'🏆 Juegos'}].map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{
              flex:1,padding:'7px 4px',borderRadius:8,border:'none',
              background:activeTab===t.id?'linear-gradient(135deg,#ffd000,#e6a800)':'transparent',
              color:activeTab===t.id?'#07091f':'var(--muted)',
              fontSize:12,fontWeight:700,fontFamily:'Barlow Condensed,sans-serif',
              letterSpacing:'.03em',textTransform:'uppercase',transition:'all .2s',
            }}>{t.l}</button>
          ))}
        </div>

        {activeTab==='asistencia'&&(<>
          {sessions.length===0&&(
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>
              Aún no tienes asistencias registradas
            </div>
          )}
          {Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([key,days])=>{
            const[year,month]=key.split('-');
            return(
              <div key={key} style={{marginBottom:14}}>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                  fontSize:13,color:'var(--muted)',textTransform:'uppercase',
                  letterSpacing:'.07em',marginBottom:8}}>
                  {monthNames[parseInt(month)-1]} {year}
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {days.map(sid=>(
                    <div key={sid} style={{background:'rgba(16,185,129,.08)',padding:'7px 10px',
                      borderRadius:10,textAlign:'center',border:'1px solid rgba(16,185,129,.2)'}}>
                      <div style={{fontSize:16,marginBottom:2}}>✅</div>
                      <div style={{fontSize:9,color:'#10b981',fontFamily:'Barlow Condensed,sans-serif'}}>
                        {new Date(sid+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </>)}

        {activeTab==='juegos'&&(()=>{
          const games=Object.entries(gameHistory||{})
            .map(([id,g])=>({id,...g}))
            .sort((a,b)=>b.date?.localeCompare(a.date||'')||0);
          const wins=games.filter(g=>g.rank===1).length;
          const top3=games.filter(g=>g.rank<=3).length;
          return(<>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
              {[
                {label:'Partidas',value:games.length,color:'#8b5cf6'},
                {label:'🥇 Ganadas',value:wins,color:'#ffd000'},
                {label:'🏅 Top 3',value:top3,color:'#f59e0b'},
              ].map(st=>(
                <div key={st.label} style={{background:'rgba(255,255,255,.03)',borderRadius:10,
                  padding:'10px 8px',borderLeft:`3px solid ${st.color}`,textAlign:'center'}}>
                  <div style={{fontSize:22,fontFamily:'Barlow Condensed,sans-serif',
                    fontWeight:900,color:st.color,lineHeight:1}}>{st.value}</div>
                  <div style={{fontSize:9,color:'var(--muted)',marginTop:3,
                    textTransform:'uppercase',letterSpacing:'.05em'}}>{st.label}</div>
                </div>
              ))}
            </div>
            {games.length===0&&(
              <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>
                Aún no has jugado ningún juego
              </div>
            )}
            {games.map(g=>(
              <div key={g.id} style={{display:'flex',alignItems:'center',gap:12,
                background:g.rank===1?'rgba(255,208,0,.07)':'rgba(255,255,255,.03)',
                border:g.rank===1?'1px solid rgba(255,208,0,.2)':'1px solid rgba(255,255,255,.05)',
                borderRadius:12,padding:'10px 14px',marginBottom:7}}>
                <div style={{fontSize:22,width:28,textAlign:'center'}}>
                  {g.rank===1?'🥇':g.rank===2?'🥈':g.rank===3?'🥉':`#${g.rank}`}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:'var(--muted)',
                    fontFamily:'Barlow Condensed,sans-serif',textTransform:'uppercase',
                    letterSpacing:'.05em'}}>
                    {g.date?new Date(g.date+'T12:00:00').toLocaleDateString('es-CL',
                      {day:'numeric',month:'short',year:'numeric'}):''}
                  </div>
                  <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>
                    {g.rank}° de {g.totalPlayers} jugadores
                  </div>
                </div>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                  fontSize:20,color:'#ffd000'}}>{g.score} pts</div>
              </div>
            ))}
          </>);
        })()}
      </div>
    </div>
  );
}

        }))

      setData(list);
      setLoading(false);

                  <AvatarBubble profile={u} size={40}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:'white'}}>{u.name}</div>

                    {l:'Clases',v:u.attCount,c:'#ffd000'},
                    {l:'Este año',v:u.attThisYear,c:'#10b981'},
                    {l:'🎮 Jugadas',v:u.gameCount,c:'#8b5cf6'},
                    {l:'🥇 Ganadas',v:u.gameWins,c:'#f59e0b'},

                      <div style={{fontSize:18,fontFamily:'Barlow Condensed,sans-serif',
                        fontWeight:900,color:st.c}}>{st.v}</div>
                      <div style={{fontSize:8,color:'var(--muted)',textTransform:'uppercase',
                        letterSpacing:'.04em'}}>{st.l}</div>

                  ))}

                <div style={{fontSize:10,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',
                  textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Asistencias</div>
                {Object.entries(byMonth).slice(0,3).map(([key,days])=>{
                  const[yr,mo]=key.split('-');
                  return(
                    <div key={key} style={{marginBottom:7}}>
                      <div style={{fontSize:9,color:'var(--muted)',marginBottom:3}}>
                        {monthNames[parseInt(mo)-1]} {yr}
                      </div>
                      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                        {days.map(sid=>(
                          <div key={sid} style={{background:'rgba(16,185,129,.1)',
                            border:'1px solid rgba(16,185,129,.2)',

                            ✅ {new Date(sid+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {filtered.map((u,i)=>(
            <div key={u.uid} onClick={()=>setSelected(u.uid===selected?null:u.uid)}
              style={{
                display:'flex',alignItems:'center',gap:10,
                background:selected===u.uid?'rgba(255,208,0,.07)':'rgba(255,255,255,.025)',
                border:selected===u.uid?'1px solid rgba(255,208,0,.2)':'1px solid rgba(255,255,255,.05)',
                borderRadius:12,padding:'10px 12px',marginBottom:6,cursor:'pointer',transition:'all .18s',
              }}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                fontSize:14,color:'var(--muted)',width:20,textAlign:'center'}}>{i+1}</div>
              <AvatarBubble profile={u} size={34}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:'white'}}>{u.name}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{u.isAdmin?'👑 Admin · ':''}{u.attCount} clases · {u.gameWins} 🥇</div>
              </div>
              <div style={{background:'rgba(255,208,0,.1)',borderRadius:8,
                padding:'2px 8px',fontSize:11,fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:700,color:'#ffd000'}}>{u.attCount}</div>
            </div>
          ))}
          {filtered.length===0&&<div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>Sin resultados</div>}
        </>)}

        {!loading&&tab==='rankings'&&(<>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
            fontSize:12,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:10}}>
            🏆 Ranking de Juegos
          </div>
          {gameRankings.filter(u=>u.gameCount>0).map((u,i)=>(
            <div key={u.uid} style={{display:'flex',alignItems:'center',gap:10,
              background:i===0?'rgba(255,208,0,.08)':'rgba(255,255,255,.025)',
              border:i===0?'1px solid rgba(255,208,0,.2)':'1px solid rgba(255,255,255,.05)',
              borderRadius:12,padding:'10px 12px',marginBottom:6}}>
              <div style={{fontSize:i<3?20:14,width:28,textAlign:'center'}}>
                {i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}
              </div>
              <AvatarBubble profile={u} size={34}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:'white'}}>{u.name}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{u.gameCount} partidas · 🏅 {u.gameTop3} top3</div>
              </div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:18,color:'#ffd000'}}>{u.gameWins}🥇</div>
            </div>
          ))}
          {gameRankings.filter(u=>u.gameCount>0).length===0&&(
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>Nadie ha jugado aún</div>
          )}
        </>)}
      </div>
    </div>
  );
}

/* ════════════════════════ SCREEN VIEW (PROYECCIÓN) ════════════════════════ */
function ScreenView({users,session,msgs,reactions,onExit}){
  const phase=session?.phase||'waiting';
  const confra=session?.confra;
  const repaso=session?.repaso;
  const roomRef=useRef();
  const{remaining:confraRemaining}=useTimer(confra?.startTime,PHASE_DURATIONS.confra);
  const{remaining:repasoRemaining}=useTimer(repaso?.startTime,PHASE_DURATIONS.repaso);

  const speakerUid=confra?.active?confra?.queue?.[confra?.currentIdx||0]:null;
  const speaker=speakerUid?users[speakerUid]:null;

  return(
    <div style={{position:'fixed',inset:0,background:'var(--navy)',overflow:'hidden'}}>
      {/* Canvas con zonas */}
      <div ref={roomRef} style={{width:'100%',height:'100%'}}>
        <RoomCanvas users={users} myId={null} session={session}
          selectedChar={false} onSelectChar={()=>{}} onMoveTo={()=>{}}
          roomRef={roomRef} full={true} reactions={reactions} moveTarget={null}/>
      </div>

      {/* Panel fase activa - lado derecho */}
      {phase!=='waiting'&&(
        <div style={{
          position:'absolute',top:80,right:16,
          width:160,
          background:'rgba(7,9,31,.95)',border:'1px solid rgba(255,208,0,.2)',
          borderRadius:14,padding:14,zIndex:40,
        }}>
          {phase==='confra'&&(
            <>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:11,color:'#f59e0b',textTransform:'uppercase',
                letterSpacing:'.07em',marginBottom:10}}>🤝 Confraternización</div>
              <TimerDisplay remaining={confraRemaining} color="#f59e0b"/>
              {speaker&&(
                <div style={{marginTop:10,textAlign:'center'}}>
                  <AvatarBubble profile={speaker} size={40}/>
                  <div style={{fontSize:11,color:'white',marginTop:4,
                    fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>
                    {speaker.name}
                  </div>
                  <div style={{fontSize:9,color:'#f59e0b80'}}>compartiendo</div>
                </div>
              )}
            </>
          )}
          {phase==='repaso'&&(
            <>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:11,color:'#3b82f6',textTransform:'uppercase',
                letterSpacing:'.07em',marginBottom:10}}>📖 Repaso Bíblico</div>
              <TimerDisplay remaining={repasoRemaining} color="#3b82f6"/>
              {repasoRemaining<=0&&(
                <div style={{marginTop:8,fontSize:10,color:'#ef4444',
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                  textAlign:'center',animation:'pulse 1s infinite'}}>
                  TIEMPO EXTRA
                </div>
              )}
            </>
          )}
          {phase==='juegos'&&(
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:4}}>🎮</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:13,color:'#8b5cf6',textTransform:'uppercase'}}>¡JUEGOS!</div>
            </div>
          )}
        </div>
      )}

      {/* Chat del repaso en pantalla */}
      {phase==='repaso'&&<RepasoChatScreen msgs={msgs} session={session} users={users}/>}

      <button onClick={onExit} style={{
        position:'fixed',bottom:20,right:20,zIndex:100,
        background:'rgba(7,9,31,.95)',border:'1px solid rgba(255,208,0,.3)',
        color:'#ffd000',padding:'8px 16px',borderRadius:20,fontSize:12,
        fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'.04em',
      }}>✕ SALIR</button>
    </div>
  );
}

/* ════════════════════════ APP PRINCIPAL ════════════════════════ */
function App(){
  /* ── Vista y auth ── */
  const[view,        setView]        =useState('loading');
  const[authMode,    setAuthMode]    =useState('login');
  const[email,       setEmail]       =useState('');
  const[password,    setPassword]    =useState('');
  const[authError,   setAuthError]   =useState('');
  const[authLoad,    setAuthLoad]    =useState(false);
  const[resetMode,   setResetMode]   =useState(false);
  const[resetSent,   setResetSent]   =useState(false);

  /* ── Perfil ── */
  const[profile,     setProfile]     =useState({name:'',avatar:null,color:'#ffd000',photo:null});
  const[isAdmin,     setIsAdmin]     =useState(false);
  const[setupSaving, setSetupSaving] =useState(false);
  const[setupError,  setSetupError]  =useState('');

  /* ── Modales ── */
  const[editOpen,    setEditOpen]    =useState(false);
  const[attOpen,     setAttOpen]     =useState(false);
  const[adminStats,  setAdminStats]  =useState(false);
  const[endBanner,   setEndBanner]   =useState(null); // 'confra'|'repaso'|null
  const[kahootOpen,  setKahootOpen]  =useState(false);

  /* ── Sala ── */
  const[users,       setUsers]       =useState({});
  const[msgs,        setMsgs]        =useState([]);
  const[myAtt,       setMyAtt]       =useState({});
  const[session,     setSession]     =useState(null);
  const[reactions,   setReactions]   =useState({});
  const[gameHistory, setGameHistory] =useState({});


  /* ── Click-to-move ── */
  const[selectedChar,setSelectedChar]=useState(false);
  const[moveTarget,  setMoveTarget]  =useState(null);
  const[repasoChatOpen,setRepasoChatOpen]=useState(false);
  const[wordCloudOpen, setWordCloudOpen] =useState(false);

  const UID      =useRef(null);
  const SID      =useRef(getSID());
  const roomRef  =useRef(null);
  const walkTimer=useRef(null);
  const mtTimer  =useRef(null);
  const endRef   =useRef(null);

  /* ── body class ── */
  useEffect(()=>{
    if(view==='room'||view==='screen') document.body.classList.add('in-room');
    else document.body.classList.remove('in-room');
  },[view]);

  /* ── Auth listener ── */
  useEffect(()=>{
    const t=setTimeout(()=>{ if(view==='loading') setView('auth'); },8000);
    const unsub=auth.onAuthStateChanged(async user=>{
      clearTimeout(t);
      if(user){
        UID.current=user.uid;
        try{
          const snap=await db.ref(`profiles/${user.uid}`).get();
          const p=snap.val();
          if(p&&p.name){
            setProfile(p);
            setIsAdmin(!!p.isAdmin);
            await joinRoom(user.uid,p);
            setView('room');
          } else setView('setup');
        } catch(e){ console.error(e); setView('setup'); }
      } else { UID.current=null; setView('auth'); }
    });
    return()=>{ clearTimeout(t); unsub(); };
  },[]);

  /* ── Firebase listeners sala ── */
  useEffect(()=>{
    if(view!=='room'&&view!=='screen') return;
    const sid=SID.current, uid=UID.current;
    if(!uid) return;
    // Si el juego terminó (finished/idle) y kahootOpen era true, resetear
    // (se maneja en closeGame)
    const refs={
      users: db.ref(`rooms/${sid}/users`),
      chat:  db.ref(`rooms/${sid}/chat`),
      att:   db.ref(`attendance/${uid}`),
      sess:  db.ref(`sessions/${sid}`),
      reac:  db.ref(`sessions/${sid}/reactions`),
      hist:  db.ref(`gameHistory/${uid}`),
    };
    refs.users.on('value',s=>setUsers(s.val()||{}));
    refs.chat.on('value',s=>{
      const v=s.val();
      if(v) setMsgs(Object.entries(v).map(([id,m])=>({id,...m})).sort((a,b)=>(a.ts||0)-(b.ts||0)));
      else setMsgs([]);
    });
    refs.att.on('value',s=>setMyAtt(s.val()||{}));
    refs.sess.on('value',s=>setSession(s.val()));
    refs.reac.on('value',s=>setReactions(s.val()||{}));
    refs.hist.on('value',s=>setGameHistory(s.val()||{}));
    return()=>Object.values(refs).forEach(r=>r.off());
  },[view]);

  /* ── Scroll chat ── */
  useEffect(()=>{
    if(session?.phase==='repaso') setRepasoChatOpen(true);
    else{ setRepasoChatOpen(false); setWordCloudOpen(false); }
  },[session?.phase]);

  useEffect(()=>{
    if(session?.wordcloud?.active) setWordCloudOpen(true);
  },[session?.wordcloud?.active]);

  /* ── Helpers ── */
  const joinRoom=async(uid,p)=>{
    const uRef=db.ref(`rooms/${SID.current}/users/${uid}`);
    await uRef.set({
      name:p.name,avatar:p.avatar,color:p.color,photo:p.photo||null,
      zone:'lobby',x:48,y:48,joinedAt:Date.now(),walking:false,
    });
    uRef.onDisconnect().remove();
    await db.ref(`attendance/${uid}/${SID.current}`).set({
      name:p.name,avatar:p.avatar,color:p.color,timestamp:Date.now(),
    });
  };

  const saveProfile=async(newProfile)=>{
    const uid=UID.current;
    if(!uid) return;
    setSetupSaving(true); setSetupError('');
    try{
      await db.ref(`profiles/${uid}`).set({...newProfile,isAdmin:isAdmin||false});
      try{
        await db.ref(`rooms/${SID.current}/users/${uid}`).update({
          name:newProfile.name,avatar:newProfile.avatar,
          color:newProfile.color,photo:newProfile.photo||null,
        });
      }catch(e){}
      setProfile(newProfile);
      setEditOpen(false);
      if(view==='setup'){
        await joinRoom(uid,newProfile);
        // Solo enviar si es la primera vez (perfil recién creado)
        const emailKey=auth.currentUser?.email||'';
        sendWelcomeEmail(emailKey, newProfile.name);
        setView('room');
      }
    }catch(e){
      console.error(e);
      setSetupError('No se pudo guardar. Verifica tu conexión.');
    }
    setSetupSaving(false);
  };

  /* ── Auth handlers ── */
  const handleEmailAuth=async()=>{
    if(!email.trim()||!password) return;
    setAuthLoad(true); setAuthError('');
    try{
      if(authMode==='login'){
        await auth.signInWithEmailAndPassword(email.trim(),password);
      } else {
        await auth.createUserWithEmailAndPassword(email.trim(),password);
        // El correo de bienvenida se envía en saveProfile (cuando ya tenemos el nombre)
      }
    }catch(e){ setAuthError(getErr(e.code)); setAuthLoad(false); }
  };

  const handleReset=async()=>{
    if(!email.trim()) return;
    setAuthLoad(true); setAuthError('');
    try{
      await auth.sendPasswordResetEmail(email.trim());
      setResetSent(true);
    }catch(e){
      setAuthError(getErr(e.code)||'No se pudo enviar el correo. Verifica el email.');
    }
    setAuthLoad(false);
  };

  const handleGoogle=async()=>{
    setAuthLoad(true); setAuthError('');
    try{
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }catch(e){
      if(e.code&&!['auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(e.code))
        setAuthError(getErr(e.code));
      setAuthLoad(false);
    }
  };

  const handleSignOut=async()=>{
    try{ await db.ref(`rooms/${SID.current}/users/${UID.current}`).remove(); }catch(e){}
    await auth.signOut();
    setUsers({}); setMsgs([]); setMyAtt({}); setSession(null);
  };

  /* ── Click-to-move ── */
  const handleSelectChar=useCallback(()=>{
    setSelectedChar(s=>!s);
  },[]);

  const handleMoveTo=useCallback((x,y)=>{
    const uid=UID.current;
    if(!uid) return;
    const zone=detectZone(x,y);
    db.ref(`rooms/${SID.current}/users/${uid}`).update({x,y,zone,walking:true});
    clearTimeout(mtTimer.current);
    setMoveTarget({x,y,id:Date.now()});
    mtTimer.current=setTimeout(()=>setMoveTarget(null),600);
    clearTimeout(walkTimer.current);
    setSelectedChar(false);
    walkTimer.current=setTimeout(()=>{
      db.ref(`rooms/${SID.current}/users/${uid}/walking`).set(false);
    },750);
  },[]);

  /* ── Chat ── */
  const handleSend=(text,extra={})=>{
    if(!text?.trim()&&!extra.imageData) return;
    const me=users[UID.current];
    if(!me) return;
    db.ref(`rooms/${SID.current}/chat`).push({
      name:me.name,avatar:me.avatar,color:me.color,photo:me.photo||null,
      text:text?.trim()||'',
      type:extra.type||'text',
      imageData:extra.imageData||null,
      tag:extra.tag||null,
      time:nowTime(),ts:Date.now(),uid:UID.current,
    });
  };

  /* ── Reaccionar ── */
  const handleReact=(reactionId)=>{
    const speakerUid=session?.confra?.queue?.[session?.confra?.currentIdx||0];
    if(!speakerUid) return;
    db.ref(`sessions/${SID.current}/reactions/${speakerUid}/${UID.current}`).set(reactionId);
  };
  const myReaction=useMemo(()=>{
    const speakerUid=session?.confra?.queue?.[session?.confra?.currentIdx||0];
    if(!speakerUid) return null;
    return reactions?.[speakerUid]?.[UID.current]||null;
  },[reactions,session]);

  /* ── Admin: gestión de fases ── */
  const startConfra=async(confraUsers)=>{
    const queue=confraUsers.map(([uid])=>uid).sort(()=>Math.random()-.5);
    await db.ref(`sessions/${SID.current}`).set({
      phase:'confra',
      confra:{
        active:true,
        queue,
        currentIdx:0,
        startTime:Date.now(),
      }
    });
  };

  const nextSpeaker=async()=>{
    const confra=session?.confra;
    if(!confra) return;
    const next=(confra.currentIdx||0)+1;
    if(next>=confra.queue.length){
      await endConfra();
    } else {
      await db.ref(`sessions/${SID.current}/confra/currentIdx`).set(next);
      await db.ref(`sessions/${SID.current}/reactions`).remove();
    }
  };

  const endConfra=async()=>{
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','confra/active':false});
    setEndBanner('confra');
  };

  const startRepaso=async()=>{
    await db.ref(`sessions/${SID.current}`).set({
      phase:'repaso',
      repaso:{active:true,startTime:Date.now()},
    });
  };

  const endRepaso=async()=>{
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','repaso/active':false,'wordcloud/active':false});
    setEndBanner('repaso');
  };

  const toggleWordCloud=async()=>{
    const isActive=session?.wordcloud?.active;
    if(isActive){
      setWordCloudOpen(o=>!o);
    } else {
      await db.ref(`sessions/${SID.current}/wordcloud`).set({active:true,words:{}});
      setWordCloudOpen(true);
    }
  };

  const startJuegos=async()=>{
    await db.ref(`sessions/${SID.current}`).set({
      phase:'juegos',
      juegos:{active:true,startTime:Date.now()},
    });
  };

  const endJuegos=async()=>{
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','juegos/active':false});
  };

  const resetSession=async()=>{
    await db.ref(`sessions/${SID.current}`).set({phase:'waiting'});
    setWordCloudOpen(false);
    setRepasoChatOpen(false);
  };

  const phase=session?.phase||'waiting';
  const usersArr=Object.entries(users);
  const attSessions=Object.keys(myAtt).sort().reverse();
  const streak=(()=>{
    if(!attSessions.length) return 0;
    let s=1;
    for(let i=1;i<attSessions.length;i++){
      if((new Date(attSessions[i-1])-new Date(attSessions[i]))/86400000<=10) s++;
      else break;
    }
    return s;
  })();

  /* ════ LOADING ════ */
  if(view==='loading') return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:20,
      background:'var(--navy)',position:'relative',overflow:'hidden'}}>
      <BgTriangles/>
      <div style={{position:'relative',zIndex:1,textAlign:'center'}}>
        <BookLogo size={80}/>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:26,color:'#ffd000',letterSpacing:'.08em',marginTop:10}}>MARANATA CLASS</div>
        <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Las Condes</div>
        <div style={{marginTop:20,display:'flex',justifyContent:'center'}}>
          <Spinner size={32}/>
        </div>
      </div>
    </div>
  );

  /* ════ AUTH ════ */
  if(view==='auth') return(
    <div style={pageWrap}>
      <BgTriangles/>
      <div style={cardStyle}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <BookLogo size={70}/>
          <h1 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:28,color:'#ffd000',letterSpacing:'.05em',
            textTransform:'uppercase',lineHeight:1,marginTop:8}}>MARANATA CLASS</h1>
          <p style={{color:'var(--muted)',fontSize:12,marginTop:4}}>Adventista Las Condes</p>
        </div>
        <div style={{display:'flex',background:'rgba(255,255,255,.04)',
          borderRadius:12,padding:4,marginBottom:20,
          border:'1px solid rgba(255,208,0,.1)'}}>
          {[{id:'login',l:'Ingresar'},{id:'register',l:'Registrarse'}].map(t=>(
            <button key={t.id} onClick={()=>{setAuthMode(t.id);setAuthError('');setResetMode(false);setResetSent(false);}} style={{
              flex:1,padding:'9px 4px',borderRadius:9,border:'none',
              background:authMode===t.id&&!resetMode?'linear-gradient(135deg,#ffd000,#e6a800)':'transparent',
              color:authMode===t.id&&!resetMode?'#07091f':'var(--muted)',
              fontSize:13,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
              letterSpacing:'.04em',textTransform:'uppercase',transition:'all .2s',
            }}>{t.l}</button>
          ))}
        </div>

        {/* ── MODO RECUPERAR CONTRASEÑA ── */}
        {resetMode ? (
          resetSent ? (
            <div style={{textAlign:'center',padding:'10px 0 8px'}}>
              <div style={{fontSize:52,marginBottom:12}}>📩</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                fontSize:18,color:'#10b981',textTransform:'uppercase',letterSpacing:'.04em',
                marginBottom:8}}>¡Correo enviado!</div>
              <div style={{fontSize:13,color:'var(--white)',lineHeight:1.6,marginBottom:6}}>
                Revisa tu bandeja de entrada en
              </div>
              <div style={{fontWeight:700,color:'#ffd000',fontSize:14,marginBottom:16,
                wordBreak:'break-all'}}>{email}</div>
              <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.5,marginBottom:20}}>
