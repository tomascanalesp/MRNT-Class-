const detectZone=(x,y)=>{

    if(key==='lobby') continue;
    if(x>=z.x1&&x<=z.x2&&y>=z.y1&&y<=z.y2) return key;
  }
  return 'lobby';
};

const compressImage=(file,maxSize=220)=>new Promise(resolve=>{
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const ratio=Math.min(maxSize/img.width,maxSize/img.height);
    canvas.width=img.width*ratio;
    canvas.height=img.height*ratio;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    URL.revokeObjectURL(url);
    resolve(canvas.toDataURL('image/jpeg',.65));
  };
  img.src=url;
});

const formatTime=s=>{
  const abs=Math.abs(s);
  const m=Math.floor(abs/60).toString().padStart(2,'0');
  const sec=(abs%60).toString().padStart(2,'0');
  return`${s<0?'-':''}${m}:${sec}`;
};

/* ════ HUMAN CHARACTER SVG ════ */

/* ════ TIMER ════ */
function useTimer(startTime,duration){
  const[elapsed,setElapsed]=useState(0);
  useEffect(()=>{
    if(!startTime) return;
    const iv=setInterval(()=>setElapsed(Math.floor((Date.now()-startTime)/1000)),1000);
    return()=>clearInterval(iv);
  },[startTime]);
  const remaining=duration-elapsed;
  return{elapsed,remaining,over:remaining<=0};
}

function TimerDisplay({remaining,color='#ffd000',large=false}){
  const abs=Math.abs(remaining);
  const over=remaining<0;
  const s=large?72:36;
  const stroke=large?7:4;
  const r=(s-stroke)/2;
  const circ=2*Math.PI*r;
  const pct=over?0:Math.max(0,remaining/(PHASE_DURATIONS.confra||600));
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <div style={{position:'relative',width:s*2,height:s*2}}>
        <svg width={s*2} height={s*2} style={{transform:'rotate(-90deg)'}}>
          <circle cx={s} cy={s} r={r} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth={stroke}/>
          <circle cx={s} cy={s} r={r} fill="none" stroke={over?'#ef4444':color}
            strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
            strokeLinecap="round" style={{transition:'stroke-dashoffset 1s linear'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',
          justifyContent:'center',flexDirection:'column'}}>
          <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:large?28:14,color:over?'#ef4444':color,letterSpacing:'-.02em',
            animation:over?'timerTick 1s infinite':undefined}}>
            {over?'-':''}{formatTime(abs)}
          </span>
        </div>
      </div>
    </div>
  );
}

/* ════ ROOM CANVAS ════ */
function RoomCanvas({users,myId,session,selectedChar,onSelectChar,onMoveTo,roomRef,full,reactions,moveTarget}){
  const entries=Object.entries(users);
  const phase=session?.phase||'waiting';

  const handleRoomClick=useCallback(e=>{
    if(full||!selectedChar) return;
    const rect=roomRef.current?.getBoundingClientRect();
    if(!rect) return;
    const cx=e.touches?.[0]?.clientX??e.clientX;
    const cy=e.touches?.[0]?.clientY??e.clientY;
    const x=Math.max(3,Math.min(95,((cx-rect.left)/rect.width)*100));
    const y=Math.max(14,Math.min(92,((cy-rect.top)/rect.height)*100));
    onMoveTo(x,y);
  },[full,selectedChar,onMoveTo]);

  const zoneStyle=(key)=>{
    const z=ZONES[key];
    const isActive=phase===key;
    return{
      position:'absolute',
      left:`${z.x1}%`,top:`${z.y1}%`,
      width:`${z.x2-z.x1}%`,height:`${z.y2-z.y1}%`,
      background:isActive
        ?z.bg.replace('.07','.16')
        :z.bg,
      border:`1.5px solid ${isActive?z.color+'66':z.color+'28'}`,
      borderRadius:14,
      display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'flex-start',
      paddingTop:full?10:8,
      transition:'all .35s var(--ease-out)',
      boxShadow:isActive?`inset 0 0 30px ${z.color}10, 0 0 20px ${z.color}18`:undefined,
    };
  };

  return(
    <div
      ref={roomRef}
      onClick={handleRoomClick}
      style={{
        width:'100%',height:'100%',position:'relative',overflow:'hidden',
        background:full
          ?'radial-gradient(ellipse at 30% 20%,rgba(255,208,0,.03),transparent 60%), var(--navy)'
          :'var(--navy)',
        cursor:selectedChar&&!full?'crosshair':'default',
        userSelect:'none',
        backgroundImage:`linear-gradient(rgba(255,208,0,.025) 1px,transparent 1px),
                         linear-gradient(90deg,rgba(255,208,0,.025) 1px,transparent 1px)`,
        backgroundSize:'40px 40px',
      }}>

      {/* Ambient lights */}
      <div style={{position:'absolute',top:'5%',left:'2%',width:'34%',height:'40%',
        background:'radial-gradient(ellipse,rgba(245,158,11,.035),transparent 70%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:'10%',right:'2%',width:'30%',height:'36%',
        background:'radial-gradient(ellipse,rgba(139,92,246,.035),transparent 70%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',top:'10%',left:'35%',width:'30%',height:'30%',
        background:'radial-gradient(ellipse,rgba(59,130,246,.03),transparent 70%)',pointerEvents:'none'}}/>

      {/* Three zone cards */}
      {['confra','repaso','juegos'].map(key=>{
        const z=ZONES[key];
        const count=entries.filter(([,u])=>u.zone===key).length;
        const isActive=phase===key;
        return(
          <div key={key} className="zone-card" style={zoneStyle(key)}>
            {/* Zone header pill */}
            <div style={{
              background:isActive?`${z.color}22`:`${z.color}12`,
              border:`1px solid ${isActive?z.color+'55':z.color+'25'}`,
              borderRadius:20,padding:full?'4px 14px':'3px 10px',
              display:'flex',alignItems:'center',gap:4,
            }}>
              <span style={{fontSize:full?15:10}}>{z.icon}</span>
              <span style={{
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:full?13:9,color:z.color,textTransform:'uppercase',
                letterSpacing:'.07em',textShadow:isActive?`0 0 12px ${z.color}66`:undefined,
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                maxWidth:full?'none':60,
              }}>
                {full?z.label:z.label.split(' ')[0]}
              </span>
            </div>
            {count>0&&(

                {count} {count===1?'joven':'jóvenes'}

            )}
          </div>
        );
      })}

      {/* Full view: header overlay */}
      {full&&(<>
        <div style={{position:'absolute',top:14,left:'50%',transform:'translateX(-50%)',
          background:'rgba(7,9,31,.96)',border:'1px solid rgba(255,208,0,.25)',
          borderRadius:16,padding:'8px 24px',textAlign:'center',

          padding:'8px 0 6px',
          display:'flex',alignItems:'center',justifyContent:'center',
          pointerEvents:'none',zIndex:15,
        }}>
          <div style={{
            background:'rgba(255,208,0,.12)',border:'1px solid rgba(255,208,0,.3)',
            borderRadius:20,padding:'5px 16px',
            fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
            fontSize:11,color:'#ffd000',letterSpacing:'.06em',textTransform:'uppercase',
          }}>
            ✦ Toca el lugar donde quieres ir
          </div>
        </div>
      )}
      {!full&&!selectedChar&&(
        <div style={{position:'absolute',bottom:4,left:0,right:0,textAlign:'center',
          fontSize:9,color:'rgba(74,79,122,.6)',pointerEvents:'none',
          fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.05em',textTransform:'uppercase'}}>
          Toca tu personaje para moverte
        </div>
      )}

      {/* Move target ripple */}
      {moveTarget&&(
        <div key={moveTarget.id} style={{
          position:'absolute',
          left:`${moveTarget.x}%`,top:`${moveTarget.y}%`,
          width:32,height:32,borderRadius:'50%',pointerEvents:'none',
          border:`2px solid #ffd000`,zIndex:20,
          animation:'moveRipple .55s var(--ease-out) forwards',
        }}/>
      )}

      {/* Characters */}
      {entries.map(([uid,u])=>{
        const myReactions=reactions?.[uid]||{};
        const reactionCounts=REACTIONS.map(r=>({
          ...r,count:Object.values(myReactions).filter(v=>v===r.id).length
        })).filter(r=>r.count>0);
        const isMine=uid===myId;
        const isCharSelected=isMine&&selectedChar;

        return(
          <div key={uid}
            onClick={isMine&&!full?(e)=>{e.stopPropagation();onSelectChar();}:undefined}
            style={{
              position:'absolute',
              left:`${u.x??50}%`,top:`${u.y??50}%`,
              transform:'translate(-50%,-50%)',
              transition:`left .55s var(--ease-out), top .55s var(--ease-out)`,
              display:'flex',flexDirection:'column',alignItems:'center',
              cursor:isMine&&!full?'pointer':'default',
              zIndex:isMine?10:5,
              animation:uid===myId?'pop .4s var(--ease-out)':'none',
            }}>

            {/* Reaction badges */}
            {reactionCounts.length>0&&(
              <div style={{display:'flex',gap:2,marginBottom:2,flexWrap:'wrap',
                maxWidth:full?80:55,justifyContent:'center'}}>
                {reactionCounts.map(r=>(
                  <div key={r.id} style={{
                    background:'rgba(7,9,31,.9)',borderRadius:20,
                    padding:'1px 5px',fontSize:full?12:8,
                    display:'flex',alignItems:'center',gap:1,
                    border:'1px solid rgba(255,255,255,.12)',
                  }}>
                    <span>{r.e}</span>
                    {r.count>1&&<span style={{fontSize:full?9:6,color:'#ffd000',
                      fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>{r.count}</span>}
                  </div>
                ))}
              </div>
            )}

            <HumanCharacter
              profile={u} charId={uid}
              size={full?62:52}
              isMe={isMine}
              isSelected={isCharSelected}
              isWalking={u.walking||false}
              full={full}
            />

            {/* Name label */}
            <div style={{
              marginTop:-2,fontSize:full?11:8,color:'white',
              background:'rgba(7,9,31,.93)',padding:'2px 8px',borderRadius:20,
              maxWidth:full?90:64,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
              fontFamily:'Barlow,sans-serif',fontWeight:600,
              border:`1px solid ${u.color||'#ffd000'}33`,
              letterSpacing:'.01em',
            }}>
              {isMine?'⭐ '+u.name:u.name}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ════ CONFRA SPEAKER PANEL ════ */
function ConfraSpeakerPanel({session,users,myId,isAdmin,onNext,onEnd,onReact,myReaction}){
  const confra=session?.confra;
  if(!confra?.active) return null;
  const queue=confra.queue||[];
  const idx=confra.currentIdx||0;
  const speakerUid=queue[idx];
  const speaker=users[speakerUid];
  const isMe=speakerUid===myId;
  const remaining=queue.length-idx-1;
  if(!speaker) return null;

  return(
    <div style={{position:'fixed',inset:0,zIndex:150,
      background:'rgba(7,9,31,.9)',backdropFilter:'blur(10px)',
      display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',padding:20,gap:16}}>
      <div style={{textAlign:'center',animation:'speakerPop .55s var(--ease-out)'}}>
        <div style={{fontSize:11,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
          color:'var(--muted)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:12}}>
          {isMe?'¡Es tu turno!':'Compartiendo ahora'}
        </div>
        <AvatarBubble profile={speaker} size={92} glow={true}/>
        <div style={{marginTop:12,fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:28,color:'#ffd000',letterSpacing:'-.01em'}}>
          {isMe?'Tú':speaker.name}
        </div>
        {isMe&&(
          <div style={{marginTop:6,background:'rgba(255,208,0,.07)',
            border:'1px solid rgba(255,208,0,.2)',
            borderRadius:12,padding:'8px 16px',fontSize:12,color:'rgba(255,208,0,.8)',
            maxWidth:280,lineHeight:1.5}}>
            Comparte cómo te fue esta semana, pedidos de oración o agradecimientos 🙏
          </div>
        )}
      </div>
      {!isMe&&(
        <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
          {REACTIONS.map(r=>(
            <button key={r.id} onClick={()=>onReact(r.id)} style={{
              background:myReaction===r.id?'rgba(255,208,0,.15)':'rgba(255,255,255,.05)',
              border:myReaction===r.id?'2px solid #ffd000':'2px solid rgba(255,255,255,.1)',
              borderRadius:50,width:46,height:46,fontSize:22,
              display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:myReaction===r.id?'0 0 14px rgba(255,208,0,.4)':undefined,
            }}>{r.e}</button>
          ))}
        </div>
      )}
      <div style={{display:'flex',gap:6}}>
        {queue.map((_,i)=>(
          <div key={i} style={{
            width:8,height:8,borderRadius:'50%',
            background:i<idx?'#10b981':i===idx?'#ffd000':'rgba(255,255,255,.15)',
            transition:'all .3s',
          }}/>
        ))}
      </div>
      {(isMe||isAdmin)&&(
        <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
          {remaining>0&&(
            <button onClick={onNext} style={{
              background:'linear-gradient(135deg,#ffd000,#e6a800)',
              border:'none',borderRadius:12,padding:'12px 24px',
              color:'#07091f',fontWeight:800,fontSize:14,
              fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
              boxShadow:'0 0 20px rgba(255,208,0,.35)'}}>
              Siguiente persona →
            </button>
          )}
          {(remaining===0||isAdmin)&&(
            <button onClick={onEnd} style={{
              background:'rgba(16,185,129,.15)',
              border:'1px solid rgba(16,185,129,.4)',
              borderRadius:12,padding:'12px 24px',
              color:'#10b981',fontWeight:800,fontSize:14,
              fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em'}}>
              {remaining===0?'¡Todos compartieron! ✨':'Finalizar confraternización'}
            </button>
          )}
        </div>
      )}
      {!isMe&&!isAdmin&&(
        <div style={{fontSize:12,color:'var(--muted)',textAlign:'center',maxWidth:260}}>
          Escucha a {speaker.name} y reacciona con los íconos de arriba 👆
        </div>
      )}
    </div>
  );
}

/* ════ REPASO CHAT SCREEN ════ */

  const repaso=session?.repaso;
  if(!repaso?.active) return null;

  return(
    <div style={{position:'absolute',bottom:80,left:'50%',transform:'translateX(-50%)',
      width:'80%',maxWidth:500,zIndex:30}}>
      {recent.map((m,i)=>(
        <div key={m.id||i} style={{display:'flex',gap:8,marginBottom:6,animation:'slideIn .25s ease'}}>
          <div style={{width:28,height:28,borderRadius:'50%',flexShrink:0,
            background:`${m.color||'#ffd000'}22`,border:`1.5px solid ${m.color||'#ffd000'}`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,overflow:'hidden'}}>
            {m.photo?<img src={m.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}/>

/* ════ ADMIN STATS MODAL ════ */
function AdminStatsModal({onClose}){
  const[data,setData]=useState([]);
  const[loading,setLoading]=useState(true);
  const[selected,setSelected]=useState(null);
  const[tab,setTab]=useState('jóvenes');
  const[search,setSearch]=useState('');

  useEffect(()=>{
    Promise.all([
      db.ref('profiles').get(),
      db.ref('attendance').get(),
      db.ref('gameHistory').get(),
    ]).then(([pSnap,aSnap,gSnap])=>{
      const profiles=pSnap.val()||{};
      const attendance=aSnap.val()||{};
      const history=gSnap.val()||{};
      const list=Object.entries(profiles)
        .filter(([,p])=>p&&p.name)
        .map(([uid,p])=>({
          uid,...p,
          attCount:Object.keys(attendance[uid]||{}).length,
          attThisYear:Object.keys(attendance[uid]||{}).filter(s=>s.startsWith(new Date().getFullYear().toString())).length,
          attSessions:Object.keys(attendance[uid]||{}).sort().reverse(),
          gameCount:Object.keys(history[uid]||{}).length,
          gameWins:Object.values(history[uid]||{}).filter(g=>g.rank===1).length,
          gameTop3:Object.values(history[uid]||{}).filter(g=>g.rank<=3).length,
          games:Object.entries(history[uid]||{}).map(([id,g])=>({id,...g})).sort((a,b)=>b.date?.localeCompare(a.date||'')||0),
        }))
        .sort((a,b)=>b.attCount-a.attCount);
      setData(list);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const filtered=data.filter(u=>u.name?.toLowerCase().includes(search.toLowerCase()));

  // Overall rankings by game wins
  const gameRankings=[...data].sort((a,b)=>(b.gameWins-a.gameWins)||(b.gameTop3-a.gameTop3)||(b.gameCount-a.gameCount));

  const monthNames=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  return(
    <div style={{position:'fixed',inset:0,zIndex:210,
      display:'flex',alignItems:'flex-end',justifyContent:'center',
      background:'rgba(0,0,0,.8)',backdropFilter:'blur(6px)'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:520,maxHeight:'90vh',overflowY:'auto',
        background:'linear-gradient(160deg,#0d1035,#08091e)',
        border:'1px solid rgba(255,208,0,.2)',
        borderRadius:'22px 22px 0 0',padding:'18px 18px 32px',
        animation:'modalIn .28s var(--ease-out)'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,208,0,.2)',margin:'0 auto 14px'}}/>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <h3 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:20,
            color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            📊 Estadísticas Globales
          </h3>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>

        {/* Global summary */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}}>
          {[
            {label:'Jóvenes',value:data.length,icon:'👥',color:'#ffd000'},
            {label:'Asistencias',value:data.reduce((s,u)=>s+u.attCount,0),icon:'📅',color:'#10b981'},
            {label:'Partidas',value:data.reduce((s,u)=>s+u.gameCount,0),icon:'🎮',color:'#8b5cf6'},
          ].map(st=>(
            <div key={st.label} style={{background:'rgba(255,255,255,.04)',borderRadius:12,
              padding:'10px 8px',textAlign:'center',
              border:`1px solid ${st.color}22`,
              borderTop:`3px solid ${st.color}`}}>
              <div style={{fontSize:22,marginBottom:4}}>{st.icon}</div>
              <div style={{fontSize:22,fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                color:st.color,lineHeight:1}}>{st.value}</div>
              <div style={{fontSize:9,color:'var(--muted)',marginTop:3,
                textTransform:'uppercase',letterSpacing:'.05em'}}>{st.label}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:'flex',background:'rgba(255,255,255,.04)',borderRadius:10,
          padding:3,marginBottom:14,border:'1px solid rgba(255,208,0,.08)'}}>
          {[{id:'jóvenes',l:'👥 Jóvenes'},{id:'rankings',l:'🏆 Rankings'}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1,padding:'7px 4px',borderRadius:8,border:'none',
              background:tab===t.id?'linear-gradient(135deg,#ffd000,#e6a800)':'transparent',
              color:tab===t.id?'#07091f':'var(--muted)',
              fontSize:12,fontWeight:700,fontFamily:'Barlow Condensed,sans-serif',
              letterSpacing:'.03em',textTransform:'uppercase',transition:'all .18s',
            }}>{t.l}</button>
          ))}
        </div>

        {loading&&(
          <div style={{display:'flex',justifyContent:'center',padding:'30px 0'}}>
            <Spinner size={28}/>
          </div>
        )}

        {!loading&&tab==='jóvenes'&&(<>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Buscar joven..."
            style={{width:'100%',padding:'9px 14px',borderRadius:10,
              background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,208,0,.15)',
              color:'var(--white)',fontSize:13,fontFamily:'Barlow,sans-serif',
              marginBottom:12,outline:'none'}}/>

          {/* User detail */}
          {selected&&(()=>{
            const u=data.find(x=>x.uid===selected);
            if(!u) return null;
            const byMonth={};
            u.attSessions.forEach(sid=>{
              const d=new Date(sid+'T12:00:00');
              const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
              if(!byMonth[key]) byMonth[key]=[];
              byMonth[key].push(sid);
            });
            return(
              <div style={{background:'rgba(255,255,255,.03)',borderRadius:14,
                padding:14,marginBottom:12,border:'1px solid rgba(255,208,0,.12)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                  <AvatarBubble profile={u} size={40}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:'white'}}>{u.name}</div>
                    <div style={{fontSize:10,color:'var(--muted)'}}>{u.isAdmin?'👑 Admin':'Joven'}</div>
                  </div>
                  <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',
                    color:'var(--muted)',fontSize:18,padding:4}}>✕</button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:12}}>
                  {[
                    {l:'Clases',v:u.attCount,c:'#ffd000'},
                    {l:'Este año',v:u.attThisYear,c:'#10b981'},
                    {l:'🎮 Jugadas',v:u.gameCount,c:'#8b5cf6'},
                    {l:'🥇 Ganadas',v:u.gameWins,c:'#f59e0b'},
                  ].map(st=>(
                    <div key={st.l} style={{background:'rgba(255,255,255,.03)',
                      borderRadius:8,padding:'7px 4px',textAlign:'center',
                      borderTop:`2px solid ${st.c}`}}>
                      <div style={{fontSize:18,fontFamily:'Barlow Condensed,sans-serif',
                        fontWeight:900,color:st.c}}>{st.v}</div>
                      <div style={{fontSize:8,color:'var(--muted)',textTransform:'uppercase',
                        letterSpacing:'.04em'}}>{st.l}</div>
                    </div>
                  ))}
                </div>
                {/* Attendance calendar */}
                <div style={{fontSize:10,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',
                  textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Asistencias</div>
                {Object.entries(byMonth).slice(0,4).map(([key,days])=>{
                  const[yr,mo]=key.split('-');
                  return(
                    <div key={key} style={{marginBottom:8}}>
                      <div style={{fontSize:9,color:'var(--muted)',marginBottom:4}}>
                        {monthNames[parseInt(mo)-1]} {yr}
                      </div>
                      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                        {days.map(sid=>(
                          <div key={sid} style={{background:'rgba(16,185,129,.1)',
                            border:'1px solid rgba(16,185,129,.2)',
                            borderRadius:6,padding:'3px 7px',fontSize:9,color:'#10b981'}}>
                            ✅ {new Date(sid+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
                {u.games.length>0&&(<>
                  <div style={{fontSize:10,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',
                    textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6,marginTop:8}}>Juegos</div>
                  {u.games.slice(0,4).map(g=>(
                    <div key={g.id} style={{display:'flex',alignItems:'center',gap:10,
                      background:'rgba(255,255,255,.03)',borderRadius:8,padding:'7px 10px',marginBottom:5}}>
                      <span style={{fontSize:16}}>{g.rank===1?'🥇':g.rank===2?'🥈':g.rank===3?'🥉':`#${g.rank}`}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,color:'var(--muted)'}}>
                          {g.date?new Date(g.date+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'numeric'}):''}
                        </div>
                        <div style={{fontSize:10,color:'var(--muted)'}}>{g.rank}° de {g.totalPlayers}</div>
                      </div>
                      <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:16,color:'#ffd000'}}>{g.score}</span>
                    </div>
                  ))}
                </>)}
              </div>
            );
          })()}

          {/* Users list */}
          {filtered.map((u,i)=>(
            <div key={u.uid} onClick={()=>setSelected(u.uid===selected?null:u.uid)}
              style={{
                display:'flex',alignItems:'center',gap:10,
                background:selected===u.uid?'rgba(255,208,0,.07)':'rgba(255,255,255,.025)',
                border:selected===u.uid?'1px solid rgba(255,208,0,.2)':'1px solid rgba(255,255,255,.05)',
                borderRadius:12,padding:'10px 12px',marginBottom:6,
                cursor:'pointer',transition:'all .18s var(--ease-out)',
              }}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                fontSize:14,color:'var(--muted)',width:20,textAlign:'center'}}>{i+1}</div>
              <AvatarBubble profile={u} size={34}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:'white'}}>{u.name}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{u.isAdmin?'👑 Admin · ':''}{u.attCount} clases · {u.gameWins} 🥇</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
                <div style={{background:'rgba(255,208,0,.1)',borderRadius:8,
                  padding:'2px 8px',fontSize:11,fontFamily:'Barlow Condensed,sans-serif',
                  fontWeight:700,color:'#ffd000'}}>{u.attCount} clases</div>
                {u.attThisYear>0&&(
                  <div style={{fontSize:9,color:'#10b981'}}>{u.attThisYear} este año</div>
                )}
              </div>
            </div>
          ))}
          {filtered.length===0&&!loading&&(
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>
              No se encontraron jóvenes
            </div>
          )}
        </>)}

        {!loading&&tab==='rankings'&&(<>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
            fontSize:12,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em',
            marginBottom:10}}>🏆 Ranking de Juegos</div>
          {gameRankings.filter(u=>u.gameCount>0).map((u,i)=>(
            <div key={u.uid} style={{display:'flex',alignItems:'center',gap:10,
              background:i===0?'rgba(255,208,0,.08)':'rgba(255,255,255,.025)',
              border:i===0?'1px solid rgba(255,208,0,.2)':'1px solid rgba(255,255,255,.05)',
              borderRadius:12,padding:'10px 12px',marginBottom:6}}>
              <div style={{fontSize:i<3?20:14,width:28,textAlign:'center'}}>
                {i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}
              </div>
              <AvatarBubble profile={u} size={34}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:'white'}}>{u.name}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{u.gameCount} partidas · 🏅 {u.gameTop3} top3</div>
              </div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                fontSize:18,color:'#ffd000'}}>{u.gameWins}🥇</div>
            </div>
          ))}
          {gameRankings.filter(u=>u.gameCount>0).length===0&&(
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>
              Nadie ha jugado aún
            </div>
          )}
        </>)}
      </div>
    </div>
  );
}

/* ════ EDIT PROFILE MODAL ════ */
function EditProfileModal({profile,onSave,onClose}){
  const[name,  setName]  =useState(profile.name  ||'');
  const[avatar,setAvatar]=useState(profile.avatar||null);
  const[color, setColor] =useState(profile.color ||'#ffd000');
  const[photo, setPhoto] =useState(profile.photo ||null);
  const[saving,setSaving]=useState(false);
  const[err,   setErr]   =useState('');
  const fileRef=useRef();

  const handlePhoto=async(e)=>{
    const f=e.target.files[0];
    if(!f) return;
    setSaving(true);
    const b64=await compressImage(f,220);
    setPhoto(b64);
    setSaving(false);
  };

  const handleSave=async()=>{
    if(!name.trim()||saving) return;
    setSaving(true);
    try{ await onSave({name:name.trim(),avatar,color,photo}); }
    catch(e){ setErr('Error al guardar. Intenta de nuevo.'); setSaving(false); }
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,
      display:'flex',alignItems:'flex-end',justifyContent:'center',
      background:'rgba(0,0,0,.8)',backdropFilter:'blur(6px)'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:480,overflowY:'auto',maxHeight:'90vh',
        background:'linear-gradient(160deg,#0d1035,#08091e)',
        border:'1px solid rgba(255,208,0,.2)',
        borderRadius:'22px 22px 0 0',padding:'20px 20px 32px',
        animation:'modalIn .28s var(--ease-out)'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,208,0,.2)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <h3 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:20,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            Editar perfil
          </h3>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>

        {/* Photo */}
        <div style={{marginBottom:16,display:'flex',alignItems:'center',gap:14}}>
          <div style={{position:'relative',cursor:'pointer'}} onClick={()=>fileRef.current?.click()}>
            <AvatarBubble profile={{...profile,photo,avatar,color}} size={72}/>
            <div style={{position:'absolute',bottom:-2,right:-2,width:22,height:22,borderRadius:'50%',
              background:'#ffd000',display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:12,color:'#07091f',fontWeight:800}}>📷</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'var(--white)',marginBottom:6}}>Foto de perfil</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              <button onClick={()=>fileRef.current?.click()} style={{
                background:'rgba(255,208,0,.08)',border:'1px solid rgba(255,208,0,.2)',
                borderRadius:8,padding:'6px 10px',color:'#ffd000',fontSize:11,
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>
                📁 Galería / Cámara
              </button>
              {photo&&(
                <button onClick={()=>setPhoto(null)} style={{
                  background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',
                  borderRadius:8,padding:'6px 10px',color:'#f87171',fontSize:11,
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>Quitar</button>
              )}
            </div>
            {/* NO capture attribute = allows both gallery and camera */}
            <input ref={fileRef} type="file" accept="image/*"
              onChange={handlePhoto} style={{display:'none'}}/>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>
              Selecciona desde galería o toma foto
            </div>
          </div>
        </div>

        {/* Name */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
            textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:6,
            fontFamily:'Barlow Condensed,sans-serif'}}>Nombre en la sala</label>
          <input value={name} onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleSave()}
            placeholder="¿Cómo quieres que te vean?"
            style={{width:'100%',padding:'11px 14px',borderRadius:10,
              background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,208,0,.15)',
              color:'var(--white)',fontSize:14,fontFamily:'Barlow,sans-serif'}}/>
        </div>

        {/* Avatar */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
            textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:6,
            fontFamily:'Barlow Condensed,sans-serif'}}>Avatar (si no usas foto)</label>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5}}>
            {AVATARS.map(a=>(
              <button key={a} onClick={()=>setAvatar(a)} style={{
                background:avatar===a?'rgba(255,208,0,.15)':'rgba(255,255,255,.03)',
                border:avatar===a?`2px solid ${color}`:'2px solid rgba(255,255,255,.06)',
                borderRadius:10,padding:'7px 2px',fontSize:19,
                display:'flex',alignItems:'center',justifyContent:'center',

                {a}
              </button>
            ))}
          </div>
        </div>

        {/* Color */}
        <div style={{marginBottom:20}}>
          <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
            textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:8,
            fontFamily:'Barlow Condensed,sans-serif'}}>Color de aura</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {COLORS.map(c=>(
              <div key={c} onClick={()=>setColor(c)} style={{
                width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                border:color===c?'3px solid white':'3px solid transparent',
                boxShadow:color===c?`0 0 14px ${c}`:'none',transition:'all .15s'}}/>
            ))}
          </div>
        </div>

        {err&&<div style={{marginBottom:10,color:'#fca5a5',fontSize:12,
          background:'rgba(239,68,68,.08)',borderRadius:8,padding:'8px 12px'}}>⚠️ {err}</div>}

        <button onClick={handleSave} disabled={!name.trim()||saving} style={{
          width:'100%',padding:13,borderRadius:12,border:'none',
          background:!name.trim()||saving?'var(--muted2)':'linear-gradient(135deg,#ffd000,#e6a800)',
          color:!name.trim()||saving?'var(--muted)':'#07091f',
          fontSize:15,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
          letterSpacing:'.06em',textTransform:'uppercase',
          display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          {saving?<><Spinner size={18} color="#07091f"/>Guardando...</>:'Guardar cambios ✓'}
        </button>
      </div>
    </div>
  );
}

/* ════ ATTENDANCE MODAL ════ */
function AttendanceModal({myAtt,gameHistory,onClose}){
  const[activeTab,setActiveTab]=useState('asistencia');
  const sessions=Object.entries(myAtt||{}).sort((a,b)=>b[0].localeCompare(a[0]));
  const byMonth={};
  sessions.forEach(([sid])=>{
    const d=new Date(sid+'T12:00:00');
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!byMonth[key]) byMonth[key]=[];
    byMonth[key].push(sid);
  });
  const monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,
      display:'flex',alignItems:'flex-end',justifyContent:'center',
      background:'rgba(0,0,0,.8)',backdropFilter:'blur(6px)'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:480,maxHeight:'85vh',overflowY:'auto',
        background:'linear-gradient(160deg,#0d1035,#08091e)',
        border:'1px solid rgba(255,208,0,.2)',
        borderRadius:'22px 22px 0 0',padding:'20px 18px 32px',
        animation:'modalIn .28s var(--ease-out)'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,208,0,.2)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <h3 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:20,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            📊 Mi Historial
          </h3>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:18}}>
          {[
            {label:'Total clases',value:sessions.length,color:'#ffd000'},
            {label:'Este año',value:sessions.filter(([s])=>s.startsWith(new Date().getFullYear().toString())).length,color:'#10b981'},
            {label:'Último mes',value:Object.values(byMonth)[0]?.length||0,color:'#22d3ee'},
          ].map(st=>(
            <div key={st.label} style={{background:'rgba(255,255,255,.03)',borderRadius:10,
              padding:'10px 8px',borderLeft:`3px solid ${st.color}`,textAlign:'center'}}>
              <div style={{fontSize:24,fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:900,color:st.color,lineHeight:1}}>{st.value}</div>
              <div style={{fontSize:9,color:'var(--muted)',marginTop:3,
                textTransform:'uppercase',letterSpacing:'.05em'}}>{st.label}</div>
            </div>
          ))}
        </div>

        <div style={{display:'flex',background:'rgba(255,255,255,.04)',borderRadius:10,
          padding:3,marginBottom:16,border:'1px solid rgba(255,208,0,.08)'}}>
          {[{id:'asistencia',l:'📅 Asistencia'},{id:'juegos',l:'🏆 Juegos'}].map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{
              flex:1,padding:'7px 4px',borderRadius:8,border:'none',
              background:activeTab===t.id?'linear-gradient(135deg,#ffd000,#e6a800)':'transparent',
              color:activeTab===t.id?'#07091f':'var(--muted)',
              fontSize:12,fontWeight:700,fontFamily:'Barlow Condensed,sans-serif',
              letterSpacing:'.03em',textTransform:'uppercase',transition:'all .18s'}}>
              {t.l}
            </button>
          ))}
        </div>

        {activeTab==='asistencia'&&(<>
          {sessions.length===0&&(
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>
              Aún no tienes asistencias registradas
            </div>
          )}
          {Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([key,days])=>{
            const[year,month]=key.split('-');
            return(
              <div key={key} style={{marginBottom:14}}>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                  fontSize:13,color:'var(--muted)',textTransform:'uppercase',
                  letterSpacing:'.07em',marginBottom:8}}>
                  {monthNames[parseInt(month)-1]} {year}
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {days.map(sid=>(
                    <div key={sid} style={{background:'rgba(16,185,129,.08)',padding:'7px 10px',
                      borderRadius:10,textAlign:'center',border:'1px solid rgba(16,185,129,.2)'}}>
                      <div style={{fontSize:16,marginBottom:2}}>✅</div>
                      <div style={{fontSize:9,color:'#10b981',fontFamily:'Barlow Condensed,sans-serif'}}>
                        {new Date(sid+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </>)}

        {activeTab==='juegos'&&(()=>{
          const games=Object.entries(gameHistory||{})
            .map(([id,g])=>({id,...g}))
            .sort((a,b)=>b.date?.localeCompare(a.date||'')||0);
          const wins=games.filter(g=>g.rank===1).length;
          const top3=games.filter(g=>g.rank<=3).length;
          return(<>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
              {[
                {label:'Partidas',value:games.length,color:'#8b5cf6'},
                {label:'🥇 Ganadas',value:wins,color:'#ffd000'},
                {label:'🏅 Top 3',value:top3,color:'#f59e0b'},
              ].map(st=>(
                <div key={st.label} style={{background:'rgba(255,255,255,.03)',borderRadius:10,
                  padding:'10px 8px',borderLeft:`3px solid ${st.color}`,textAlign:'center'}}>
                  <div style={{fontSize:22,fontFamily:'Barlow Condensed,sans-serif',
                    fontWeight:900,color:st.color,lineHeight:1}}>{st.value}</div>
                  <div style={{fontSize:9,color:'var(--muted)',marginTop:3,
                    textTransform:'uppercase',letterSpacing:'.05em'}}>{st.label}</div>
                </div>
              ))}
            </div>
            {games.length===0&&(
              <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>
                Aún no has jugado ningún juego
              </div>
            )}
            {games.map(g=>(
              <div key={g.id} style={{display:'flex',alignItems:'center',gap:12,
                background:g.rank===1?'rgba(255,208,0,.07)':'rgba(255,255,255,.03)',
                border:g.rank===1?'1px solid rgba(255,208,0,.2)':'1px solid rgba(255,255,255,.05)',
                borderRadius:12,padding:'10px 14px',marginBottom:7}}>
                <div style={{fontSize:22,width:28,textAlign:'center'}}>
                  {g.rank===1?'🥇':g.rank===2?'🥈':g.rank===3?'🥉':`#${g.rank}`}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',
                    textTransform:'uppercase',letterSpacing:'.05em'}}>
                    {g.date?new Date(g.date+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'numeric'}):''}
                  </div>
                  <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>
                    {g.rank}° de {g.totalPlayers} jugadores
                  </div>
                </div>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                  fontSize:20,color:'#ffd000'}}>{g.score} pts</div>
              </div>
            ))}
          </>);
        })()}
      </div>
    </div>
  );
}

/* ════ SCREEN VIEW ════ */
function ScreenView({users,session,msgs,reactions,onExit}){
  const phase=session?.phase||'waiting';
  const confra=session?.confra;
  const repaso=session?.repaso;
  const roomRef=useRef();
  const{remaining:confraRemaining}=useTimer(confra?.startTime,PHASE_DURATIONS.confra);
  const{remaining:repasoRemaining}=useTimer(repaso?.startTime,PHASE_DURATIONS.repaso);
  const speakerUid=confra?.active?confra?.queue?.[confra?.currentIdx||0]:null;
  const speaker=speakerUid?users[speakerUid]:null;

  return(
    <div style={{position:'fixed',inset:0,background:'var(--navy)',overflow:'hidden'}}>
      <RoomCanvas users={users} myId={null} session={session}
        selectedChar={false} onSelectChar={()=>{}} onMoveTo={()=>{}}
        roomRef={roomRef} full={true} reactions={reactions} moveTarget={null}/>

      {phase!=='waiting'&&(
        <div style={{position:'absolute',top:80,right:16,width:162,
          background:'rgba(7,9,31,.96)',border:'1px solid rgba(255,208,0,.2)',
          borderRadius:14,padding:14,zIndex:40}}>
          {phase==='confra'&&(<>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
              fontSize:11,color:'#f59e0b',textTransform:'uppercase',
              letterSpacing:'.07em',marginBottom:10}}>🤝 Confraternización</div>
            <TimerDisplay remaining={confraRemaining} color="#f59e0b"/>
            {speaker&&(
              <div style={{marginTop:10,textAlign:'center'}}>
                <AvatarBubble profile={speaker} size={40}/>
                <div style={{fontSize:11,color:'white',marginTop:4,
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>{speaker.name}</div>
                <div style={{fontSize:9,color:'#f59e0b80'}}>compartiendo</div>
              </div>
            )}
          </>)}
          {phase==='repaso'&&(<>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
              fontSize:11,color:'#3b82f6',textTransform:'uppercase',
              letterSpacing:'.07em',marginBottom:10}}>📖 Repaso Bíblico</div>
            <TimerDisplay remaining={repasoRemaining} color="#3b82f6"/>
          </>)}
          {phase==='juegos'&&(
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:4}}>🎮</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:13,color:'#8b5cf6',textTransform:'uppercase'}}>¡JUEGOS!</div>
            </div>
          )}
        </div>
      )}

      {phase==='repaso'&&<RepasoChatScreen msgs={msgs} session={session} users={users}/>}

      <button onClick={onExit} style={{
        position:'fixed',bottom:20,right:20,zIndex:100,
        background:'rgba(7,9,31,.95)',border:'1px solid rgba(255,208,0,.3)',
        color:'#ffd000',padding:'8px 16px',borderRadius:20,fontSize:12,
        fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'.04em'}}>
        ✕ SALIR
      </button>
    </div>
  );
}

/* ════ SHARED STYLES ════ */
const pageWrap={minHeight:'100vh',background:'var(--navy)',display:'flex',
  alignItems:'flex-start',justifyContent:'center',
  padding:'24px 16px 40px',position:'relative'};
const cardStyle={width:'100%',maxWidth:400,position:'relative',zIndex:1,
  background:'linear-gradient(160deg,#0d1035,#08091e)',
  border:'1px solid rgba(255,208,0,.15)',borderRadius:22,padding:'28px 22px',
  boxShadow:'0 0 60px rgba(255,208,0,.06),0 8px 40px rgba(0,0,0,.7)',
  animation:'fadeUp .4s var(--ease-out)'};
const inputStyle={width:'100%',padding:'12px 14px',borderRadius:10,
  background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,208,0,.15)',
  color:'var(--white)',fontSize:14,fontFamily:'Barlow,sans-serif'};
const labelStyle={fontSize:10,fontWeight:700,color:'var(--muted)',
  textTransform:'uppercase',letterSpacing:'.09em',display:'block',marginBottom:6,
  fontFamily:'Barlow Condensed,sans-serif'};
const btnYellow=(dis)=>({
  width:'100%',padding:13,borderRadius:12,border:'none',
  background:dis?'var(--muted2)':'linear-gradient(135deg,#ffd000,#e6a800)',
  color:dis?'var(--muted)':'#07091f',
  fontSize:15,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
  letterSpacing:'.06em',textTransform:'uppercase',
  boxShadow:dis?'none':'0 0 24px rgba(255,208,0,.35)',
  display:'flex',alignItems:'center',justifyContent:'center',gap:8,
  transition:'all .18s var(--ease-out)',
});

/* ════ APP ════ */
function App(){
  const[view,         setView]        =useState('loading');
  const[authMode,     setAuthMode]    =useState('login');
  const[email,        setEmail]       =useState('');
  const[password,     setPassword]    =useState('');
  const[authError,    setAuthError]   =useState('');
  const[authLoad,     setAuthLoad]    =useState(false);
  const[profile,      setProfile]     =useState({name:'',avatar:null,color:'#ffd000',photo:null});
  const[isAdmin,      setIsAdmin]     =useState(false);
  const[setupSaving,  setSetupSaving] =useState(false);
  const[setupError,   setSetupError]  =useState('');
  const[editOpen,     setEditOpen]    =useState(false);
  const[attOpen,      setAttOpen]     =useState(false);
  const[adminStats,   setAdminStats]  =useState(false);
  const[endBanner,    setEndBanner]   =useState(null);
  const[kahootOpen,   setKahootOpen]  =useState(false);
  const[users,        setUsers]       =useState({});
  const[msgs,         setMsgs]        =useState([]);
  const[myAtt,        setMyAtt]       =useState({});
  const[session,      setSession]     =useState(null);
  const[reactions,    setReactions]   =useState({});
  const[gameHistory,  setGameHistory] =useState({});
  const[chatIn,       setChatIn]      =useState('');

  /* Click-to-move state */
  const[selectedChar, setSelectedChar]=useState(false);
  const[isWalking,    setIsWalking]   =useState(false);
  const[moveTarget,   setMoveTarget]  =useState(null);

  const UID      =useRef(null);
  const SID      =useRef(getSID());
  const roomRef  =useRef(null);
  const walkTimer=useRef(null);
  const mtTimer  =useRef(null);

  useEffect(()=>{
    if(view==='room'||view==='screen') document.body.classList.add('in-room');
    else document.body.classList.remove('in-room');
  },[view]);

  useEffect(()=>{
    const t=setTimeout(()=>{ if(view==='loading') setView('auth'); },8000);
    const unsub=auth.onAuthStateChanged(async user=>{
      clearTimeout(t);
      if(user){
        UID.current=user.uid;
        try{
          const snap=await db.ref(`profiles/${user.uid}`).get();
          const p=snap.val();
          if(p&&p.name){
            setProfile(p);
            setIsAdmin(!!p.isAdmin);
            await joinRoom(user.uid,p);
            setView('room');
          } else setView('setup');
        }catch(e){ console.error(e); setView('setup'); }
      } else { UID.current=null; setView('auth'); }
    });
    return()=>{ clearTimeout(t); unsub(); };
  },[]);

  useEffect(()=>{
    if(view!=='room'&&view!=='screen') return;
    const sid=SID.current, uid=UID.current;
    if(!uid) return;
    const refs={
      users:db.ref(`rooms/${sid}/users`),
      chat: db.ref(`rooms/${sid}/chat`),
      att:  db.ref(`attendance/${uid}`),
      sess: db.ref(`sessions/${sid}`),
      reac: db.ref(`sessions/${sid}/reactions`),
      hist: db.ref(`gameHistory/${uid}`),
    };
    refs.users.on('value',s=>setUsers(s.val()||{}));
    refs.chat.on('value',s=>{
      const v=s.val();
      if(v) setMsgs(Object.entries(v).map(([id,m])=>({id,...m})).sort((a,b)=>(a.ts||0)-(b.ts||0)));
      else setMsgs([]);
    });
    refs.att.on('value', s=>setMyAtt(s.val()||{}));
    refs.sess.on('value',s=>setSession(s.val()));
    refs.reac.on('value',s=>setReactions(s.val()||{}));
    refs.hist.on('value',s=>setGameHistory(s.val()||{}));
    return()=>Object.values(refs).forEach(r=>r.off());
  },[view]);

  /* ── Helpers ── */
  const joinRoom=async(uid,p)=>{
    const uRef=db.ref(`rooms/${SID.current}/users/${uid}`);
    await uRef.set({
      name:p.name,avatar:p.avatar,color:p.color,photo:p.photo||null,
      zone:'lobby',x:48,y:48,joinedAt:Date.now(),walking:false,
    });
    uRef.onDisconnect().remove();
    await db.ref(`attendance/${uid}/${SID.current}`).set({
      name:p.name,avatar:p.avatar,color:p.color,timestamp:Date.now(),
    });
  };

  const saveProfile=async(newProfile)=>{
    const uid=UID.current;
    if(!uid) return;
    setSetupSaving(true); setSetupError('');
    try{
      await db.ref(`profiles/${uid}`).set({...newProfile,isAdmin:isAdmin||false});
      try{
        await db.ref(`rooms/${SID.current}/users/${uid}`).update({
          name:newProfile.name,avatar:newProfile.avatar,
          color:newProfile.color,photo:newProfile.photo||null,
        });
      }catch(e){}
      setProfile(newProfile);
      setEditOpen(false);
      if(view==='setup'){
        await joinRoom(uid,newProfile);
        setView('room');
      }
    }catch(e){
      console.error(e);
      setSetupError('No se pudo guardar. Verifica tu conexión.');
    }
    setSetupSaving(false);
  };

  /* ── Auth handlers ── */
  const handleEmailAuth=async()=>{
    if(!email.trim()||!password) return;
    setAuthLoad(true); setAuthError('');
    try{
      if(authMode==='login') await auth.signInWithEmailAndPassword(email.trim(),password);
      else await auth.createUserWithEmailAndPassword(email.trim(),password);
    }catch(e){ setAuthError(getErr(e.code)); setAuthLoad(false); }
  };

  const handleGoogle=async()=>{
    setAuthLoad(true); setAuthError('');
    try{
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }catch(e){
      if(e.code&&!['auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(e.code))
        setAuthError(getErr(e.code));
      setAuthLoad(false);
    }
  };

  const handleSignOut=async()=>{
    try{ await db.ref(`rooms/${SID.current}/users/${UID.current}`).remove(); }catch(e){}
    await auth.signOut();
    setUsers({}); setMsgs([]); setMyAtt({}); setSession(null);
  };

  /* ── Click-to-move ── */
  const handleSelectChar=useCallback(()=>{
    setSelectedChar(s=>!s);
  },[]);

  const handleMoveTo=useCallback((x,y)=>{
    const uid=UID.current;
    if(!uid) return;
    const zone=detectZone(x,y);
    db.ref(`rooms/${SID.current}/users/${uid}`).update({x,y,zone,walking:true});

    // Show ripple at destination
    clearTimeout(mtTimer.current);
    setMoveTarget({x,y,id:Date.now()});
    mtTimer.current=setTimeout(()=>setMoveTarget(null),600);

    // Walking animation
    clearTimeout(walkTimer.current);
    setIsWalking(true);
    setSelectedChar(false);
    walkTimer.current=setTimeout(()=>{
      setIsWalking(false);
      db.ref(`rooms/${SID.current}/users/${uid}/walking`).set(false);
    },750);
  },[]);

  /* ── Chat ── */
  const handleSend=()=>{
    if(!chatIn.trim()) return;
    const me=users[UID.current];
    if(!me) return;
    const text=chatIn.trim(); setChatIn('');
    db.ref(`rooms/${SID.current}/chat`).push({
      name:me.name,avatar:me.avatar,color:me.color,photo:me.photo||null,
      text,time:nowTime(),ts:Date.now(),uid:UID.current,
    });
  };

  /* ── Reactions ── */
  const handleReact=(reactionId)=>{
    const speakerUid=session?.confra?.queue?.[session?.confra?.currentIdx||0];
    if(!speakerUid) return;
    db.ref(`sessions/${SID.current}/reactions/${speakerUid}/${UID.current}`).set(reactionId);
  };
  const myReaction=useMemo(()=>{
    const speakerUid=session?.confra?.queue?.[session?.confra?.currentIdx||0];
    if(!speakerUid) return null;
    return reactions?.[speakerUid]?.[UID.current]||null;
  },[reactions,session]);

  /* ── Phase management ── */
  const startConfra=async(confraUsers)=>{
    const queue=confraUsers.map(([uid])=>uid).sort(()=>Math.random()-.5);
    await db.ref(`sessions/${SID.current}`).set({
      phase:'confra',confra:{active:true,queue,currentIdx:0,startTime:Date.now()}
    });
  };

  const nextSpeaker=async()=>{
    const confra=session?.confra;
    if(!confra) return;
    const next=(confra.currentIdx||0)+1;
    if(next>=confra.queue.length) await endConfra();
    else{
      await db.ref(`sessions/${SID.current}/confra/currentIdx`).set(next);
      await db.ref(`sessions/${SID.current}/reactions`).remove();
    }
  };

  const endConfra=async()=>{
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','confra/active':false});
    setEndBanner('confra');
  };

  const startRepaso=async()=>{
    await db.ref(`sessions/${SID.current}`).set({
      phase:'repaso',repaso:{active:true,startTime:Date.now()},
    });
  };

  const endRepaso=async()=>{
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','repaso/active':false});
    setEndBanner('repaso');
  };

  const startJuegos=async()=>{
    await db.ref(`sessions/${SID.current}`).set({
      phase:'juegos',juegos:{active:true,startTime:Date.now()},
    });
  };

  const endJuegos=async()=>{
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','juegos/active':false});
  };

  const phase=session?.phase||'waiting';
  const usersArr=Object.entries(users);

  /* ════ LOADING ════ */
  if(view==='loading') return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:20,
      background:'var(--navy)',position:'relative',overflow:'hidden'}}>
      <BgTriangles/>
      <div style={{position:'relative',zIndex:1,textAlign:'center',animation:'fadeUp .6s var(--ease-out)'}}>
        <BookLogo size={80}/>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:28,color:'#ffd000',letterSpacing:'.1em',marginTop:10,textTransform:'uppercase'}}>
          MARANATA CLASS
        </div>
        <div style={{fontSize:12,color:'var(--muted)',marginTop:3,letterSpacing:'.06em'}}>
          IGLESIA ADVENTISTA · LAS CONDES
        </div>
        <div style={{marginTop:24,display:'flex',justifyContent:'center'}}>
          <Spinner size={32}/>
        </div>
      </div>
    </div>
  );

  /* ════ AUTH ════ */
  if(view==='auth') return(
    <div style={pageWrap}>
      <BgTriangles/>
      <div style={cardStyle}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <BookLogo size={70}/>
          <h1 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:30,color:'#ffd000',letterSpacing:'.06em',
            textTransform:'uppercase',lineHeight:1,marginTop:10}}>MARANATA CLASS</h1>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:6}}>
            <div style={{height:1,width:40,background:'rgba(255,208,0,.2)'}}/>
            <p style={{color:'var(--muted)',fontSize:11,letterSpacing:'.08em',
              textTransform:'uppercase',fontFamily:'Barlow Condensed,sans-serif'}}>
              Adventista Las Condes
            </p>
            <div style={{height:1,width:40,background:'rgba(255,208,0,.2)'}}/>
          </div>
        </div>

        <div style={{display:'flex',background:'rgba(255,255,255,.04)',
          borderRadius:12,padding:4,marginBottom:20,border:'1px solid rgba(255,208,0,.1)'}}>
          {[{id:'login',l:'Ingresar'},{id:'register',l:'Registrarse'}].map(t=>(
            <button key={t.id} onClick={()=>{setAuthMode(t.id);setAuthError('');}} style={{
              flex:1,padding:'9px 4px',borderRadius:9,border:'none',
              background:authMode===t.id?'linear-gradient(135deg,#ffd000,#e6a800)':'transparent',
              color:authMode===t.id?'#07091f':'var(--muted)',
              fontSize:13,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
              letterSpacing:'.04em',textTransform:'uppercase',transition:'all .18s'}}>
              {t.l}
            </button>
          ))}
        </div>

        <div style={{marginBottom:12}}>
          <label style={labelStyle}>Correo electrónico</label>
          <input type="email" value={email}
            onChange={e=>{setEmail(e.target.value);setAuthError('');}}
            onKeyDown={e=>e.key==='Enter'&&handleEmailAuth()}
            placeholder="tucorreo@gmail.com" style={inputStyle}/>
        </div>
        <div style={{marginBottom:authError?10:18}}>
          <label style={labelStyle}>Contraseña</label>
          <input type="password" value={password}
            onChange={e=>{setPassword(e.target.value);setAuthError('');}}
            onKeyDown={e=>e.key==='Enter'&&handleEmailAuth()}
            placeholder="••••••••" style={inputStyle}/>
        </div>

        {authError&&(
          <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',
            borderRadius:8,padding:'10px 12px',marginBottom:14,fontSize:12,color:'#fca5a5',
            lineHeight:1.5}}>⚠️ {authError}</div>
        )}

        <button onClick={handleEmailAuth} disabled={authLoad||!email.trim()||!password}
          style={btnYellow(authLoad||!email.trim()||!password)}>
          {authLoad?<Spinner size={18} color="#07091f"/>
            :authMode==='login'?'Ingresar →':'Crear cuenta →'}
        </button>

        <div style={{display:'flex',alignItems:'center',gap:10,margin:'16px 0'}}>
          <div style={{flex:1,height:1,background:'rgba(255,208,0,.1)'}}/>
          <span style={{fontSize:11,color:'var(--muted)'}}>o continúa con</span>
          <div style={{flex:1,height:1,background:'rgba(255,208,0,.1)'}}/>
        </div>

        <button onClick={handleGoogle} disabled={authLoad} style={{
          width:'100%',padding:12,borderRadius:12,border:'none',
          background:'white',color:'#111',fontSize:14,fontWeight:600,
          display:'flex',alignItems:'center',justifyContent:'center',gap:10,
          boxShadow:'0 2px 14px rgba(0,0,0,.4)',fontFamily:'Barlow,sans-serif'}}>
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.4-4z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.5 26.9 36 24 36c-5.2 0-9.6-2.9-11.3-7.1l-6.6 5.1C9.7 39.6 16.3 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.5 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/>
          </svg>
          Continuar con Google
        </button>
      </div>
    </div>
  );

  /* ════ SETUP ════ */
  if(view==='setup') return(
    <div style={pageWrap}>
      <BgTriangles/>
      <div style={cardStyle}>
        <div style={{textAlign:'center',marginBottom:18}}>
          <div style={{fontSize:40,marginBottom:8}}>👋</div>
          <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:22,
            color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>¡Bienvenido!</h2>
          <p style={{color:'var(--muted)',fontSize:12,marginTop:4}}>
            Personaliza tu personaje para la sala
          </p>
        </div>

        <div style={{display:'flex',justifyContent:'center',marginBottom:14}}>
          <div style={{position:'relative',cursor:'pointer'}}
            onClick={()=>document.getElementById('setupPhoto')?.click()}>
            <AvatarBubble profile={profile} size={70}/>
            <div style={{position:'absolute',bottom:-2,right:-2,width:22,height:22,
              borderRadius:'50%',background:'#ffd000',display:'flex',
              alignItems:'center',justifyContent:'center',fontSize:12,color:'#07091f'}}>📷</div>
          </div>
          {/* No capture attribute: allows gallery AND camera */}
          <input id="setupPhoto" type="file" accept="image/*"
            style={{display:'none'}}
            onChange={async e=>{
              const f=e.target.files[0]; if(!f) return;
              const b64=await compressImage(f,220);
              setProfile(p=>({...p,photo:b64}));
            }}/>
        </div>

        <div style={{marginBottom:12}}>
          <label style={labelStyle}>Tu nombre</label>
          <input value={profile.name}
            onChange={e=>setProfile(p=>({...p,name:e.target.value}))}
            placeholder="¿Cómo quieres que te vean?"
            style={inputStyle}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={labelStyle}>Avatar (si no usas foto)</label>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5}}>
            {AVATARS.map(a=>(
              <button key={a} onClick={()=>setProfile(p=>({...p,avatar:a}))} style={{
                background:profile.avatar===a?'rgba(255,208,0,.15)':'rgba(255,255,255,.03)',
                border:profile.avatar===a?`2px solid ${profile.color}`:'2px solid rgba(255,255,255,.06)',
                borderRadius:10,padding:'7px 2px',fontSize:19,
                display:'flex',alignItems:'center',justifyContent:'center',
                transition:'all .15s'}}>
                {a}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <label style={labelStyle}>Color de aura</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {COLORS.map(c=>(
              <div key={c} onClick={()=>setProfile(p=>({...p,color:c}))} style={{
                width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                border:profile.color===c?'3px solid white':'3px solid transparent',
                boxShadow:profile.color===c?`0 0 14px ${c}`:'none',transition:'all .15s'}}/>
            ))}
          </div>
        </div>

        <button onClick={()=>saveProfile(profile)}
          disabled={!profile.name.trim()||setupSaving}
          style={btnYellow(!profile.name.trim()||setupSaving)}>
          {setupSaving
            ?<><Spinner size={18} color="#07091f"/>Guardando...</>
            :'Entrar a la sala ✨'}
        </button>
        {setupError&&(
          <div style={{marginTop:10,color:'#fca5a5',fontSize:12,

/* ════ KAHOOT ════ */
const ANS_COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12'];
const ANS_SHAPES=['▲','◆','●','■'];

function Confetti(){
  const pieces=React.useMemo(()=>Array.from({length:28},(_,i)=>({
    id:i,x:Math.random()*100,delay:Math.random()*2,dur:2.5+Math.random()*2,
    color:['#ffd000','#ec4899','#22d3ee','#10b981','#8b5cf6'][i%5],
    size:6+Math.random()*8,
  })),[]);
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:300,overflow:'hidden'}}>
      {pieces.map(p=>(
        <div key={p.id} style={{
          position:'absolute',left:`${p.x}%`,top:-20,
          width:p.size,height:p.size,background:p.color,borderRadius:p.size/4,
          animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`}}/>
      ))}
    </div>
  );
}

function KahootQuestion({question,qIndex,total,myAnswer,onAnswer,timeLeft,gameState}){
  const answered=myAnswer!==null&&myAnswer!==undefined;
  const showResult=gameState==='results';
  return(
    <div style={{position:'fixed',inset:0,zIndex:200,background:'var(--navy)',
      display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{background:'linear-gradient(135deg,#0d1035,#141744)',
        padding:'10px 16px',display:'flex',alignItems:'center',
        justifyContent:'space-between',flexShrink:0,
        borderBottom:'1px solid rgba(139,92,246,.2)'}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
          fontSize:12,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em'}}>
          Pregunta {qIndex+1} / {total}
        </div>
        <div style={{width:44,height:44,borderRadius:'50%',
          background:timeLeft<=5?'rgba(239,68,68,.15)':'rgba(139,92,246,.15)',
          border:`2px solid ${timeLeft<=5?'#ef4444':'#8b5cf6'}`,
          display:'flex',alignItems:'center',justifyContent:'center',
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:18,
          color:timeLeft<=5?'#ef4444':'#8b5cf6',
          animation:timeLeft<=5&&!showResult?'timerTick .5s infinite':undefined}}>
          {showResult?'✓':timeLeft}
        </div>
      </div>
      {!showResult&&(
        <div style={{height:4,background:'rgba(255,255,255,.06)',flexShrink:0}}>
          <div style={{height:'100%',background:timeLeft<=5?'#ef4444':'#8b5cf6',
            width:`${(timeLeft/15)*100}%`,transition:'width 1s linear',borderRadius:2}}/>
        </div>
      )}
      <div style={{flex:'0 0 auto',padding:'14px 14px 10px',
        display:'flex',alignItems:'center',justifyContent:'center',minHeight:90}}>
        <div style={{background:'linear-gradient(135deg,#0d1035,#141744)',
          border:'1px solid rgba(139,92,246,.2)',borderRadius:16,
          padding:'14px 16px',textAlign:'center',width:'100%',maxWidth:500,
          fontFamily:'Barlow,sans-serif',fontWeight:600,fontSize:16,
          color:'var(--white)',lineHeight:1.4,
          boxShadow:'0 4px 20px rgba(0,0,0,.4)'}}>
          {question.text}
        </div>
      </div>
      <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',
        gap:10,padding:'0 12px 16px',alignContent:'start'}}>
        {question.options.map((opt,i)=>{
          const isMyAnswer=myAnswer===i;
          const isCorrect=question.correct===i;
          let bg=ANS_COLORS[i];
          let border='transparent';
          let badge=null;
          if(showResult){
            if(isCorrect){border='white';badge='✅';}
            else{bg='rgba(255,255,255,.06)';border='rgba(255,255,255,.1)';}
          } else if(answered&&!isMyAnswer){
            bg='rgba(255,255,255,.06)';border='rgba(255,255,255,.08)';
          }
          return(
            <button key={i} onClick={()=>!answered&&!showResult&&onAnswer(i)}
              disabled={answered||showResult}
              style={{background:bg,border:`2px solid ${border}`,
                borderRadius:14,padding:'12px 8px',
                display:'flex',flexDirection:'column',alignItems:'center',
                justifyContent:'center',gap:5,minHeight:88,
                color:'white',textAlign:'center',
                fontFamily:'Barlow,sans-serif',fontWeight:600,fontSize:13,
                boxShadow:isMyAnswer&&!showResult?`0 0 18px ${ANS_COLORS[i]}88`:undefined,
                animation:isMyAnswer&&!showResult?'answerPop .3s var(--ease-out)':undefined,
                transition:'background .35s,border .35s',
                cursor:answered||showResult?'default':'pointer'}}>
              <span style={{fontSize:18,opacity:.7}}>{ANS_SHAPES[i]}</span>
              <span style={{lineHeight:1.3}}>{opt}</span>
              {badge&&<span style={{fontSize:16}}>{badge}</span>}
              {showResult&&isMyAnswer&&!isCorrect&&<span style={{fontSize:16}}>❌</span>}
            </button>
          );
        })}
      </div>
      {answered&&!showResult&&(
        <div style={{position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',
          background:'rgba(7,9,31,.96)',border:'1px solid rgba(139,92,246,.3)',
          borderRadius:20,padding:'8px 20px',
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
          fontSize:13,color:'#8b5cf6',letterSpacing:'.04em',textTransform:'uppercase'}}>
          ✓ Enviada — esperando...
        </div>
      )}
    </div>
  );
}

      display:'flex',flexDirection:'column',alignItems:'center',

        border:`2px solid ${isRight?'rgba(16,185,129,.4)':'rgba(239,68,68,.3)'}`,

        <div style={{marginTop:6,background:ANS_COLORS[correct],borderRadius:10,
          padding:'7px 14px',fontFamily:'Barlow,sans-serif',fontWeight:600,

          <div style={{fontSize:13,color:'var(--muted)'}}>puntos<br/><span style={{color:'var(--white)',fontWeight:700}}>Total: {myScore}</span></div>

      <div style={{fontSize:11,color:'var(--muted)'}}>Pregunta {qIdx+1} de {total}</div>

              border:'none',borderRadius:12,padding:'12px 26px',
              color:'white',fontWeight:800,fontSize:14,
              fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
              textTransform:'uppercase',boxShadow:'0 0 20px rgba(139,92,246,.4)'}}>
              Siguiente →
            </button>
          ):(
            <button onClick={onFinish} style={{background:'linear-gradient(135deg,#10b981,#059669)',
              border:'none',borderRadius:12,padding:'12px 26px',
              color:'white',fontWeight:800,fontSize:14,
              fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
              textTransform:'uppercase',boxShadow:'0 0 20px rgba(16,185,129,.35)'}}>
              Ver ganador 🏆
            </button>
          )}
        </div>
      )}
      {!isAdmin&&<div style={{fontSize:12,color:'var(--muted)'}}>Esperando al profe...</div>}
    </div>
  );
}

function KahootLeaderboard({scores,users,isAdmin,isFinished,onClose}){

    .map(([uid,score])=>({uid,score,user:users[uid]||{name:'?',avatar:'👤',color:'#ffd000'}}))
    .sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  return(
    <div style={{position:'fixed',inset:0,zIndex:220,background:'var(--navy)',
      display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {isFinished&&<Confetti/>}
      <div style={{background:'linear-gradient(135deg,#0d1035,#141744)',
        padding:'14px 16px',textAlign:'center',flexShrink:0,
        borderBottom:'1px solid rgba(255,208,0,.15)'}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:22,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.06em'}}>
          {isFinished?'🏆 ¡Resultados finales!':'📊 Clasificación'}
        </div>
      </div>
      {isFinished&&sorted[0]&&(
        <div style={{padding:'16px',textAlign:'center',flexShrink:0}}>
          <div style={{fontSize:36,animation:'crownBounce 1.5s infinite'}}>👑</div>
          <AvatarBubble profile={sorted[0].user} size={68}/>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:24,color:'#ffd000',marginTop:8}}>{sorted[0].user.name}</div>
          <div style={{fontSize:13,color:'#ffd000',opacity:.7}}>{sorted[0].score} puntos</div>
        </div>
      )}
      <div style={{flex:1,overflowY:'auto',padding:'8px 14px 80px'}}>
        {sorted.map((item,i)=>(
          <div key={item.uid} style={{
            display:'flex',alignItems:'center',gap:12,
            background:i===0&&isFinished?'linear-gradient(135deg,rgba(255,208,0,.12),rgba(255,208,0,.04))':'rgba(255,255,255,.03)',
            border:i===0&&isFinished?'1px solid rgba(255,208,0,.25)':'1px solid rgba(255,255,255,.05)',
            borderRadius:12,padding:'10px 14px',marginBottom:8,
            animation:`scoreUp ${.1+i*.07}s var(--ease-out)`}}>
            <div style={{width:28,textAlign:'center',
              fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
              fontSize:i<3?22:16,color:i<3?'#ffd000':'var(--muted)'}}>
              {i<3?medals[i]:i+1}

            <AvatarBubble profile={item.user} size={34}/>
            <div style={{flex:1,fontFamily:'Barlow,sans-serif',fontWeight:600,
              fontSize:14,color:'white'}}>{item.user.name}</div>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
              fontSize:20,color:'#ffd000'}}>{item.score}</div>
          </div>

        <div style={{position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)'}}>
          <button onClick={onClose} style={{
            background:'linear-gradient(135deg,#8b5cf6,#6d28d9)',
            border:'none',borderRadius:14,padding:'13px 32px',
            color:'white',fontWeight:800,fontSize:14,
            fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
            textTransform:'uppercase',boxShadow:'0 0 22px rgba(139,92,246,.4)'}}>
            Cerrar juego ✓
