<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#080b12" />
  <title>Sala Joven · Adventista Las Condes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body, #root { height:100%; }
    body {
      background:#080b12; color:#e8eaf0;
      font-family:'DM Sans', sans-serif;
      overflow:hidden; -webkit-tap-highlight-color:transparent;
    }
    input { outline:none; transition:border-color .2s, box-shadow .2s; }
    input:focus {
      border-color:#6366f1 !important;
      box-shadow:0 0 0 3px rgba(99,102,241,.2) !important;
    }
    button { transition:opacity .15s, transform .1s; cursor:pointer; }
    button:active { opacity:.8; transform:scale(.97); }
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:#1f2937; border-radius:2px; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes glow {
      0%,100% { box-shadow:0 0 10px var(--gc,#6366f1); }
      50%      { box-shadow:0 0 24px var(--gc,#6366f1); }
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.25; } }
    @keyframes slideIn {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes pop {
      0%  { transform:translate(-50%,-50%) scale(.6); }
      65% { transform:translate(-50%,-50%) scale(1.12); }
      100%{ transform:translate(-50%,-50%) scale(1); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyBVxSunkMPoNtma8Zkc4WQMudl0m2di-5o",
      authDomain:        "mrnt-class.firebaseapp.com",
      databaseURL:       "https://mrnt-class-default-rtdb.firebaseio.com",
      projectId:         "mrnt-class",
      storageBucket:     "mrnt-class.firebasestorage.app",
      messagingSenderId: "1050908552799",
      appId:             "1:1050908552799:web:f81c53ccea104ad91d75ea",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.database();
    // Navegador recuerda el login aunque se cierre la app
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
  </script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const AVATARS = [
      '🦁','🐺','🦊','🐻','🐼','🦋','🦅','🐬','🦄','🐉',
      '⚡','🌟','🔥','🌊','🌙','🎭','🎸','⚽','🎮','🏄',
    ];
    const COLORS = [
      '#6366f1','#ec4899','#22d3ee','#10b981',
      '#f59e0b','#ef4444','#8b5cf6','#fb923c',
    ];

    const getSID  = () => new Date().toISOString().slice(0,10);
    const nowTime = () => new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});

    const AUTH_ERRORS = {
      'auth/user-not-found':          'No existe una cuenta con ese correo',
      'auth/wrong-password':          'Contraseña incorrecta',
      'auth/email-already-in-use':    'Ese correo ya tiene una cuenta',
      'auth/invalid-email':           'El correo no tiene un formato válido',
      'auth/weak-password':           'La contraseña debe tener al menos 6 caracteres',
      'auth/too-many-requests':       'Demasiados intentos. Espera unos minutos',
      'auth/invalid-credential':      'Correo o contraseña incorrectos',
      'auth/popup-closed-by-user':    '',
      'auth/cancelled-popup-request': '',
    };
    const getErr = code => AUTH_ERRORS[code] || 'Ocurrió un error. Intenta de nuevo';

    /* ══ ROOM CANVAS ════════════════════════════════════════ */
    function RoomCanvas({ users, myId, onDragStart, full }) {
      const entries = Object.entries(users);
      return (
        <div style={{
          width:'100%', height:'100%', position:'relative', overflow:'hidden',
          background:'#080b12',
          backgroundImage:`linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),
                           linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px)`,
          backgroundSize:'48px 48px',
        }}>
          {[['7%','16%','#6366f1'],['60%','46%','#22d3ee'],['38%','14%','#ec4899']].map(([l,t,c],i)=>(
            <div key={i} style={{position:'absolute',width:'32%',height:'32%',borderRadius:'50%',
              background:`radial-gradient(circle,${c}07,transparent 70%)`,
              left:l,top:t,pointerEvents:'none'}}/>
          ))}
          <div style={{
            position:'absolute',top:'3%',left:'50%',transform:'translateX(-50%)',
            width:full?'30%':'38%',minWidth:120,height:full?'8%':'9%',minHeight:30,
            background:'linear-gradient(135deg,#1a2645,#111d36)',
            border:'1.5px solid rgba(99,102,241,.45)',borderRadius:8,
            display:'flex',alignItems:'center',justifyContent:'center',gap:6,
            boxShadow:'0 0 22px rgba(99,102,241,.2)',
            color:'rgba(165,180,252,.5)',letterSpacing:'.1em',
            textTransform:'uppercase',fontSize:full?13:9,
          }}>
            {full
              ? <><span style={{width:7,height:7,borderRadius:'50%',background:'#ef4444',
                  display:'inline-block',animation:'blink 1.5s infinite'}}/>EN VIVO</>
              : '📺 Pantalla'}
          </div>
          {['32%','66%'].map((l,i)=>(
            <div key={i} style={{position:'absolute',top:'12%',left:l,width:'1.5%',
              height:'5%',minWidth:3,background:'rgba(99,102,241,.12)',borderRadius:2}}/>
          ))}
          {[[9,47,22,12],[37,57,22,12],[62,43,22,12]].map(([l,t,w,h],i)=>(
            <div key={i} style={{position:'absolute',left:`${l}%`,top:`${t}%`,
              width:`${w}%`,height:`${h}%`,
              background:'linear-gradient(135deg,#16213a,#0f1729)',
              border:'1px solid rgba(34,211,238,.1)',borderRadius:8,
              boxShadow:'0 6px 16px rgba(0,0,0,.5)'}}/>
          ))}
          {full && (<>
            <div style={{position:'absolute',top:18,left:'50%',transform:'translateX(-50%)',
              background:'rgba(8,11,18,.92)',border:'1px solid rgba(99,102,241,.2)',
              borderRadius:14,padding:'10px 24px',textAlign:'center',
              backdropFilter:'blur(8px)',zIndex:20}}>
              <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:22,
                color:'white',letterSpacing:'-.02em'}}>Sala Joven</div>
              <div style={{fontSize:12,color:'#4b5563',marginTop:2}}>
                Adventista Las Condes ·{' '}
                {new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'})}
              </div>
            </div>
            <div style={{position:'absolute',bottom:22,left:'50%',transform:'translateX(-50%)',
              background:'rgba(8,11,18,.92)',border:'1px solid rgba(34,211,238,.2)',
              borderRadius:20,padding:'8px 20px',
              display:'flex',alignItems:'center',gap:8,color:'#22d3ee',fontSize:14,zIndex:20}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:'#22d3ee',
                animation:'blink 1.5s infinite'}}/>
              {entries.length} {entries.length===1?'joven':'jóvenes'} en sala
            </div>
          </>)}
          {!full && (
            <div style={{position:'absolute',bottom:8,left:0,right:0,
              textAlign:'center',fontSize:9,color:'#1f2937',pointerEvents:'none'}}>
              ✨ Arrastra tu avatar para moverte
            </div>
          )}
          {entries.map(([uid,u])=>(
            <div key={uid}
              onMouseDown={!full&&uid===myId?onDragStart:undefined}
              onTouchStart={!full&&uid===myId?onDragStart:undefined}
              style={{
                position:'absolute',left:`${u.x??50}%`,top:`${u.y??50}%`,
                transform:'translate(-50%,-50%)',
                display:'flex',flexDirection:'column',alignItems:'center',
                cursor:!full&&uid===myId?'grab':'default',
                zIndex:uid===myId?10:5,
                animation:uid===myId?'pop .45s ease':'none',
                pointerEvents:full?'none':'auto',
              }}>
              <div style={{
                width:full?58:42,height:full?58:42,borderRadius:'50%',
                background:`radial-gradient(circle at 35% 35%,${u.color}33,${u.color}11)`,
                border:`2.5px solid ${u.color}`,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:full?28:20,'--gc':u.color,
                animation:uid===myId?'glow 2.5s ease-in-out infinite':'none',
                boxShadow:uid!==myId?`0 0 10px ${u.color}44`:undefined,
              }}>{u.avatar}</div>
              <div style={{
                marginTop:3,fontSize:full?11:8,color:'white',
                textShadow:`0 1px 6px ${u.color}99`,
                background:'rgba(8,11,18,.9)',padding:'2px 7px',borderRadius:20,
                maxWidth:full?84:62,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
              }}>{uid===myId?'⭐ '+u.name:u.name}</div>
            </div>
          ))}
        </div>
      );
    }

    /* ══ APP ════════════════════════════════════════════════ */
    function App() {
      /* vistas: loading | auth | setup | room | screen */
      const [view,      setView]      = useState('loading');
      const [authMode,  setAuthMode]  = useState('login');
      const [email,     setEmail]     = useState('');
      const [password,  setPassword]  = useState('');
      const [authError, setAuthError] = useState('');
      const [authLoad,  setAuthLoad]  = useState(false);
      const [name,      setName]      = useState('');
      const [avatar,    setAvatar]    = useState(null);
      const [color,     setColor]     = useState('#6366f1');
      const [tab,       setTab]       = useState('sala');
      const [users,     setUsers]     = useState({});
      const [msgs,      setMsgs]      = useState([]);
      const [myAtt,     setMyAtt]     = useState({});
      const [chatIn,    setChatIn]    = useState('');

      const UID     = useRef(null);
      const SID     = useRef(getSID());
      const roomRef = useRef(null);
      const isDrag  = useRef(false);
      const lastT   = useRef(0);
      const endRef  = useRef(null);

      /* ── Auth listener ── */
      useEffect(() => {
        const unsub = auth.onAuthStateChanged(async user => {
          if (user) {
            UID.current = user.uid;
            const snap = await db.ref(`profiles/${user.uid}`).get();
            const profile = snap.val();
            if (profile) {
              setName(profile.name);
              setAvatar(profile.avatar);
              setColor(profile.color);
              await joinRoom(user.uid, profile);
              setView('room');
            } else {
              setView('setup');
            }
          } else {
            UID.current = null;
            setView('auth');
          }
        });
        return () => unsub();
      }, []);

      /* ── Firebase room listeners ── */
      useEffect(() => {
        if (view !== 'room' && view !== 'screen') return;
        const sid = SID.current, uid = UID.current;
        const usersRef = db.ref(`rooms/${sid}/users`);
        usersRef.on('value', s => setUsers(s.val() || {}));
        const chatRef = db.ref(`rooms/${sid}/chat`);
        chatRef.on('value', s => {
          const val = s.val();
          if (val) setMsgs(Object.entries(val).map(([id,m])=>({id,...m})).sort((a,b)=>(a.ts||0)-(b.ts||0)));
          else setMsgs([]);
        });
        const attRef = db.ref(`attendance/${uid}`);
        attRef.on('value', s => setMyAtt(s.val() || {}));
        return () => { usersRef.off(); chatRef.off(); attRef.off(); };
      }, [view]);

      useEffect(() => {
        if (tab==='chat') setTimeout(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),50);
      }, [msgs, tab]);

      const joinRoom = async (uid, profile) => {
        const uRef = db.ref(`rooms/${SID.current}/users/${uid}`);
        await uRef.set({ name:profile.name, avatar:profile.avatar, color:profile.color,
          x:48, y:48, joinedAt:Date.now() });
        uRef.onDisconnect().remove();
        await db.ref(`attendance/${uid}/${SID.current}`).set({
          name:profile.name, avatar:profile.avatar, color:profile.color, timestamp:Date.now(),
        });
      };

      /* ── Auth handlers ── */
      const handleEmailAuth = async () => {
        if (!email.trim() || !password) return;
        setAuthLoad(true); setAuthError('');
        try {
          if (authMode==='login') await auth.signInWithEmailAndPassword(email.trim(), password);
          else await auth.createUserWithEmailAndPassword(email.trim(), password);
        } catch(err) { setAuthError(getErr(err.code)); setAuthLoad(false); }
      };

      const handleGoogle = async () => {
        setAuthLoad(true); setAuthError('');
        try {
          await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        } catch(err) { setAuthError(getErr(err.code)); setAuthLoad(false); }
      };

      const handleSetup = async () => {
        if (!name.trim() || !avatar) return;
        const profile = { name:name.trim(), avatar, color };
        await db.ref(`profiles/${UID.current}`).set(profile);
        await joinRoom(UID.current, profile);
        setView('room');
      };

      const handleSignOut = async () => {
        if (UID.current) await db.ref(`rooms/${SID.current}/users/${UID.current}`).remove();
        await auth.signOut();
        setUsers({}); setMsgs([]); setMyAtt({});
      };

      /* ── Drag ── */
      const onDragStart = useCallback(e => { e.preventDefault(); isDrag.current=true; }, []);
      const onDragMove  = useCallback(e => {
        if (!isDrag.current || !roomRef.current) return;
        const now = Date.now();
        if (now-lastT.current < 80) return;
        lastT.current = now;
        const rect = roomRef.current.getBoundingClientRect();
        const cx = e.touches?.[0]?.clientX ?? e.clientX;
        const cy = e.touches?.[0]?.clientY ?? e.clientY;
        db.ref(`rooms/${SID.current}/users/${UID.current}`).update({
          x:Math.max(4,Math.min(93,((cx-rect.left)/rect.width)*100)),
          y:Math.max(16,Math.min(92,((cy-rect.top)/rect.height)*100)),
        });
      }, []);
      const onDragEnd = useCallback(() => { isDrag.current=false; }, []);

      const handleSend = () => {
        if (!chatIn.trim()) return;
        const me = users[UID.current];
        if (!me) return;
        const text = chatIn.trim(); setChatIn('');
        db.ref(`rooms/${SID.current}/chat`).push({
          name:me.name, avatar:me.avatar, color:me.color,
          text, time:nowTime(), ts:Date.now(), uid:UID.current,
        });
      };

      const attSessions  = Object.keys(myAtt).sort().reverse();
      const totalPresent = attSessions.length;
      const streak = (() => {
        if (!attSessions.length) return 0;
        let s=1;
        for(let i=1;i<attSessions.length;i++){
          if((new Date(attSessions[i-1])-new Date(attSessions[i]))/86400000<=10) s++;
          else break;
        }
        return s;
      })();
      const usersArr = Object.entries(users);

      /* ── Estilos compartidos ── */
      const cardStyle = {
        width:'100%',maxWidth:420,
        background:'linear-gradient(145deg,#0d1321,#111827)',
        border:'1px solid rgba(99,102,241,.2)',borderRadius:22,padding:28,
        boxShadow:'0 0 70px rgba(99,102,241,.12),0 4px 40px rgba(0,0,0,.6)',
        animation:'fadeUp .4s ease',
      };
      const pageStyle = {
        minHeight:'100vh',background:'#080b12',
        display:'flex',alignItems:'center',justifyContent:'center',
        padding:20,overflowY:'auto',
        backgroundImage:'radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.09),transparent 60%)',
      };
      const inputStyle = {
        width:'100%',padding:'11px 14px',borderRadius:10,
        background:'#131b2e',border:'1px solid rgba(99,102,241,.2)',
        color:'white',fontSize:14,
      };
      const labelStyle = {
        fontSize:10,fontWeight:500,color:'#6b7280',
        textTransform:'uppercase',letterSpacing:'.07em',
        display:'block',marginBottom:6,
      };
      const spinnerStyle = {
        width:18,height:18,borderRadius:'50%',
        border:'2px solid rgba(255,255,255,.3)',borderTopColor:'white',
        animation:'spin .8s linear infinite',display:'inline-block',
      };

      /* ════════ LOADING ════════ */
      if (view==='loading') return (
        <div style={{height:'100vh',display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:16,background:'#080b12',
          backgroundImage:'radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.08),transparent 60%)'}}>
          <div style={{fontSize:48}}>⛪</div>
          <div style={{width:28,height:28,borderRadius:'50%',
            border:'3px solid rgba(99,102,241,.2)',borderTopColor:'#6366f1',
            animation:'spin .8s linear infinite'}}/>
          <div style={{color:'#374151',fontSize:13}}>Cargando...</div>
        </div>
      );

      /* ════════ AUTH ════════ */
      if (view==='auth') return (
        <div style={pageStyle}>
          <div style={cardStyle}>
            <div style={{textAlign:'center',marginBottom:22}}>
              <div style={{fontSize:44,marginBottom:8}}>⛪</div>
              <h1 style={{fontFamily:'Syne,sans-serif',fontSize:24,fontWeight:800,
                color:'white',letterSpacing:'-.02em'}}>Sala Joven</h1>
              <p style={{color:'#4b5563',fontSize:13,marginTop:3}}>Adventista Las Condes</p>
            </div>

            {/* Toggle */}
            <div style={{display:'flex',background:'#0a0e1a',borderRadius:12,padding:4,
              marginBottom:20,border:'1px solid rgba(99,102,241,.1)'}}>
              {[{id:'login',l:'Ingresar'},{id:'register',l:'Crear cuenta'}].map(t=>(
                <button key={t.id} onClick={()=>{setAuthMode(t.id);setAuthError('');}} style={{
                  flex:1,padding:'8px 4px',borderRadius:9,border:'none',
                  background:authMode===t.id?'linear-gradient(135deg,#6366f1,#4f46e5)':'transparent',
                  color:authMode===t.id?'white':'#4b5563',
                  fontSize:13,fontWeight:600,transition:'all .2s',
                }}>{t.l}</button>
              ))}
            </div>

            <div style={{marginBottom:12}}>
              <label style={labelStyle}>Correo electrónico</label>
              <input type="email" value={email}
                onChange={e=>{setEmail(e.target.value);setAuthError('');}}
                onKeyDown={e=>e.key==='Enter'&&handleEmailAuth()}
                placeholder="tucorreo@gmail.com" style={inputStyle}/>
            </div>

            <div style={{marginBottom:authError?10:18}}>
              <label style={labelStyle}>Contraseña</label>
              <input type="password" value={password}
                onChange={e=>{setPassword(e.target.value);setAuthError('');}}
                onKeyDown={e=>e.key==='Enter'&&handleEmailAuth()}
                placeholder="••••••••" style={inputStyle}/>
            </div>

            {authError && (
              <div style={{background:'rgba(239,68,68,.08)',
                border:'1px solid rgba(239,68,68,.2)',borderRadius:8,
                padding:'9px 12px',marginBottom:14,fontSize:12,
                color:'#fca5a5',lineHeight:1.4}}>
                ⚠️ {authError}
              </div>
            )}

            <button onClick={handleEmailAuth}
              disabled={authLoad||!email.trim()||!password} style={{
              width:'100%',padding:13,borderRadius:12,border:'none',
              background:authLoad||!email.trim()||!password
                ? '#1f2937'
                : 'linear-gradient(135deg,#6366f1,#4f46e5)',
              color:'white',fontSize:14,fontWeight:700,
              fontFamily:'Syne,sans-serif',
              boxShadow:!authLoad&&email.trim()&&password
                ?'0 0 28px rgba(99,102,241,.4)':'none',
              display:'flex',alignItems:'center',justifyContent:'center',gap:8,
            }}>
              {authLoad
                ? <div style={spinnerStyle}/>
                : authMode==='login' ? 'Ingresar →' : 'Crear cuenta →'}
            </button>

            <div style={{display:'flex',alignItems:'center',gap:10,margin:'16px 0'}}>
              <div style={{flex:1,height:1,background:'rgba(99,102,241,.12)'}}/>
              <span style={{fontSize:11,color:'#374151'}}>o continúa con</span>
              <div style={{flex:1,height:1,background:'rgba(99,102,241,.12)'}}/>
            </div>

            <button onClick={handleGoogle} disabled={authLoad} style={{
              width:'100%',padding:12,borderRadius:12,border:'none',
              background:'white',color:'#111',fontSize:14,fontWeight:600,
              display:'flex',alignItems:'center',justifyContent:'center',gap:10,
              boxShadow:'0 2px 12px rgba(0,0,0,.3)',
            }}>
              <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/>
                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.5 26.9 36 24 36c-5.2 0-9.6-2.9-11.3-7.1l-6.6 5.1C9.7 39.6 16.3 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.5 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/>
              </svg>
              Continuar con Google
            </button>
          </div>
        </div>
      );

      /* ════════ SETUP (primera vez) ════════ */
      if (view==='setup') return (
        <div style={pageStyle}>
          <div style={cardStyle}>
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{fontSize:38,marginBottom:6}}>👋</div>
              <h2 style={{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:800,color:'white'}}>
                ¡Bienvenido!
              </h2>
              <p style={{color:'#4b5563',fontSize:13,marginTop:4}}>
                Elige cómo quieres aparecer en la sala
              </p>
            </div>

            <div style={{marginBottom:14}}>
              <label style={labelStyle}>Tu nombre</label>
              <input value={name} onChange={e=>setName(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&handleSetup()}
                placeholder="¿Cómo te llamas?"
                style={inputStyle}/>
            </div>

            <div style={{marginBottom:14}}>
              <label style={labelStyle}>Tu avatar</label>
              <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6}}>
                {AVATARS.map(a=>(
                  <button key={a} onClick={()=>setAvatar(a)} style={{
                    background:avatar===a?'rgba(99,102,241,.18)':'rgba(255,255,255,.03)',
                    border:avatar===a?`2px solid ${color}`:'2px solid rgba(255,255,255,.06)',
                    borderRadius:10,padding:'8px 2px',fontSize:20,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    boxShadow:avatar===a?`0 0 14px ${color}55`:'none',transition:'all .15s',
                  }}>{a}</button>
                ))}
              </div>
            </div>

            <div style={{marginBottom:22}}>
              <label style={labelStyle}>Tu color</label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {COLORS.map(c=>(
                  <div key={c} onClick={()=>setColor(c)} style={{
                    width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                    border:color===c?'3px solid white':'3px solid transparent',
                    boxShadow:color===c?`0 0 14px ${c}`:'none',transition:'all .15s',
                  }}/>
                ))}
              </div>
            </div>

            <button onClick={handleSetup} disabled={!name.trim()||!avatar} style={{
              width:'100%',padding:13,borderRadius:12,border:'none',
              background:!name.trim()||!avatar
                ?'#1f2937':`linear-gradient(135deg,${color},${color}cc)`,
              color:'white',fontSize:15,fontWeight:700,fontFamily:'Syne,sans-serif',
              boxShadow:!name.trim()||!avatar?'none':`0 0 28px ${color}44`,
            }}>
              Entrar a la sala ✨
            </button>
            <p style={{textAlign:'center',marginTop:10,fontSize:11,color:'#1f2937'}}>
              Tu nombre y avatar se guardan para las próximas veces
            </p>
          </div>
        </div>
      );

      /* ════════ SCREEN ════════ */
      if (view==='screen') return (
        <div style={{width:'100vw',height:'100vh',overflow:'hidden',position:'relative'}}>
          <RoomCanvas users={users} myId={null} onDragStart={null} full={true}/>
          <button onClick={()=>setView('room')} style={{
            position:'fixed',bottom:20,right:20,zIndex:100,
            background:'rgba(8,11,18,.92)',border:'1px solid rgba(99,102,241,.3)',
            color:'#a5b4fc',padding:'8px 16px',borderRadius:20,fontSize:12,
          }}>✕ Salir</button>
        </div>
      );

      /* ════════ ROOM ════════ */
      return (
        <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#080b12'}}>

          <div style={{background:'#0a0e1a',borderBottom:'1px solid rgba(99,102,241,.1)',
            padding:'8px 14px',display:'flex',alignItems:'center',
            justifyContent:'space-between',flexShrink:0}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:20}}>⛪</span>
              <div>
                <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:14,color:'white'}}>
                  Sala Joven
                </div>
                <div style={{fontSize:10,color:'#374151'}}>
                  {usersArr.length} en sala ·{' '}
                  {new Date().toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <button onClick={()=>setView('screen')} style={{
                background:'rgba(99,102,241,.1)',border:'1px solid rgba(99,102,241,.25)',
                color:'#a5b4fc',padding:'6px 10px',borderRadius:20,fontSize:11,
              }}>📺</button>
              <button onClick={handleSignOut} title="Cerrar sesión" style={{
                background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.15)',
                color:'#f87171',padding:'6px 10px',borderRadius:20,fontSize:14,
              }}>↩</button>
            </div>
          </div>

          <div style={{background:'#0a0e1a',borderBottom:'1px solid rgba(99,102,241,.07)',
            display:'flex',flexShrink:0}}>
            {[
              {id:'sala',label:'🏠 Sala'},
              {id:'chat',label:'💬 Chat'},
              {id:'asistencia',label:'📊 Asist.'},
              {id:'juegos',label:'🎮 Juegos'},
            ].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                flex:1,padding:'10px 4px',background:'none',border:'none',
                fontFamily:'DM Sans,sans-serif',
                color:tab===t.id?'#a5b4fc':'#374151',
                fontSize:10,fontWeight:500,
                borderBottom:tab===t.id?'2px solid #6366f1':'2px solid transparent',
                transition:'all .2s',
              }}>{t.label}</button>
            ))}
          </div>

          <div style={{flex:1,overflow:'hidden',position:'relative'}}>

            {tab==='sala' && (
              <div ref={roomRef}
                onMouseMove={onDragMove} onMouseUp={onDragEnd} onMouseLeave={onDragEnd}
                onTouchMove={onDragMove} onTouchEnd={onDragEnd}
                style={{width:'100%',height:'100%',touchAction:'none',userSelect:'none'}}>
                <RoomCanvas users={users} myId={UID.current}
                  onDragStart={onDragStart} full={false}/>
              </div>
            )}

            {tab==='chat' && (
              <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
                <div style={{flex:1,overflowY:'auto',padding:'12px 14px',
                  display:'flex',flexDirection:'column',gap:10}}>
                  {msgs.length===0&&(
                    <div style={{textAlign:'center',color:'#1f2937',fontSize:13,marginTop:40}}>
                      Sé el primero en escribir 👋
                    </div>
                  )}
                  {msgs.map(m=>{
                    const isMe=m.uid===UID.current;
                    return (
                      <div key={m.id} style={{display:'flex',gap:10,
                        flexDirection:isMe?'row-reverse':'row',animation:'slideIn .2s ease'}}>
                        <div style={{width:34,height:34,borderRadius:'50%',flexShrink:0,
                          background:`${m.color}22`,border:`1.5px solid ${m.color}`,
                          display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>
                          {m.avatar}
                        </div>
                        <div style={{maxWidth:'70%'}}>
                          <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:3,
                            flexDirection:isMe?'row-reverse':'row'}}>
                            <span style={{fontSize:11,fontWeight:600,color:m.color}}>{m.name}</span>
                            <span style={{fontSize:10,color:'#374151'}}>{m.time}</span>
                          </div>
                          <div style={{
                            background:isMe?`${m.color}1a`:'#131b2e',padding:'8px 12px',
                            borderRadius:isMe?'12px 4px 12px 12px':'4px 12px 12px 12px',
                            fontSize:13,color:'#d1d5db',lineHeight:1.5,
                            border:isMe?`1px solid ${m.color}33`:'1px solid transparent',
                            wordBreak:'break-word',
                          }}>{m.text}</div>
                        </div>
                      </div>
                    );
                  })}
                  <div ref={endRef}/>
                </div>
                <div style={{padding:'10px 14px 14px',
                  borderTop:'1px solid rgba(99,102,241,.08)',display:'flex',gap:8}}>
                  <input value={chatIn} onChange={e=>setChatIn(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&handleSend()}
                    placeholder="Escribe algo..."
                    style={{flex:1,padding:'10px 14px',borderRadius:20,
                      background:'#131b2e',border:'1px solid rgba(99,102,241,.2)',
                      color:'white',fontSize:13,outline:'none'}}/>
                  <button onClick={handleSend} style={{background:'#6366f1',border:'none',
                    borderRadius:20,color:'white',padding:'10px 18px',fontSize:18}}>↑</button>
                </div>
              </div>
            )}

            {tab==='asistencia' && (
              <div style={{overflowY:'auto',height:'100%',padding:14}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:18}}>
                  {[
                    {label:'Esta clase',    value:usersArr.length, sub:'presentes',       color:'#22d3ee'},
                    {label:'Tu asistencia', value:totalPresent,    sub:'clases este año', color:'#10b981'},
                    {label:'Racha 🔥',      value:streak,           sub:'semanas seguidas',color:'#f59e0b'},
                  ].map(st=>(
                    <div key={st.label} style={{background:'#0d1321',
                      border:'1px solid rgba(99,102,241,.07)',
                      borderLeft:`3px solid ${st.color}`,borderRadius:12,padding:12}}>
                      <div style={{fontSize:10,color:'#4b5563',marginBottom:2}}>{st.label}</div>
                      <div style={{fontSize:26,fontFamily:'Syne,sans-serif',
                        fontWeight:800,color:st.color}}>{st.value}</div>
                      <div style={{fontSize:10,color:'#374151'}}>{st.sub}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:10,color:'#4b5563',textTransform:'uppercase',
                  letterSpacing:'.07em',marginBottom:8}}>Presentes hoy</div>
                {usersArr.map(([uid,u])=>(
                  <div key={uid} style={{display:'flex',alignItems:'center',gap:10,
                    background:'#0d1321',padding:'8px 12px',borderRadius:10,marginBottom:6,
                    border:`1px solid ${uid===UID.current?u.color+'33':'rgba(99,102,241,.07)'}`}}>
                    <div style={{width:30,height:30,borderRadius:'50%',
                      background:`${u.color}22`,border:`1.5px solid ${u.color}`,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:15,flexShrink:0}}>{u.avatar}</div>
                    <span style={{fontSize:13,color:'white',flex:1}}>
                      {u.name}
                      {uid===UID.current&&<span style={{color:u.color,fontSize:10}}> (tú)</span>}
                    </span>
                    <span style={{fontSize:10,color:'#22d3ee',
                      background:'rgba(34,211,238,.08)',padding:'2px 8px',borderRadius:20}}>✓</span>
                  </div>
                ))}
                {attSessions.length>0&&(
                  <div style={{marginTop:16}}>
                    <div style={{fontSize:10,color:'#4b5563',textTransform:'uppercase',
                      letterSpacing:'.07em',marginBottom:8}}>Tu historial</div>
                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                      {attSessions.slice(0,16).map(sid=>(
                        <div key={sid} style={{background:'#0d1321',padding:'8px 10px',
                          borderRadius:10,textAlign:'center',
                          border:'1px solid rgba(16,185,129,.15)'}}>
                          <div style={{fontSize:14,marginBottom:2}}>✅</div>
                          <div style={{fontSize:8,color:'#4b5563'}}>
                            {new Date(sid+'T12:00:00').toLocaleDateString('es-CL',
                              {day:'numeric',month:'short'})}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {tab==='juegos' && (
              <div style={{height:'100%',display:'flex',flexDirection:'column',
                alignItems:'center',justifyContent:'center',
                gap:14,padding:24,textAlign:'center'}}>
                <div style={{fontSize:52,filter:'drop-shadow(0 0 22px rgba(99,102,241,.45))'}}>🎮</div>
                <h2 style={{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:800,color:'white'}}>
                  Juegos · Próximamente
                </h2>
                <p style={{color:'#4b5563',fontSize:13,maxWidth:220,lineHeight:1.6}}>
                  El profe está preparando algo especial 👀<br/>Vuelve pronto.
                </p>
                <div style={{background:'rgba(99,102,241,.08)',
                  border:'1px solid rgba(99,102,241,.2)',
                  borderRadius:12,padding:'10px 20px',color:'#6366f1',fontSize:12}}>
                  🔒 Sala bloqueada
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
