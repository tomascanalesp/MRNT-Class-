});

/* ════════════════════════ APP PRINCIPAL ════════════════════════ */
function App(){
  /* ── Vista y auth ── */
  const[view,        setView]        =useState('loading');
  const[authMode,    setAuthMode]    =useState('login');
  const[email,       setEmail]       =useState('');
  const[password,    setPassword]    =useState('');
  const[authError,   setAuthError]   =useState('');
  const[authLoad,    setAuthLoad]    =useState(false);

  /* ── Perfil ── */
  const[profile,     setProfile]     =useState({name:'',avatar:null,color:'#ffd000',photo:null});
  const[isAdmin,     setIsAdmin]     =useState(false);
  const[setupSaving, setSetupSaving] =useState(false);
  const[setupError,  setSetupError]  =useState('');

  /* ── Modales ── */
  const[editOpen,    setEditOpen]    =useState(false);
  const[attOpen,     setAttOpen]     =useState(false);
  const[endBanner,   setEndBanner]   =useState(null); // 'confra'|'repaso'|null

  /* ── Sala ── */
  const[users,       setUsers]       =useState({});
  const[msgs,        setMsgs]        =useState([]);
  const[myAtt,       setMyAtt]       =useState({});
  const[session,     setSession]     =useState(null);
  const[reactions,   setReactions]   =useState({});
  const[gameHistory, setGameHistory] =useState({});
  const[chatIn,      setChatIn]      =useState('');

  const UID    =useRef(null);
  const SID    =useRef(getSID());
  const roomRef=useRef(null);
  const isDrag =useRef(false);
  const lastT  =useRef(0);
  const endRef =useRef(null);

  /* ── body class ── */
  useEffect(()=>{
    if(view==='room'||view==='screen') document.body.classList.add('in-room');
    else document.body.classList.remove('in-room');
  },[view]);

  /* ── Auth listener ── */
  useEffect(()=>{
    const t=setTimeout(()=>{ if(view==='loading') setView('auth'); },8000);
    const unsub=auth.onAuthStateChanged(async user=>{
      clearTimeout(t);
      if(user){
        UID.current=user.uid;
        try{
          const snap=await db.ref(`profiles/${user.uid}`).get();
          const p=snap.val();
          if(p&&p.name){
            setProfile(p);
            setIsAdmin(!!p.isAdmin);
            await joinRoom(user.uid,p);
            setView('room');
          } else setView('setup');
        } catch(e){ console.error(e); setView('setup'); }
      } else { UID.current=null; setView('auth'); }
    });
    return()=>{ clearTimeout(t); unsub(); };
  },[]);

  /* ── Firebase listeners sala ── */
  useEffect(()=>{
    if(view!=='room'&&view!=='screen') return;
    const sid=SID.current, uid=UID.current;
    if(!uid) return;
    const refs={
      users: db.ref(`rooms/${sid}/users`),
      chat:  db.ref(`rooms/${sid}/chat`),
      att:   db.ref(`attendance/${uid}`),
      sess:  db.ref(`sessions/${sid}`),
      reac:  db.ref(`sessions/${sid}/reactions`),
      hist:  db.ref(`gameHistory/${uid}`),
    };
    refs.users.on('value',s=>setUsers(s.val()||{}));
    refs.chat.on('value',s=>{
      const v=s.val();
      if(v) setMsgs(Object.entries(v).map(([id,m])=>({id,...m})).sort((a,b)=>(a.ts||0)-(b.ts||0)));
      else setMsgs([]);
    });
    refs.att.on('value',s=>setMyAtt(s.val()||{}));
    refs.sess.on('value',s=>setSession(s.val()));
    refs.reac.on('value',s=>setReactions(s.val()||{}));
    refs.hist.on('value',s=>setGameHistory(s.val()||{}));
    return()=>Object.values(refs).forEach(r=>r.off());
  },[view]);

  /* ── Scroll chat ── */
  useEffect(()=>{
    if(session?.phase==='repaso')
      setTimeout(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),60);
  },[msgs]);

  /* ── Helpers ── */
  const joinRoom=async(uid,p)=>{
    const uRef=db.ref(`rooms/${SID.current}/users/${uid}`);
    await uRef.set({
      name:p.name,avatar:p.avatar,color:p.color,photo:p.photo||null,
      zone:'lobby',x:48,y:48,joinedAt:Date.now(),
    });
    uRef.onDisconnect().remove();
    await db.ref(`attendance/${uid}/${SID.current}`).set({
      name:p.name,avatar:p.avatar,color:p.color,timestamp:Date.now(),
    });
  };

  const saveProfile=async(newProfile)=>{
    const uid=UID.current;
    if(!uid) return;
    setSetupSaving(true); setSetupError('');
    try{
      await db.ref(`profiles/${uid}`).set({...newProfile,isAdmin:isAdmin||false});
      try{
        await db.ref(`rooms/${SID.current}/users/${uid}`).update({
          name:newProfile.name,avatar:newProfile.avatar,
          color:newProfile.color,photo:newProfile.photo||null,
        });
      }catch(e){}
      setProfile(newProfile);
      setEditOpen(false);
      if(view==='setup'){
        await joinRoom(uid,newProfile);
        setView('room');
      }
    }catch(e){
      console.error(e);
      setSetupError('No se pudo guardar. Verifica tu conexión.');
    }
    setSetupSaving(false);
  };

  /* ── Auth handlers ── */
  const handleEmailAuth=async()=>{
    if(!email.trim()||!password) return;
    setAuthLoad(true); setAuthError('');
    try{
      if(authMode==='login') await auth.signInWithEmailAndPassword(email.trim(),password);
      else await auth.createUserWithEmailAndPassword(email.trim(),password);
    }catch(e){ setAuthError(getErr(e.code)); setAuthLoad(false); }
  };

  const handleGoogle=async()=>{
    setAuthLoad(true); setAuthError('');
    try{
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }catch(e){
      if(e.code&&!['auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(e.code))
        setAuthError(getErr(e.code));
      setAuthLoad(false);
    }
  };

  const handleSignOut=async()=>{
    try{ await db.ref(`rooms/${SID.current}/users/${UID.current}`).remove(); }catch(e){}
    await auth.signOut();
    setUsers({}); setMsgs([]); setMyAtt({}); setSession(null);
  };

  /* ── Drag ── */
  const onDragStart=useCallback(e=>{e.preventDefault();isDrag.current=true;},[]);
  const onDragMove=useCallback(e=>{
    if(!isDrag.current||!roomRef.current) return;
    const now=Date.now();
    if(now-lastT.current<60) return;
    lastT.current=now;
    const rect=roomRef.current.getBoundingClientRect();
    const cx=e.touches?.[0]?.clientX??e.clientX;
    const cy=e.touches?.[0]?.clientY??e.clientY;
    const x=Math.max(2,Math.min(96,((cx-rect.left)/rect.width)*100));
    const y=Math.max(14,Math.min(94,((cy-rect.top)/rect.height)*100));
    const zone=detectZone(x,y);
    db.ref(`rooms/${SID.current}/users/${UID.current}`).update({x,y,zone});
  },[]);
  const onDragEnd=useCallback(()=>{isDrag.current=false;},[]);

  /* ── Chat ── */
  const handleSend=()=>{
    if(!chatIn.trim()) return;
    const me=users[UID.current];
    if(!me) return;
    const text=chatIn.trim(); setChatIn('');
    db.ref(`rooms/${SID.current}/chat`).push({
      name:me.name,avatar:me.avatar,color:me.color,photo:me.photo||null,
      text,time:nowTime(),ts:Date.now(),uid:UID.current,
    });
  };

  /* ── Reaccionar ── */
  const handleReact=(reactionId)=>{
    const speakerUid=session?.confra?.queue?.[session?.confra?.currentIdx||0];
    if(!speakerUid) return;
    db.ref(`sessions/${SID.current}/reactions/${speakerUid}/${UID.current}`).set(reactionId);
  };
  const myReaction=useMemo(()=>{
    const speakerUid=session?.confra?.queue?.[session?.confra?.currentIdx||0];
    if(!speakerUid) return null;
    return reactions?.[speakerUid]?.[UID.current]||null;
  },[reactions,session]);

  /* ── Admin: gestión de fases ── */
  const startConfra=async(confraUsers)=>{
    const queue=confraUsers.map(([uid])=>uid).sort(()=>Math.random()-.5);
    await db.ref(`sessions/${SID.current}`).set({
      phase:'confra',
      confra:{
        active:true,
        queue,
        currentIdx:0,
        startTime:Date.now(),
      }
    });
  };

  const nextSpeaker=async()=>{
    const confra=session?.confra;
    if(!confra) return;
    const next=(confra.currentIdx||0)+1;
    if(next>=confra.queue.length){
      await endConfra();
    } else {
      await db.ref(`sessions/${SID.current}/confra/currentIdx`).set(next);
      await db.ref(`sessions/${SID.current}/reactions`).remove();
    }
  };

  const endConfra=async()=>{
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','confra/active':false});
    setEndBanner('confra');
  };

  const startRepaso=async()=>{
    await db.ref(`sessions/${SID.current}`).set({
      phase:'repaso',
      repaso:{active:true,startTime:Date.now()},
    });
  };

  const endRepaso=async()=>{
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','repaso/active':false});
    setEndBanner('repaso');
  };

  const startJuegos=async()=>{
    await db.ref(`sessions/${SID.current}`).set({
      phase:'juegos',
      juegos:{active:true,startTime:Date.now()},
    });
  };

  const endJuegos=async()=>{
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','juegos/active':false});
  };

  const phase=session?.phase||'waiting';
  const usersArr=Object.entries(users);
  const attSessions=Object.keys(myAtt).sort().reverse();
  const streak=(()=>{
    if(!attSessions.length) return 0;
    let s=1;
    for(let i=1;i<attSessions.length;i++){
      if((new Date(attSessions[i-1])-new Date(attSessions[i]))/86400000<=10) s++;
      else break;
    }
    return s;
  })();

  /* ════ LOADING ════ */
  if(view==='loading') return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:20,
      background:'var(--navy)',position:'relative',overflow:'hidden'}}>
      <BgTriangles/>
      <div style={{position:'relative',zIndex:1,textAlign:'center'}}>
        <BookLogo size={80}/>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:26,color:'#ffd000',letterSpacing:'.08em',marginTop:10}}>MARANATA CLASS</div>
        <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Las Condes</div>
        <div style={{marginTop:20,display:'flex',justifyContent:'center'}}>
          <Spinner size={32}/>
        </div>
      </div>
    </div>
  );

  /* ════ AUTH ════ */
  if(view==='auth') return(
    <div style={pageWrap}>
      <BgTriangles/>
      <div style={cardStyle}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <BookLogo size={70}/>
          <h1 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:28,color:'#ffd000',letterSpacing:'.05em',
            textTransform:'uppercase',lineHeight:1,marginTop:8}}>MARANATA CLASS</h1>
          <p style={{color:'var(--muted)',fontSize:12,marginTop:4}}>Adventista Las Condes</p>
        </div>
        <div style={{display:'flex',background:'rgba(255,255,255,.04)',
          borderRadius:12,padding:4,marginBottom:20,
          border:'1px solid rgba(255,208,0,.1)'}}>
          {[{id:'login',l:'Ingresar'},{id:'register',l:'Registrarse'}].map(t=>(
            <button key={t.id} onClick={()=>{setAuthMode(t.id);setAuthError('');}} style={{
              flex:1,padding:'9px 4px',borderRadius:9,border:'none',
              background:authMode===t.id?'linear-gradient(135deg,#ffd000,#e6a800)':'transparent',
              color:authMode===t.id?'#07091f':'var(--muted)',
              fontSize:13,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
              letterSpacing:'.04em',textTransform:'uppercase',transition:'all .2s',
            }}>{t.l}</button>
          ))}
        </div>
        <div style={{marginBottom:12}}>
          <label style={labelStyle}>Correo electrónico</label>
          <input type="email" value={email}
            onChange={e=>{setEmail(e.target.value);setAuthError('');}}
            onKeyDown={e=>e.key==='Enter'&&handleEmailAuth()}
            placeholder="tucorreo@gmail.com" style={inputStyle}/>
        </div>
        <div style={{marginBottom:authError?10:18}}>
          <label style={labelStyle}>Contraseña</label>
          <input type="password" value={password}
            onChange={e=>{setPassword(e.target.value);setAuthError('');}}
            onKeyDown={e=>e.key==='Enter'&&handleEmailAuth()}
            placeholder="••••••••" style={inputStyle}/>
        </div>
        {authError&&(
          <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',
            borderRadius:8,padding:'10px 12px',marginBottom:14,
            fontSize:12,color:'#fca5a5',lineHeight:1.5}}>⚠️ {authError}</div>
        )}
        <button onClick={handleEmailAuth} disabled={authLoad||!email.trim()||!password}
          style={btnYellow(authLoad||!email.trim()||!password)}>
          {authLoad?<Spinner size={18} color="#07091f"/>
            :authMode==='login'?'Ingresar →':'Crear cuenta →'}
        </button>
        <div style={{display:'flex',alignItems:'center',gap:10,margin:'16px 0'}}>
          <div style={{flex:1,height:1,background:'rgba(255,208,0,.1)'}}/>
          <span style={{fontSize:11,color:'var(--muted)'}}>o continúa con</span>
          <div style={{flex:1,height:1,background:'rgba(255,208,0,.1)'}}/>
        </div>
        <button onClick={handleGoogle} disabled={authLoad} style={{
          width:'100%',padding:12,borderRadius:12,border:'none',
          background:'white',color:'#111',fontSize:14,fontWeight:600,
          display:'flex',alignItems:'center',justifyContent:'center',gap:10,
          boxShadow:'0 2px 14px rgba(0,0,0,.4)',fontFamily:'Barlow,sans-serif',
        }}>
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.4-4z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.5 26.9 36 24 36c-5.2 0-9.6-2.9-11.3-7.1l-6.6 5.1C9.7 39.6 16.3 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.5 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/>
          </svg>
          Continuar con Google
        </button>
      </div>
    </div>
  );

  /* ════ SETUP ════ */
  if(view==='setup') return(
    <div style={pageWrap}>
      <BgTriangles/>
      <div style={cardStyle}>
        <div style={{textAlign:'center',marginBottom:18}}>
          <div style={{fontSize:40,marginBottom:8}}>👋</div>
          <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:22,
            color:'#ffd000',textTransform:'uppercase',letterSpacing:'.04em'}}>¡Bienvenido!</h2>
          <p style={{color:'var(--muted)',fontSize:12,marginTop:4}}>
            Personaliza tu perfil. Podrás cambiarlo después.
          </p>
        </div>

        {/* Foto */}
        <div style={{display:'flex',justifyContent:'center',marginBottom:14}}>
          <div style={{position:'relative',cursor:'pointer'}}
            onClick={()=>document.getElementById('setupPhoto')?.click()}>
            <AvatarBubble profile={profile} size={70}/>
            <div style={{position:'absolute',bottom:-2,right:-2,width:22,height:22,
              borderRadius:'50%',background:'#ffd000',display:'flex',
              alignItems:'center',justifyContent:'center',fontSize:12,color:'#07091f'}}>
              📷
            </div>
          </div>
          <input id="setupPhoto" type="file" accept="image/*" capture="user"
            style={{display:'none'}}
            onChange={async e=>{
              const f=e.target.files[0]; if(!f) return;
              const b64=await compressImage(f,200);
              setProfile(p=>({...p,photo:b64}));
            }}/>
        </div>

        <div style={{marginBottom:12}}>
          <label style={labelStyle}>Nombre en la sala</label>
          <input value={profile.name}
            onChange={e=>setProfile(p=>({...p,name:e.target.value}))}
            placeholder="¿Cómo quieres que te vean?"
            style={inputStyle}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={labelStyle}>Avatar (si no usas foto)</label>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5}}>
            {AVATARS.map(a=>(
              <button key={a} onClick={()=>setProfile(p=>({...p,avatar:a}))} style={{
                background:profile.avatar===a?'rgba(255,208,0,.15)':'rgba(255,255,255,.03)',
                border:profile.avatar===a?`2px solid ${profile.color}`:'2px solid rgba(255,255,255,.06)',
                borderRadius:10,padding:'7px 2px',fontSize:19,
                display:'flex',alignItems:'center',justifyContent:'center',
                transition:'all .15s',
              }}>{a}</button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <label style={labelStyle}>Color de aura</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {COLORS.map(c=>(
              <div key={c} onClick={()=>setProfile(p=>({...p,color:c}))} style={{
                width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                border:profile.color===c?'3px solid white':'3px solid transparent',
                boxShadow:profile.color===c?`0 0 14px ${c}`:'none',transition:'all .15s',
              }}/>
            ))}
          </div>
        </div>
        <button onClick={()=>saveProfile(profile)}
          disabled={!profile.name.trim()||setupSaving}
          style={btnYellow(!profile.name.trim()||setupSaving)}>
          {setupSaving
            ?<><Spinner size={18} color="#07091f"/>Guardando...</>
            :'Entrar a la sala ✨'}
        </button>
        {setupError&&(
          <div style={{marginTop:10,color:'#fca5a5',fontSize:12,
            background:'rgba(239,68,68,.08)',borderRadius:8,padding:'9px 12px'}}>
            ⚠️ {setupError}
          </div>
        )}
        <p style={{textAlign:'center',marginTop:8,fontSize:11,color:'var(--muted2)'}}>
          Tu perfil se guarda para siempre
        </p>
      </div>
    </div>
  );

  /* ════ SCREEN ════ */
  if(view==='screen') return(
    <ScreenView
      users={users} session={session} msgs={msgs} reactions={reactions}
      onExit={()=>setView('room')}
    />
  );

  /* ════ ROOM ════ */
  return(
    <div style={{position:'fixed',inset:0,display:'flex',flexDirection:'column',
      background:'var(--navy)'}}>

      {/* ── HEADER ── */}
      <div style={{
        background:'linear-gradient(135deg,#0d1035,#0a0c28)',
        borderBottom:'1px solid rgba(255,208,0,.12)',
        padding:'8px 12px',
        display:'flex',alignItems:'center',
        justifyContent:'space-between',flexShrink:0,
        minHeight:52,
      }}>
        {/* Logo */}
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <svg width="26" height="19" viewBox="0 0 80 60">
            <polygon points="8,54 72,54 58,10" fill="#ffd000"/>
            <g stroke="#07091f" strokeWidth="3.5" fill="none" strokeLinecap="round" strokeLinejoin="round">
              <path d="M28 42L28 18Q28 15 31 15L40 17L40 42"/>
              <path d="M52 42L52 18Q52 15 49 15L40 17L40 42"/>
              <path d="M28 42Q34 40 40 42Q46 40 52 42"/>
            </g>
          </svg>
          <div>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
              fontSize:14,color:'#ffd000',letterSpacing:'.05em',
              textTransform:'uppercase',lineHeight:1}}>
              MARANATA CLASS
            </div>
            <div style={{fontSize:9,color:'var(--muted)'}}>
              {usersArr.length} en sala
              {phase!=='waiting'&&<span style={{
                marginLeft:6,color:ZONES[phase]?.color||'#ffd000',
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              }}>
                · {ZONES[phase]?.icon} {ZONES[phase]?.label}
              </span>}
            </div>
          </div>
        </div>

        {/* Botones header */}
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          {/* Avatar + editar */}
          <button onClick={()=>setEditOpen(true)} title="Editar perfil" style={{
            display:'flex',alignItems:'center',gap:5,
            background:'rgba(255,208,0,.06)',border:'1px solid rgba(255,208,0,.15)',
            borderRadius:20,padding:'4px 8px',
          }}>
            <AvatarBubble profile={profile} size={26}/>
            <span style={{fontSize:9,color:'#ffd000',fontFamily:'Barlow Condensed,sans-serif',
              fontWeight:700,maxWidth:55,overflow:'hidden',textOverflow:'ellipsis',
              whiteSpace:'nowrap'}}>
              {profile.name||'Yo'}
            </span>
            <span style={{fontSize:10}}>✏️</span>
          </button>

          {/* Asistencia */}
          <button onClick={()=>setAttOpen(true)} title="Mi asistencia" style={{
            background:'rgba(255,208,0,.06)',border:'1px solid rgba(255,208,0,.15)',
            borderRadius:20,width:34,height:34,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,
          }}>📊</button>

          {/* Proyectar */}
          <button onClick={()=>setView('screen')} title="Proyectar" style={{
            background:'rgba(255,208,0,.06)',border:'1px solid rgba(255,208,0,.15)',
            borderRadius:20,width:34,height:34,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,
          }}>📺</button>

          {/* Cerrar sesión */}
          <button onClick={handleSignOut} title="Cerrar sesión" style={{
            background:'rgba(239,68,68,.07)',border:'1px solid rgba(239,68,68,.15)',
            borderRadius:20,width:34,height:34,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,
          }}>↩</button>
        </div>
      </div>

      {/* ── SALA (canvas con zonas) ── */}
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        <RoomCanvas
          users={users} myId={UID.current} session={session}
          onDragStart={onDragStart} onDragMove={onDragMove} onDragEnd={onDragEnd}
          roomRef={roomRef} full={false} reactions={reactions}
        />

        {/* Chat del repaso (dentro de sala) */}
        {phase==='repaso'&&(
          <div style={{
            position:'absolute',bottom:0,left:0,right:0,
            background:'rgba(7,9,31,.95)',borderTop:'1px solid rgba(59,130,246,.2)',
            padding:'8px 10px',display:'flex',gap:8,
          }}>
            <input value={chatIn} onChange={e=>setChatIn(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handleSend()}
              placeholder="Escribe en el repaso..."
              style={{flex:1,padding:'9px 14px',borderRadius:20,
                background:'rgba(255,255,255,.05)',border:'1px solid rgba(59,130,246,.2)',
                color:'white',fontSize:13,outline:'none',fontFamily:'Barlow,sans-serif'}}/>
            <button onClick={handleSend} style={{
              background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',
              border:'none',borderRadius:20,color:'white',
              padding:'9px 16px',fontSize:17,fontWeight:900,
            }}>↑</button>
          </div>
        )}
      </div>

      {/* Confraternización: speaker overlay */}
      {phase==='confra'&&session?.confra?.active&&(
        <ConfraSpeakerPanel
          session={session} users={users}
          myId={UID.current} isAdmin={isAdmin}
          onNext={nextSpeaker} onEnd={endConfra}
          onReact={handleReact} myReaction={myReaction}
        />
      )}

      {/* Banner fin de actividad */}
      {endBanner&&(
        <ActivityEndBanner phase={endBanner} onDismiss={()=>setEndBanner(null)}/>
      )}

      {/* Panel admin */}
      {isAdmin&&(
        <AdminPanel
          session={session} users={users}
          onStartConfra={startConfra}
          onNextSpeaker={nextSpeaker}
          onEndConfra={endConfra}
          onStartRepaso={startRepaso}
          onEndRepaso={endRepaso}
          onStartJuegos={startJuegos}
          onEndJuegos={endJuegos}
        />
      )}


      {/* Kahoot Game */}
      {(phase==='juegos'||isAdmin)&&(
        <KahootController
          session={session} users={users}
          myId={UID.current} isAdmin={isAdmin}
          SID={SID.current}
        />
      )}

      {/* Modales */}
      {editOpen&&<EditProfileModal profile={profile} onSave={saveProfile} onClose={()=>setEditOpen(false)}/>}
      {attOpen&&<AttendanceModal myAtt={myAtt} gameHistory={gameHistory} onClose={()=>setAttOpen(false)}/>}
    </div>
  );
}


/* ════════════════════════ KAHOOT: COLORES RESPUESTAS ════════════════════════ */
const ANS_COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12'];
const ANS_SHAPES=['▲','◆','●','■'];

function Confetti(){
  const pieces=React.useMemo(()=>Array.from({length:28},(_,i)=>({
    id:i,x:Math.random()*100,delay:Math.random()*2,dur:2.5+Math.random()*2,
    color:['#ffd000','#ec4899','#22d3ee','#10b981','#8b5cf6'][i%5],
    size:6+Math.random()*8,
  })),[]);
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:300,overflow:'hidden'}}>
      {pieces.map(p=>(
        <div key={p.id} style={{
          position:'absolute',left:`${p.x}%`,top:-20,
          width:p.size,height:p.size,background:p.color,borderRadius:p.size/4,
          animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`,
        }}/>
      ))}
    </div>
  );
}

function KahootQuestion({question,qIndex,total,myAnswer,onAnswer,timeLeft,gameState}){
  const answered=myAnswer!==null&&myAnswer!==undefined;
  const showResult=gameState==='results';
  return(
    <div style={{position:'fixed',inset:0,zIndex:200,background:'var(--navy)',
      display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{background:'linear-gradient(135deg,#0d1035,#141744)',
        padding:'10px 16px',display:'flex',alignItems:'center',
        justifyContent:'space-between',flexShrink:0,
        borderBottom:'1px solid rgba(139,92,246,.2)'}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
          fontSize:12,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em'}}>
          Pregunta {qIndex+1} / {total}
        </div>
        <div style={{width:44,height:44,borderRadius:'50%',
          background:timeLeft<=5?'rgba(239,68,68,.15)':'rgba(139,92,246,.15)',
          border:`2px solid ${timeLeft<=5?'#ef4444':'#8b5cf6'}`,
          display:'flex',alignItems:'center',justifyContent:'center',
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:18,
          color:timeLeft<=5?'#ef4444':'#8b5cf6',
          animation:timeLeft<=5&&!showResult?'timerTick .5s infinite':undefined,
        }}>
          {showResult?'✓':timeLeft}
        </div>
      </div>
      {!showResult&&(
        <div style={{height:5,background:'rgba(255,255,255,.06)',flexShrink:0}}>
          <div style={{height:'100%',
            background:timeLeft<=5?'#ef4444':'#8b5cf6',
            width:`${(timeLeft/15)*100}%`,
            transition:'width 1s linear',borderRadius:2}}/>
        </div>
      )}
      <div style={{flex:'0 0 auto',padding:'14px 14px 10px',
        display:'flex',alignItems:'center',justifyContent:'center',minHeight:85}}>
        <div style={{background:'linear-gradient(135deg,#0d1035,#141744)',
          border:'1px solid rgba(139,92,246,.2)',borderRadius:16,
          padding:'14px 16px',textAlign:'center',width:'100%',maxWidth:500,
          fontFamily:'Barlow,sans-serif',fontWeight:600,fontSize:16,
          color:'var(--white)',lineHeight:1.4,
          boxShadow:'0 4px 20px rgba(0,0,0,.4)'}}>
          {question.text}
        </div>
      </div>
      <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',
        gap:10,padding:'0 12px 16px',alignContent:'start'}}>
        {question.options.map((opt,i)=>{
          const isMyAnswer=myAnswer===i;
          const isCorrect=question.correct===i;
          let bg=ANS_COLORS[i];
          let border='transparent';
          let badge=null;
          if(showResult){
            if(isCorrect){border='white';badge='✅';}
            else{bg='rgba(255,255,255,.06)';border='rgba(255,255,255,.1)';}
          } else if(answered&&!isMyAnswer){
            bg='rgba(255,255,255,.06)';border='rgba(255,255,255,.08)';
          }
          return(
            <button key={i} onClick={()=>!answered&&!showResult&&onAnswer(i)}
              disabled={answered||showResult}
              style={{background:bg,border:`2px solid ${border}`,
                borderRadius:14,padding:'12px 8px',
                display:'flex',flexDirection:'column',alignItems:'center',
                justifyContent:'center',gap:5,minHeight:88,
                color:'white',textAlign:'center',
                fontFamily:'Barlow,sans-serif',fontWeight:600,fontSize:13,
                boxShadow:isMyAnswer&&!showResult?`0 0 18px ${ANS_COLORS[i]}88`:
                          isMyAnswer&&showResult&&isCorrect?'0 0 0 3px white':undefined,
                animation:isMyAnswer&&!showResult?'answerPop .3s ease':undefined,
                outline:isMyAnswer&&showResult&&!isCorrect?'3px solid #ef4444':undefined,
                transition:'background .4s,border .4s',
                cursor:answered||showResult?'default':'pointer'}}>
              <span style={{fontSize:18,opacity:.7}}>{ANS_SHAPES[i]}</span>
              <span style={{lineHeight:1.3}}>{opt}</span>
              {badge&&<span style={{fontSize:16}}>{badge}</span>}
              {showResult&&isMyAnswer&&!isCorrect&&<span style={{fontSize:16}}>❌</span>}
            </button>
          );
        })}
      </div>
      {answered&&!showResult&&(
        <div style={{position:'absolute',bottom:20,left:'50%',
          transform:'translateX(-50%)',
          background:'rgba(7,9,31,.95)',border:'1px solid rgba(139,92,246,.3)',
          borderRadius:20,padding:'8px 20px',
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
          fontSize:13,color:'#8b5cf6',letterSpacing:'.04em',textTransform:'uppercase'}}>
          ✓ Enviada — esperando...
        </div>
      )}
    </div>
  );
}

function KahootResultCard({question,myAnswer,pointsEarned,myScore,qIdx,total,isAdmin,onNext,onFinish}){
  const correct=question.correct;
  const isRight=myAnswer===correct;
  return(
    <div style={{position:'fixed',inset:0,zIndex:200,background:'var(--navy)',
      display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',padding:20,gap:14}}>
      <div style={{width:'100%',maxWidth:360,
        background:isRight?'linear-gradient(135deg,rgba(16,185,129,.15),rgba(16,185,129,.04))':'linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.04))',
        border:`2px solid ${isRight?'rgba(16,185,129,.4)':'rgba(239,68,68,.3)'}`,
        borderRadius:20,padding:'18px 16px',textAlign:'center',
        animation:'answerPop .4s ease'}}>
        <div style={{fontSize:48,marginBottom:8}}>{isRight?'🎉':'😅'}</div>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:22,color:isRight?'#10b981':'#ef4444',
          textTransform:'uppercase',letterSpacing:'.06em'}}>
          {isRight?'¡Correcto!':'Incorrecto'}
        </div>
        <div style={{fontSize:12,color:'var(--muted)',marginTop:6}}>Respuesta correcta:</div>
        <div style={{marginTop:6,background:ANS_COLORS[correct],borderRadius:10,
          padding:'7px 14px',fontFamily:'Barlow,sans-serif',fontWeight:600,
          fontSize:13,color:'white',display:'inline-block'}}>
          {ANS_SHAPES[correct]} {question.options[correct]}
        </div>
      </div>
      {isRight&&(
        <div style={{display:'flex',alignItems:'center',gap:10,animation:'scoreUp .5s ease'}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:34,color:'#ffd000'}}>+{pointsEarned}</div>
          <div style={{fontSize:13,color:'var(--muted)'}}>
            puntos<br/>
            <span style={{color:'var(--white)',fontWeight:700}}>Total: {myScore}</span>
          </div>
        </div>
      )}
      <div style={{fontSize:11,color:'var(--muted)'}}>Pregunta {qIdx+1} de {total}</div>
      {isAdmin&&(
        <div style={{display:'flex',gap:10,marginTop:4}}>
          {qIdx+1<total?(
            <button onClick={onNext} style={{background:'linear-gradient(135deg,#8b5cf6,#6d28d9)',
              border:'none',borderRadius:12,padding:'12px 26px',
              color:'white',fontWeight:800,fontSize:14,
              fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
              textTransform:'uppercase',boxShadow:'0 0 20px rgba(139,92,246,.4)'}}>
              Siguiente →
            </button>
          ):(
            <button onClick={onFinish} style={{background:'linear-gradient(135deg,#10b981,#059669)',
              border:'none',borderRadius:12,padding:'12px 26px',
              color:'white',fontWeight:800,fontSize:14,
              fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
              textTransform:'uppercase',boxShadow:'0 0 20px rgba(16,185,129,.35)'}}>
              Ver ganador 🏆
            </button>
          )}
        </div>
      )}
      {!isAdmin&&(
        <div style={{fontSize:12,color:'var(--muted)'}}>Esperando al profe...</div>
      )}
    </div>
  );
}

function KahootLeaderboard({scores,users,isAdmin,isFinished,onClose}){
  const sorted=Object.entries(scores||{})
    .map(([uid,score])=>({uid,score,user:users[uid]||{name:'?',avatar:'👤',color:'#ffd000'}}))
    .sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  return(
    <div style={{position:'fixed',inset:0,zIndex:220,background:'var(--navy)',
      display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {isFinished&&<Confetti/>}
      <div style={{background:'linear-gradient(135deg,#0d1035,#141744)',
        padding:'14px 16px',textAlign:'center',flexShrink:0,
        borderBottom:'1px solid rgba(255,208,0,.15)'}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:22,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.06em'}}>
          {isFinished?'🏆 ¡Resultados finales!':'📊 Clasificación'}
        </div>
      </div>
      {isFinished&&sorted[0]&&(
        <div style={{padding:'16px',textAlign:'center',flexShrink:0}}>
          <div style={{fontSize:36,animation:'crownBounce 1.5s infinite'}}>👑</div>
          <AvatarBubble profile={sorted[0].user} size={68}/>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:24,color:'#ffd000',marginTop:8}}>{sorted[0].user.name}</div>
          <div style={{fontSize:13,color:'#ffd000',opacity:.7}}>{sorted[0].score} puntos</div>
        </div>
      )}
      <div style={{flex:1,overflowY:'auto',padding:'8px 14px 80px'}}>
        {sorted.map((item,i)=>(
          <div key={item.uid} style={{
            display:'flex',alignItems:'center',gap:12,
            background:i===0&&isFinished?'linear-gradient(135deg,rgba(255,208,0,.12),rgba(255,208,0,.04))':'rgba(255,255,255,.03)',
            border:i===0&&isFinished?'1px solid rgba(255,208,0,.25)':'1px solid rgba(255,255,255,.05)',
            borderRadius:12,padding:'10px 14px',marginBottom:8,
            animation:`scoreUp ${.1+i*.07}s ease`}}>
            <div style={{width:28,textAlign:'center',
              fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
              fontSize:i<3?22:16,color:i<3?'#ffd000':'var(--muted)'}}>
              {i<3?medals[i]:i+1}
            </div>
            <AvatarBubble profile={item.user} size={34}/>
            <div style={{flex:1,fontFamily:'Barlow,sans-serif',fontWeight:600,
              fontSize:14,color:'white'}}>{item.user.name}</div>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
              fontSize:20,color:'#ffd000'}}>{item.score}</div>
          </div>
        ))}
      </div>
      {isAdmin&&isFinished&&(
        <div style={{position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)'}}>
          <button onClick={onClose} style={{
            background:'linear-gradient(135deg,#8b5cf6,#6d28d9)',
            border:'none',borderRadius:14,padding:'13px 32px',
            color:'white',fontWeight:800,fontSize:14,
            fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
            textTransform:'uppercase',boxShadow:'0 0 22px rgba(139,92,246,.4)'}}>
            Cerrar juego ✓
          </button>
        </div>
      )}
    </div>
  );
}

function KahootSetup({onStart,juegosCount}){
  const[questions,setQuestions]=useState([{text:'',options:['','','',''],correct:0}]);
  const[qIdx,setQIdx]=useState(0);
  const q=questions[qIdx];
  const updateQ=(f,v)=>setQuestions(qs=>qs.map((x,i)=>i===qIdx?{...x,[f]:v}:x));
  const updateOpt=(oi,v)=>setQuestions(qs=>qs.map((x,i)=>i===qIdx?{...x,options:x.options.map((o,j)=>j===oi?v:o)}:x));
  const addQ=()=>{setQuestions(qs=>[...qs,{text:'',options:['','','',''],correct:0}]);setQIdx(questions.length);};
  const removeQ=()=>{if(questions.length===1) return;const nqs=questions.filter((_,i)=>i!==qIdx);setQuestions(nqs);setQIdx(Math.max(0,qIdx-1));};
  const canStart=questions.every(q=>q.text.trim()&&q.options.every(o=>o.trim()));
  return(
    <div style={{position:'fixed',inset:0,zIndex:200,background:'var(--navy)',
      display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{background:'linear-gradient(135deg,#0d1035,#141744)',
        padding:'12px 14px',borderBottom:'1px solid rgba(139,92,246,.2)',flexShrink:0}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:18,color:'#8b5cf6',textTransform:'uppercase',letterSpacing:'.06em'}}>
          🎮 Crear preguntas
        </div>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>
          {juegosCount} jugadores en sala de juegos
        </div>
      </div>
      <div style={{display:'flex',gap:6,padding:'10px 14px',
        overflowX:'auto',flexShrink:0,borderBottom:'1px solid rgba(255,255,255,.05)'}}>
        {questions.map((_,i)=>(
          <button key={i} onClick={()=>setQIdx(i)} style={{
            width:32,height:32,borderRadius:8,border:'none',flexShrink:0,
            background:qIdx===i?'#8b5cf6':'rgba(255,255,255,.06)',
            color:'white',fontFamily:'Barlow Condensed,sans-serif',
            fontWeight:700,fontSize:13}}>{i+1}</button>
        ))}
        <button onClick={addQ} style={{width:32,height:32,borderRadius:8,
          border:'1px dashed rgba(255,255,255,.2)',background:'none',
          color:'var(--muted)',fontSize:18,flexShrink:0}}>+</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'14px'}}>
        <div style={{display:'flex',alignItems:'center',
          justifyContent:'space-between',marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:'#8b5cf6',
            fontFamily:'Barlow Condensed,sans-serif',textTransform:'uppercase',
            letterSpacing:'.06em'}}>Pregunta {qIdx+1}</div>
          {questions.length>1&&(
            <button onClick={removeQ} style={{background:'rgba(239,68,68,.1)',
              border:'1px solid rgba(239,68,68,.2)',borderRadius:8,
              padding:'4px 10px',color:'#f87171',fontSize:11,
              fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>
              🗑 Eliminar
            </button>
          )}
        </div>
        <textarea value={q.text} onChange={e=>updateQ('text',e.target.value)}
          placeholder="Escribe la pregunta..."
          rows={3} style={{width:'100%',padding:'11px 14px',borderRadius:10,
            resize:'none',background:'rgba(255,255,255,.04)',
            border:'1px solid rgba(139,92,246,.2)',color:'var(--white)',
            fontSize:14,fontFamily:'Barlow,sans-serif',marginBottom:14,outline:'none'}}/>
        <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',
          textTransform:'uppercase',letterSpacing:'.07em',marginBottom:8,
          fontFamily:'Barlow Condensed,sans-serif'}}>
          Toca el botón de color para marcar la correcta
        </div>
        {q.options.map((opt,i)=>(
          <div key={i} style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
            <button onClick={()=>updateQ('correct',i)} style={{
              width:36,height:36,borderRadius:50,flexShrink:0,border:'none',
              background:q.correct===i?ANS_COLORS[i]:`${ANS_COLORS[i]}28`,
              fontSize:q.correct===i?14:13,color:'white',fontWeight:700,
              boxShadow:q.correct===i?`0 0 12px ${ANS_COLORS[i]}77`:undefined,
              transition:'all .2s'}}>
              {q.correct===i?'✓':ANS_SHAPES[i]}
            </button>
            <input value={opt} onChange={e=>updateOpt(i,e.target.value)}
              placeholder={`Opción ${i+1}`}
              style={{flex:1,padding:'10px 12px',borderRadius:10,
                background:`${ANS_COLORS[i]}18`,
                border:`1px solid ${ANS_COLORS[i]}44`,
                color:'var(--white)',fontSize:13,
                fontFamily:'Barlow,sans-serif',outline:'none'}}/>
          </div>
        ))}
      </div>
      <div style={{padding:'12px 14px',borderTop:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        <button onClick={()=>canStart&&juegosCount>0&&onStart(questions)}
          disabled={!canStart||juegosCount===0} style={{
          width:'100%',padding:13,borderRadius:12,border:'none',
          background:canStart&&juegosCount>0?'linear-gradient(135deg,#8b5cf6,#6d28d9)':'var(--muted2)',
          color:canStart&&juegosCount>0?'white':'var(--muted)',
          fontSize:15,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
          letterSpacing:'.06em',textTransform:'uppercase',
          boxShadow:canStart&&juegosCount>0?'0 0 24px rgba(139,92,246,.4)':undefined}}>
          {juegosCount===0?'Nadie en sala de juegos':
           !canStart?'Completa todas las preguntas':
           `🎮 Iniciar (${questions.length} preguntas)`}
        </button>
      </div>
    </div>
  );
}

function KahootController({session,users,myId,isAdmin,SID}){
  const game=session?.juegos;
  const gState=game?.gameState;
  const[timeLeft,setTimeLeft]=useState(15);
  const[countdownDone,setCountdownDone]=useState(false);
  const timerRef=useRef(null);
  const questions=game?.questions||[];
  const qIdx=game?.currentQ||0;
  const currentQ=questions[qIdx];
  const scores=game?.scores||{};
  const myScore=scores[myId]||0;
  const myAnswer=game?.answers?.[myId];
  const juegosUsers=Object.entries(users).filter(([,u])=>u.zone==='juegos');

  useEffect(()=>{
    if(gState==='question'&&game?.qStartTime){
      clearInterval(timerRef.current);
      timerRef.current=setInterval(()=>{
        const elapsed=Math.floor((Date.now()-game.qStartTime)/1000);
        const left=Math.max(0,15-elapsed);
        setTimeLeft(left);
        if(left===0){
          clearInterval(timerRef.current);
          if(isAdmin) db.ref(`sessions/${SID}/juegos/gameState`).set('results');
        }
      },400);
    }
    return()=>clearInterval(timerRef.current);
  },[gState,game?.qStartTime,isAdmin]);

  useEffect(()=>{ setCountdownDone(false); },[qIdx]);

  const handleAnswer=async(ansIdx)=>{
    if(myAnswer!==null&&myAnswer!==undefined) return;
    const elapsed=game?.qStartTime?Math.floor((Date.now()-game.qStartTime)/1000):15;
    const speed=Math.max(0,15-Math.min(elapsed,15));
    const pts=currentQ?.correct===ansIdx?Math.round(100+speed*60):0;
    await db.ref(`sessions/${SID}/juegos/answers/${myId}`).set(ansIdx);
    if(pts>0) await db.ref(`sessions/${SID}/juegos/scores/${myId}`).transaction(c=>(c||0)+pts);
  };

  const nextQuestion=async()=>{
    const next=qIdx+1;
    await db.ref(`sessions/${SID}/juegos`).update({
      currentQ:next,gameState:'starting',qStartTime:null,answers:{}
    });
  };

  const finishGame=async()=>{
    const fs=game?.scores||{};
    const sorted=Object.entries(fs).sort((a,b)=>b[1]-a[1]);
    const gid=`${SID}_${Date.now()}`;
    await Promise.all(sorted.map(([uid,score],i)=>
      db.ref(`gameHistory/${uid}/${gid}`).set({
        date:SID,score,rank:i+1,totalPlayers:sorted.length,
        name:users[uid]?.name||'?'
      })
    ));
    await db.ref(`sessions/${SID}/juegos/gameState`).set('finished');
  };

  const closeGame=async()=>{
    await db.ref(`sessions/${SID}`).update({phase:'waiting','juegos/active':false});
  };

  const myZone=users[myId]?.zone;
  if(myZone!=='juegos'&&!isAdmin) return null;

  // Admin: setup
  if(isAdmin&&(!gState||gState==='idle')){
    return(
      <KahootSetup juegosCount={juegosUsers.length}
        onStart={async(qs)=>{
          await db.ref(`sessions/${SID}/juegos`).update({
            active:true,gameState:'starting',questions:qs,
            currentQ:0,qStartTime:null,answers:{},scores:{}
          });
        }}/>
    );
  }

  // Countdown
  if(gState==='starting'){
    if(isAdmin&&!countdownDone){
      return(
        <div style={{position:'fixed',inset:0,zIndex:250,
          background:'rgba(7,9,31,.95)',backdropFilter:'blur(6px)',
          display:'flex',flexDirection:'column',alignItems:'center',
          justifyContent:'center',gap:10}}>
          <CountdownTimer from={3} onDone={async()=>{
            setCountdownDone(true);
            await db.ref(`sessions/${SID}/juegos`).update({
              gameState:'question',qStartTime:Date.now()
            });
          }}/>
        </div>
      );
    }
    return(
      <div style={{position:'fixed',inset:0,zIndex:210,
        background:'rgba(7,9,31,.96)',display:'flex',
        alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
        <div style={{fontSize:72,animation:'bounce .7s infinite'}}>🎮</div>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:22,color:'#8b5cf6',textTransform:'uppercase',letterSpacing:'.06em'}}>
          ¡Prepárate!
        </div>
        <Spinner size={28} color="#8b5cf6"/>
      </div>
    );
  }

  // Pregunta
  if(gState==='question'&&currentQ){
    return(
      <KahootQuestion question={currentQ} qIndex={qIdx} total={questions.length}
        myAnswer={myAnswer} onAnswer={handleAnswer}
        timeLeft={timeLeft} gameState={gState}/>
    );
  }

  // Resultados
  if(gState==='results'&&currentQ){
    const isRight=myAnswer===currentQ.correct;
    const elapsed=game?.qStartTime?Math.floor((Date.now()-game.qStartTime)/1000):15;
    const speed=Math.max(0,15-Math.min(elapsed,15));
    const pointsEarned=isRight?Math.round(100+speed*60):0;
    return(
      <KahootResultCard question={currentQ} myAnswer={myAnswer}
        pointsEarned={pointsEarned} myScore={myScore}
        qIdx={qIdx} total={questions.length}
        isAdmin={isAdmin} onNext={nextQuestion} onFinish={finishGame}/>
    );
  }

  // Leaderboard / Final
  if(gState==='leaderboard'||gState==='finished'){
    return(
      <KahootLeaderboard scores={scores} users={users}
        isAdmin={isAdmin} isFinished={gState==='finished'}
        onClose={closeGame}/>
    );
  }

  // Jugador esperando
  if(!isAdmin){
    return(
      <div style={{position:'fixed',inset:0,zIndex:190,
        background:'rgba(7,9,31,.96)',display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:16,padding:24,textAlign:'center'}}>
        <div style={{fontSize:54,animation:'bounce 1.2s infinite'}}>🎮</div>
        <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:24,color:'#8b5cf6',textTransform:'uppercase',letterSpacing:'.05em'}}>
          Sala de Juegos
        </h2>
        <p style={{color:'var(--muted)',fontSize:14,maxWidth:240,lineHeight:1.6}}>
          Estás listo.<br/>El profe iniciará el juego pronto.
        </p>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,
          justifyContent:'center',maxWidth:280}}>
          {juegosUsers.map(([uid,u])=>(
            <div key={uid} style={{display:'flex',alignItems:'center',gap:6,
              background:'rgba(139,92,246,.1)',borderRadius:20,padding:'4px 10px',
              border:'1px solid rgba(139,92,246,.2)'}}>
              <span style={{fontSize:13}}>{u.avatar||'👤'}</span>
              <span style={{fontSize:11,color:'var(--white)'}}>{u.name}</span>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <Spinner size={14} color="#8b5cf6"/>
          <span style={{fontSize:11,color:'var(--muted)'}}>Esperando...</span>
        </div>
      </div>
    );
  }
  return null;
}

function CountdownTimer({from,onDone}){
  const[n,setN]=useState(from);
  useEffect(()=>{
    if(n<=0){onDone();return;}
    const t=setTimeout(()=>setN(n-1),1000);
    return()=>clearTimeout(t);
  },[n]);
  if(n<=0) return null;
  return(
    <>
      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
        fontSize:110,color:'#ffd000',lineHeight:1,
        animation:'countdownPop .7s ease'}} key={n}>{n}</div>
      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:18,
        color:'var(--muted)',letterSpacing:'.1em',textTransform:'uppercase'}}>
        Prepárate
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
