<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --navy:#07091f; --navy2:#0d1035; --navy3:#141744;
      --yellow:#ffd000; --white:#f0f2ff;
      --muted:#4a4f7a; --muted2:#2a2f5a;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{height:100%}
    body{background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;
      overflow:hidden;-webkit-tap-highlight-color:transparent}
    input{outline:none;transition:border-color .2s,box-shadow .2s}
    input:focus{border-color:var(--yellow)!important;box-shadow:0 0 0 3px rgba(255,208,0,.15)!important}
    button{transition:opacity .15s,transform .1s;cursor:pointer}
    button:active{opacity:.85;transform:scale(.97)}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes glowY{0%,100%{box-shadow:0 0 12px rgba(255,208,0,.4)}50%{box-shadow:0 0 28px rgba(255,208,0,.7)}}
    @keyframes pop{0%{transform:translate(-50%,-50%) scale(.5)}65%{transform:translate(-50%,-50%) scale(1.15)}100%{transform:translate(-50%,-50%) scale(1)}}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes triPulse{0%,100%{opacity:.15}50%{opacity:.28}}
    @keyframes modalIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>

<script type="text/babel">
  const { useState, useRef, useEffect, useCallback } = React;

  const AVATARS = ['🦁','🐺','🦊','🐻','🐼','🦋','🦅','🐬','🦄','🐉','⚡','🌟','🔥','🌊','🌙','🎭','🎸','⚽','🎮','🏄'];
  const COLORS  = ['#ffd000','#ec4899','#22d3ee','#10b981','#6366f1','#ef4444','#8b5cf6','#fb923c'];

  const getSID  = () => new Date().toISOString().slice(0,10);
  const nowTime = () => new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});

  const AUTH_ERRORS = {
    'auth/user-not-found':          'No existe una cuenta con ese correo',
    'auth/wrong-password':          'Contraseña incorrecta',
    'auth/email-already-in-use':    'Ese correo ya tiene una cuenta',
    'auth/invalid-email':           'El correo no es válido',
    'auth/weak-password':           'La contraseña debe tener al menos 6 caracteres',
    'auth/too-many-requests':       'Demasiados intentos. Espera unos minutos',
    'auth/invalid-credential':      'Correo o contraseña incorrectos',
    'auth/popup-closed-by-user':    '',
    'auth/cancelled-popup-request': '',
    'auth/operation-not-allowed':   'Activa Google en Firebase Console → Authentication',
    'auth/unauthorized-domain':     'Agrega tu dominio en Firebase Console → Authentication → Authorized domains',
  };
  const getErr = code => AUTH_ERRORS[code] || `Error: ${code}`;

  /* ── Fondo triangular ── */
  const BgTriangles = () => (
    <div style={{position:'fixed',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0}}>
      <div style={{position:'absolute',top:'-10%',right:'-5%',width:'55%',height:'70%',
        background:'linear-gradient(135deg,rgba(255,208,0,.07),transparent 60%)',
        clipPath:'polygon(100% 0,100% 100%,0 100%)',animation:'triPulse 4s ease-in-out infinite'}}/>
      <div style={{position:'absolute',bottom:'-5%',left:'-8%',width:'45%',height:'55%',
        background:'linear-gradient(315deg,rgba(99,102,241,.05),transparent 60%)',
        clipPath:'polygon(0 0,100% 100%,0 100%)',animation:'triPulse 6s ease-in-out infinite'}}/>
    </div>
  );

  /* ── Logo del libro ── */
  const BookLogo = ({size=60}) => (
    <svg width={size} height={size*0.75} viewBox="0 0 80 60">
      <polygon points="8,54 72,54 58,10" fill="#ffd000" opacity=".95"/>
      <g stroke="#07091f" strokeWidth="2.8" fill="none" strokeLinecap="round" strokeLinejoin="round">
        <path d="M28 42 L28 18 Q28 15 31 15 L40 17 L40 42"/>
        <path d="M52 42 L52 18 Q52 15 49 15 L40 17 L40 42"/>
        <path d="M28 42 Q34 40 40 42 Q46 40 52 42"/>
        <line x1="32" y1="22" x2="38" y2="23"/>
        <line x1="32" y1="27" x2="38" y2="28"/>
        <line x1="42" y1="23" x2="48" y2="22"/>
        <line x1="42" y1="28" x2="48" y2="27"/>
      </g>
    </svg>
  );

  /* ── Room Canvas ── */
  function RoomCanvas({ users, myId, onDragStart, full }) {
    const entries = Object.entries(users);
    return (
      <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden',
        background:'var(--navy)',
        backgroundImage:`linear-gradient(rgba(255,208,0,.03) 1px,transparent 1px),
                         linear-gradient(90deg,rgba(255,208,0,.03) 1px,transparent 1px)`,
        backgroundSize:'44px 44px'}}>
        <div style={{position:'absolute',top:'8%',left:'4%',width:'34%',height:'34%',borderRadius:'50%',
          background:'radial-gradient(circle,rgba(255,208,0,.05),transparent 70%)',pointerEvents:'none'}}/>
        <div style={{position:'absolute',bottom:'14%',right:'6%',width:'28%',height:'28%',borderRadius:'50%',
          background:'radial-gradient(circle,rgba(99,102,241,.05),transparent 70%)',pointerEvents:'none'}}/>

        {/* Pantalla */}
        <div style={{position:'absolute',top:'3%',left:'50%',transform:'translateX(-50%)',
          width:full?'32%':'40%',minWidth:130,height:full?'9%':'10%',minHeight:32,
          background:'linear-gradient(135deg,#0d1035,#141744)',
          border:`1.5px solid ${full?'rgba(255,208,0,.5)':'rgba(255,208,0,.3)'}`,
          borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',gap:6,
          boxShadow:'0 0 20px rgba(255,208,0,.12)',
          color:'rgba(255,208,0,.5)',letterSpacing:'.1em',textTransform:'uppercase',
          fontSize:full?12:9,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>
          {full
            ? <><span style={{width:7,height:7,borderRadius:'50%',background:'#ef4444',
                display:'inline-block',animation:'pulse 1.5s infinite'}}/>EN VIVO</>
            : '📺 PANTALLA'}
        </div>
        {['32%','66%'].map((l,i)=>(
          <div key={i} style={{position:'absolute',top:'13%',left:l,width:'1.5%',height:'4%',
            minWidth:3,background:'rgba(255,208,0,.1)',borderRadius:2}}/>
        ))}
        {[[9,47,22,11],[37,57,22,11],[62,43,22,11]].map(([l,t,w,h],i)=>(
          <div key={i} style={{position:'absolute',left:`${l}%`,top:`${t}%`,
            width:`${w}%`,height:`${h}%`,
            background:'linear-gradient(135deg,#0d1035,#0a0c28)',
            border:'1px solid rgba(255,208,0,.08)',borderRadius:8,
            boxShadow:'0 4px 16px rgba(0,0,0,.6)'}}/>
        ))}

        {full && (<>
          <div style={{position:'absolute',top:18,left:'50%',transform:'translateX(-50%)',
            background:'rgba(7,9,31,.95)',border:'1px solid rgba(255,208,0,.25)',
            borderRadius:14,padding:'10px 28px',textAlign:'center',
            backdropFilter:'blur(10px)',zIndex:20}}>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:24,
              color:'#ffd000',letterSpacing:'.05em',textTransform:'uppercase'}}>MARANATA CLASS</div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>
              Adventista Las Condes ·{' '}
              {new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'})}
            </div>
          </div>
          <div style={{position:'absolute',bottom:22,left:'50%',transform:'translateX(-50%)',
            background:'rgba(7,9,31,.95)',border:'1px solid rgba(255,208,0,.2)',
            borderRadius:20,padding:'8px 22px',display:'flex',alignItems:'center',gap:8,zIndex:20}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:'#ffd000',
              animation:'pulse 1.5s infinite'}}/>
            <span style={{color:'#ffd000',fontSize:14,fontFamily:'Barlow Condensed',fontWeight:700}}>
              {entries.length} {entries.length===1?'JOVEN':'JÓVENES'} EN SALA
            </span>
          </div>
        </>)}

        {!full && (
          <div style={{position:'absolute',bottom:8,left:0,right:0,textAlign:'center',
            fontSize:9,color:'var(--muted)',pointerEvents:'none'}}>
            ✨ Arrastra tu avatar para moverte
          </div>
        )}

        {entries.map(([uid,u])=>(
          <div key={uid}
            onMouseDown={!full&&uid===myId?onDragStart:undefined}
            onTouchStart={!full&&uid===myId?onDragStart:undefined}
            style={{position:'absolute',left:`${u.x??50}%`,top:`${u.y??50}%`,
              transform:'translate(-50%,-50%)',
              display:'flex',flexDirection:'column',alignItems:'center',
              cursor:!full&&uid===myId?'grab':'default',
              zIndex:uid===myId?10:5,
              animation:uid===myId?'pop .45s ease':'none',
              pointerEvents:full?'none':'auto'}}>
            <div style={{width:full?60:44,height:full?60:44,borderRadius:'50%',
              background:`radial-gradient(circle at 35% 35%,${u.color}33,${u.color}11)`,
              border:`2.5px solid ${u.color}`,
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:full?30:22,
              animation:uid===myId?'glowY 2.5s ease-in-out infinite':'none',
              boxShadow:uid!==myId?`0 0 10px ${u.color}55`:undefined}}>
              {u.avatar}
            </div>
            <div style={{marginTop:3,fontSize:full?11:8,color:'white',
              background:'rgba(7,9,31,.92)',padding:'2px 8px',borderRadius:20,
              maxWidth:full?90:66,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
              fontFamily:'Barlow,sans-serif',fontWeight:600,
              border:`1px solid ${u.color}33`}}>
              {uid===myId?'⭐ '+u.name:u.name}
            </div>
          </div>
        ))}
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════
     MODAL EDITAR PERFIL
  ══════════════════════════════════════════════════════ */
  function EditProfileModal({ profile, onSave, onClose }) {
    const [name,   setName]   = useState(profile.name   || '');
    const [avatar, setAvatar] = useState(profile.avatar || null);
    const [color,  setColor]  = useState(profile.color  || '#ffd000');
    const [saving, setSaving] = useState(false);

    const handleSave = async () => {
      if (!name.trim() || !avatar || saving) return;
      setSaving(true);
      await onSave({ name:name.trim(), avatar, color });
    };

    return (
      /* Overlay */
      <div style={{position:'fixed',inset:0,zIndex:200,
        display:'flex',alignItems:'flex-end',justifyContent:'center',
        background:'rgba(0,0,0,.7)',backdropFilter:'blur(4px)'}}
        onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div style={{width:'100%',maxWidth:480,
          background:'linear-gradient(160deg,#0d1035,#0a0c28)',
          border:'1px solid rgba(255,208,0,.2)',
          borderRadius:'20px 20px 0 0',padding:'24px 22px 32px',
          animation:'modalIn .3s ease'}}>

          {/* Handle */}
          <div style={{width:40,height:4,borderRadius:2,
            background:'rgba(255,208,0,.2)',margin:'0 auto 18px'}}/>

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
            <h3 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
              fontSize:20,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
              Editar perfil
            </h3>
            <button onClick={onClose} style={{background:'none',border:'none',
              color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
          </div>

          {/* Nombre */}
          <div style={{marginBottom:14}}>
            <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
              textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:6,
              fontFamily:'Barlow Condensed,sans-serif'}}>
              Nombre en la sala
            </label>
            <input value={name} onChange={e=>setName(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handleSave()}
              placeholder="¿Cómo quieres que te vean?"
              style={{width:'100%',padding:'12px 14px',borderRadius:10,
                background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,208,0,.15)',
                color:'var(--white)',fontSize:14,fontFamily:'Barlow,sans-serif'}}/>
          </div>

          {/* Avatar */}
          <div style={{marginBottom:14}}>
            <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
              textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:6,
              fontFamily:'Barlow Condensed,sans-serif'}}>Avatar</label>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6}}>
              {AVATARS.map(a=>(
                <button key={a} onClick={()=>setAvatar(a)} style={{
                  background:avatar===a?'rgba(255,208,0,.15)':'rgba(255,255,255,.03)',
                  border:avatar===a?`2px solid ${color}`:'2px solid rgba(255,255,255,.06)',
                  borderRadius:10,padding:'8px 2px',fontSize:20,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  boxShadow:avatar===a?`0 0 14px ${color}55`:'none',transition:'all .15s',
                }}>{a}</button>
              ))}
            </div>
          </div>

          {/* Color */}
          <div style={{marginBottom:22}}>
            <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
              textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:8,
              fontFamily:'Barlow Condensed,sans-serif'}}>Color</label>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {COLORS.map(c=>(
                <div key={c} onClick={()=>setColor(c)} style={{
                  width:30,height:30,borderRadius:'50%',background:c,cursor:'pointer',
                  border:color===c?'3px solid white':'3px solid transparent',
                  boxShadow:color===c?`0 0 14px ${c}`:'none',transition:'all .15s',
                }}/>
              ))}
            </div>
          </div>

          <button onClick={handleSave} disabled={!name.trim()||!avatar||saving} style={{
            width:'100%',padding:13,borderRadius:12,border:'none',
            background:!name.trim()||!avatar||saving
              ?'var(--muted2)':'linear-gradient(135deg,#ffd000,#e6a800)',
            color:!name.trim()||!avatar||saving?'var(--muted)':'#07091f',
            fontSize:15,fontWeight:800,
            fontFamily:'Barlow Condensed,sans-serif',
            letterSpacing:'.06em',textTransform:'uppercase',
            boxShadow:!name.trim()||!avatar?'none':'0 0 24px rgba(255,208,0,.35)',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8,
          }}>
            {saving
              ? <div style={{width:18,height:18,borderRadius:'50%',
                  border:'2.5px solid rgba(7,9,31,.3)',borderTopColor:'#07091f',
                  animation:'spin .8s linear infinite'}}/>
              : 'Guardar cambios ✓'}
          </button>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════
     APP PRINCIPAL
  ══════════════════════════════════════════════════════ */
  function App() {
    /* views: loading | auth | setup | room | screen */
    const [view,       setView]       = useState('loading');
    const [authMode,   setAuthMode]   = useState('login');
    const [email,      setEmail]      = useState('');
    const [password,   setPassword]   = useState('');
    const [authError,  setAuthError]  = useState('');
    const [authLoad,   setAuthLoad]   = useState(false);
    const [profile,    setProfile]    = useState({name:'',avatar:null,color:'#ffd000'});
    const [editOpen,   setEditOpen]   = useState(false);
    const [tab,        setTab]        = useState('sala');
    const [users,      setUsers]      = useState({});
    const [msgs,       setMsgs]       = useState([]);
    const [myAtt,      setMyAtt]      = useState({});
    const [chatIn,     setChatIn]     = useState('');

    const UID     = useRef(null);
    const SID     = useRef(getSID());
    const roomRef = useRef(null);
    const isDrag  = useRef(false);
    const lastT   = useRef(0);
    const endRef  = useRef(null);

    /* ── Auth listener ── */
    useEffect(() => {
      const timeout = setTimeout(() => {
        if (view==='loading') setView('auth');
      }, 8000);

      const unsub = auth.onAuthStateChanged(async user => {
        clearTimeout(timeout);
        if (user) {
          UID.current = user.uid;
          try {
            const snap = await db.ref(`profiles/${user.uid}`).get();
            const p = snap.val();
            if (p && p.name) {
              setProfile(p);
              await joinRoom(user.uid, p);
              setView('room');
            } else {
              // Tiene cuenta pero aún no eligió nombre → setup
              setView('setup');
            }
          } catch(err) {
            console.error(err);
            setView('setup');
          }
        } else {
          UID.current = null;
          setView('auth');
        }
      });

      return () => { clearTimeout(timeout); unsub(); };
    }, []);

    /* ── Listeners Firebase sala ── */
    useEffect(() => {
      if (view!=='room' && view!=='screen') return;
      const sid = SID.current, uid = UID.current;
      if (!uid) return;
      const uRef  = db.ref(`rooms/${sid}/users`);
      const cRef  = db.ref(`rooms/${sid}/chat`);
      const aRef  = db.ref(`attendance/${uid}`);
      uRef.on('value', s => setUsers(s.val()||{}));
      cRef.on('value', s => {
        const v = s.val();
        if(v) setMsgs(Object.entries(v).map(([id,m])=>({id,...m})).sort((a,b)=>(a.ts||0)-(b.ts||0)));
        else setMsgs([]);
      });
      aRef.on('value', s => setMyAtt(s.val()||{}));
      return () => { uRef.off(); cRef.off(); aRef.off(); };
    }, [view]);

    useEffect(() => {
      if (tab==='chat') setTimeout(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),60);
    }, [msgs, tab]);

    /* ── Helpers ── */
    const joinRoom = async (uid, p) => {
      const uRef = db.ref(`rooms/${SID.current}/users/${uid}`);
      await uRef.set({ name:p.name, avatar:p.avatar, color:p.color, x:48, y:48, joinedAt:Date.now() });
      uRef.onDisconnect().remove();
      await db.ref(`attendance/${uid}/${SID.current}`).set({
        name:p.name, avatar:p.avatar, color:p.color, timestamp:Date.now(),
      });
    };

    /* ── Guardar perfil (setup y edición) ── */
    const saveProfile = async (newProfile) => {
      const uid = UID.current;
      await db.ref(`profiles/${uid}`).set(newProfile);
      // Actualizar nombre/avatar en la sala activa
      await db.ref(`rooms/${SID.current}/users/${uid}`).update({
        name:newProfile.name, avatar:newProfile.avatar, color:newProfile.color,
      });
      setProfile(newProfile);
      setEditOpen(false);
      if (view==='setup') {
        await joinRoom(uid, newProfile);
        setView('room');
      }
    };

    /* ── Auth handlers ── */
    const handleEmailAuth = async () => {
      if (!email.trim() || !password) return;
      setAuthLoad(true); setAuthError('');
      try {
        if (authMode==='login') await auth.signInWithEmailAndPassword(email.trim(), password);
        else await auth.createUserWithEmailAndPassword(email.trim(), password);
      } catch(err) {
        setAuthError(getErr(err.code));
        setAuthLoad(false);
      }
    };

    const handleGoogle = async () => {
      setAuthLoad(true); setAuthError('');
      try {
        await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      } catch(err) {
        if (err.code && !['auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(err.code))
          setAuthError(getErr(err.code));
        setAuthLoad(false);
      }
    };

    const handleSignOut = async () => {
      try { await db.ref(`rooms/${SID.current}/users/${UID.current}`).remove(); } catch(e){}
      await auth.signOut();
      setUsers({}); setMsgs([]); setMyAtt({});
    };

    /* ── Drag ── */
    const onDragStart = useCallback(e => { e.preventDefault(); isDrag.current=true; }, []);
    const onDragMove  = useCallback(e => {
      if (!isDrag.current || !roomRef.current) return;
      const now = Date.now();
      if (now-lastT.current<80) return;
      lastT.current = now;
      const rect = roomRef.current.getBoundingClientRect();
      const cx = e.touches?.[0]?.clientX ?? e.clientX;
      const cy = e.touches?.[0]?.clientY ?? e.clientY;
      db.ref(`rooms/${SID.current}/users/${UID.current}`).update({
        x:Math.max(4,Math.min(93,((cx-rect.left)/rect.width)*100)),
        y:Math.max(16,Math.min(92,((cy-rect.top)/rect.height)*100)),
      });
    }, []);
    const onDragEnd = useCallback(() => { isDrag.current=false; }, []);

    const handleSend = () => {
      if (!chatIn.trim()) return;
      const me = users[UID.current];
      if (!me) return;
      const text = chatIn.trim(); setChatIn('');
      db.ref(`rooms/${SID.current}/chat`).push({
        name:me.name, avatar:me.avatar, color:me.color,
        text, time:nowTime(), ts:Date.now(), uid:UID.current,
      });
    };

    const attSessions  = Object.keys(myAtt).sort().reverse();
    const usersArr     = Object.entries(users);
    const streak = (() => {
      if(!attSessions.length) return 0;
      let s=1;
      for(let i=1;i<attSessions.length;i++){
        if((new Date(attSessions[i-1])-new Date(attSessions[i]))/86400000<=10) s++;
        else break;
      }
      return s;
    })();

    /* ── Shared styles ── */
    const pageWrap  = {minHeight:'100vh',background:'var(--navy)',display:'flex',
      alignItems:'center',justifyContent:'center',padding:'20px 16px',
      overflowY:'auto',position:'relative'};
    const cardStyle = {width:'100%',maxWidth:400,position:'relative',zIndex:1,
      background:'linear-gradient(160deg,#0d1035,#0a0c28)',
      border:'1px solid rgba(255,208,0,.15)',borderRadius:20,padding:'28px 24px',
      boxShadow:'0 0 60px rgba(255,208,0,.06),0 8px 40px rgba(0,0,0,.7)',
      animation:'fadeUp .4s ease'};
    const inputStyle = {width:'100%',padding:'12px 14px',borderRadius:10,
      background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,208,0,.15)',
      color:'var(--white)',fontSize:14,fontFamily:'Barlow,sans-serif'};
    const labelStyle = {fontSize:10,fontWeight:700,color:'var(--muted)',
      textTransform:'uppercase',letterSpacing:'.09em',display:'block',marginBottom:6,
      fontFamily:'Barlow Condensed,sans-serif'};
    const btnYellow = (dis) => ({
      width:'100%',padding:13,borderRadius:12,border:'none',
      background:dis?'var(--muted2)':'linear-gradient(135deg,#ffd000,#e6a800)',
      color:dis?'var(--muted)':'#07091f',
      fontSize:15,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
      letterSpacing:'.06em',textTransform:'uppercase',
      boxShadow:dis?'none':'0 0 24px rgba(255,208,0,.35)',
      display:'flex',alignItems:'center',justifyContent:'center',gap:8,transition:'all .2s',
    });

    /* ════ LOADING ════ */
    if (view==='loading') return (
      <div style={{height:'100vh',display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:20,
        background:'var(--navy)',position:'relative',overflow:'hidden'}}>
        <BgTriangles/>
        <div style={{position:'relative',zIndex:1,textAlign:'center'}}>
          <BookLogo size={80}/>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:26,color:'#ffd000',letterSpacing:'.08em',marginTop:10}}>MARANATA CLASS</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Las Condes</div>
          <div style={{marginTop:20,display:'flex',justifyContent:'center'}}>
            <div style={{width:32,height:32,borderRadius:'50%',
              border:'3px solid rgba(255,208,0,.15)',borderTopColor:'#ffd000',
              animation:'spin .8s linear infinite'}}/>
          </div>
        </div>
      </div>
    );

    /* ════ AUTH ════ */
    if (view==='auth') return (
      <div style={pageWrap}>
        <BgTriangles/>
        <div style={cardStyle}>
          <div style={{textAlign:'center',marginBottom:22}}>
            <BookLogo size={70}/>
            <h1 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
              fontSize:28,color:'#ffd000',letterSpacing:'.05em',
              textTransform:'uppercase',lineHeight:1,marginTop:8}}>MARANATA CLASS</h1>
            <p style={{color:'var(--muted)',fontSize:12,marginTop:4}}>Adventista Las Condes</p>
          </div>

          {/* Toggle login/registro */}
          <div style={{display:'flex',background:'rgba(255,255,255,.04)',
            borderRadius:12,padding:4,marginBottom:20,
            border:'1px solid rgba(255,208,0,.1)'}}>
            {[{id:'login',l:'Ingresar'},{id:'register',l:'Registrarse'}].map(t=>(
              <button key={t.id} onClick={()=>{setAuthMode(t.id);setAuthError('');}} style={{
                flex:1,padding:'9px 4px',borderRadius:9,border:'none',
                background:authMode===t.id?'linear-gradient(135deg,#ffd000,#e6a800)':'transparent',
                color:authMode===t.id?'#07091f':'var(--muted)',
                fontSize:13,fontWeight:800,
                fontFamily:'Barlow Condensed,sans-serif',
                letterSpacing:'.04em',textTransform:'uppercase',transition:'all .2s',
              }}>{t.l}</button>
            ))}
          </div>

          <div style={{marginBottom:12}}>
            <label style={labelStyle}>Correo electrónico</label>
            <input type="email" value={email}
              onChange={e=>{setEmail(e.target.value);setAuthError('');}}
              onKeyDown={e=>e.key==='Enter'&&handleEmailAuth()}
              placeholder="tucorreo@gmail.com" style={inputStyle}/>
          </div>

          <div style={{marginBottom:authError?10:18}}>
            <label style={labelStyle}>Contraseña</label>
            <input type="password" value={password}
              onChange={e=>{setPassword(e.target.value);setAuthError('');}}
              onKeyDown={e=>e.key==='Enter'&&handleEmailAuth()}
              placeholder="••••••••" style={inputStyle}/>
          </div>

          {authError && (
            <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',
              borderRadius:8,padding:'10px 12px',marginBottom:14,
              fontSize:12,color:'#fca5a5',lineHeight:1.5}}>
              ⚠️ {authError}
            </div>
          )}

          <button onClick={handleEmailAuth} disabled={authLoad||!email.trim()||!password}
            style={btnYellow(authLoad||!email.trim()||!password)}>
            {authLoad
              ? <div style={{width:18,height:18,borderRadius:'50%',
                  border:'2.5px solid rgba(7,9,31,.3)',borderTopColor:'#07091f',
                  animation:'spin .8s linear infinite'}}/>
              : authMode==='login' ? 'Ingresar →' : 'Crear cuenta →'}
          </button>

          <div style={{display:'flex',alignItems:'center',gap:10,margin:'16px 0'}}>
            <div style={{flex:1,height:1,background:'rgba(255,208,0,.1)'}}/>
            <span style={{fontSize:11,color:'var(--muted)'}}>o continúa con</span>
            <div style={{flex:1,height:1,background:'rgba(255,208,0,.1)'}}/>
          </div>

          <button onClick={handleGoogle} disabled={authLoad} style={{
            width:'100%',padding:12,borderRadius:12,border:'none',
            background:'white',color:'#111',fontSize:14,fontWeight:600,
            display:'flex',alignItems:'center',justifyContent:'center',gap:10,
            boxShadow:'0 2px 14px rgba(0,0,0,.4)',fontFamily:'Barlow,sans-serif',
          }}>
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.4-4z"/>
              <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
              <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.5 26.9 36 24 36c-5.2 0-9.6-2.9-11.3-7.1l-6.6 5.1C9.7 39.6 16.3 44 24 44z"/>
              <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.5 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/>
            </svg>
            Continuar con Google
          </button>
        </div>
      </div>
    );

    /* ════ SETUP (primera vez — solo nombre y avatar) ════ */
    if (view==='setup') return (
      <div style={pageWrap}>
        <BgTriangles/>
        <div style={cardStyle}>
          <div style={{textAlign:'center',marginBottom:20}}>
            <div style={{fontSize:42,marginBottom:8}}>👋</div>
            <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:22,
              color:'#ffd000',textTransform:'uppercase',letterSpacing:'.04em'}}>
              ¡Bienvenido!
            </h2>
            <p style={{color:'var(--muted)',fontSize:13,marginTop:4}}>
              Elige cómo aparecerás en la sala.<br/>
              <span style={{fontSize:11,color:'var(--muted2)'}}>Podrás cambiarlo después cuando quieras.</span>
            </p>
          </div>

          <div style={{marginBottom:14}}>
            <label style={labelStyle}>Nombre en la sala</label>
            <input value={profile.name}
              onChange={e=>setProfile(p=>({...p,name:e.target.value}))}
              placeholder="¿Cómo quieres que te vean?"
              style={inputStyle}/>
          </div>

          <div style={{marginBottom:14}}>
            <label style={labelStyle}>Avatar</label>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6}}>
              {AVATARS.map(a=>(
                <button key={a}
                  onClick={()=>setProfile(p=>({...p,avatar:a}))} style={{
                  background:profile.avatar===a?'rgba(255,208,0,.15)':'rgba(255,255,255,.03)',
                  border:profile.avatar===a?`2px solid ${profile.color}`:'2px solid rgba(255,255,255,.06)',
                  borderRadius:10,padding:'8px 2px',fontSize:20,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  boxShadow:profile.avatar===a?`0 0 14px ${profile.color}55`:'none',
                  transition:'all .15s',
                }}>{a}</button>
              ))}
            </div>
          </div>

          <div style={{marginBottom:22}}>
            <label style={labelStyle}>Color</label>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {COLORS.map(c=>(
                <div key={c} onClick={()=>setProfile(p=>({...p,color:c}))} style={{
                  width:30,height:30,borderRadius:'50%',background:c,cursor:'pointer',
                  border:profile.color===c?'3px solid white':'3px solid transparent',
                  boxShadow:profile.color===c?`0 0 14px ${c}`:'none',transition:'all .15s',
                }}/>
              ))}
            </div>
          </div>

          <button onClick={()=>saveProfile(profile)}
            disabled={!profile.name.trim()||!profile.avatar}
            style={btnYellow(!profile.name.trim()||!profile.avatar)}>
            Entrar a la sala ✨
          </button>
          <p style={{textAlign:'center',marginTop:8,fontSize:11,color:'var(--muted2)'}}>
            Este nombre y avatar quedan guardados para siempre
          </p>
        </div>
      </div>
    );

    /* ════ SCREEN ════ */
    if (view==='screen') return (
      <div style={{width:'100vw',height:'100vh',overflow:'hidden',position:'relative'}}>
        <RoomCanvas users={users} myId={null} onDragStart={null} full={true}/>
        <button onClick={()=>setView('room')} style={{
          position:'fixed',bottom:20,right:20,zIndex:100,
          background:'rgba(7,9,31,.95)',border:'1px solid rgba(255,208,0,.3)',
          color:'#ffd000',padding:'8px 16px',borderRadius:20,fontSize:12,
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'.04em',
        }}>✕ SALIR</button>
      </div>
    );

    /* ════ ROOM ════ */
    return (
      <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'var(--navy)'}}>

        {/* ── Header ── */}
        <div style={{background:'linear-gradient(135deg,#0d1035,#0a0c28)',
          borderBottom:'1px solid rgba(255,208,0,.12)',
          padding:'8px 14px',display:'flex',alignItems:'center',
          justifyContent:'space-between',flexShrink:0}}>

          {/* Logo + título */}
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <svg width="28" height="21" viewBox="0 0 80 60">
              <polygon points="8,54 72,54 58,10" fill="#ffd000"/>
              <g stroke="#07091f" strokeWidth="3.2" fill="none" strokeLinecap="round" strokeLinejoin="round">
                <path d="M28 42 L28 18 Q28 15 31 15 L40 17 L40 42"/>
                <path d="M52 42 L52 18 Q52 15 49 15 L40 17 L40 42"/>
                <path d="M28 42 Q34 40 40 42 Q46 40 52 42"/>
              </g>
            </svg>
            <div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                fontSize:15,color:'#ffd000',letterSpacing:'.05em',
                textTransform:'uppercase',lineHeight:1}}>MARANATA CLASS</div>
              <div style={{fontSize:10,color:'var(--muted)'}}>
                {usersArr.length} en sala · {new Date().toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
              </div>
            </div>
          </div>

          {/* Botones derecha */}
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            {/* Avatar propio + editar */}
            <button onClick={()=>setEditOpen(true)} style={{
              display:'flex',alignItems:'center',gap:6,
              background:'rgba(255,208,0,.06)',
              border:'1px solid rgba(255,208,0,.2)',
              borderRadius:20,padding:'5px 10px',
            }}>
              <span style={{fontSize:16}}>{profile.avatar||'👤'}</span>
              <span style={{fontSize:10,color:'#ffd000',
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                maxWidth:70,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {profile.name||'Yo'}
              </span>
              <span style={{fontSize:9,color:'var(--muted)'}}>✏️</span>
            </button>

            <button onClick={()=>setView('screen')} style={{
              background:'rgba(255,208,0,.08)',border:'1px solid rgba(255,208,0,.2)',
              color:'#ffd000',padding:'6px 10px',borderRadius:20,fontSize:11,
            }}>📺</button>

            <button onClick={handleSignOut} title="Cerrar sesión" style={{
              background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.15)',
              color:'#f87171',padding:'6px 10px',borderRadius:20,fontSize:14,
            }}>↩</button>
          </div>
        </div>

        {/* ── Tabs ── */}
        <div style={{background:'#0a0c28',borderBottom:'1px solid rgba(255,208,0,.07)',
          display:'flex',flexShrink:0}}>
          {[
            {id:'sala',label:'🏠 Sala'},
            {id:'chat',label:'💬 Chat'},
            {id:'asistencia',label:'📊 Asist.'},
            {id:'juegos',label:'🎮 Juegos'},
          ].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1,padding:'10px 4px',background:'none',border:'none',
              fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              color:tab===t.id?'#ffd000':'var(--muted)',
              fontSize:11,letterSpacing:'.04em',textTransform:'uppercase',
              borderBottom:tab===t.id?'2.5px solid #ffd000':'2.5px solid transparent',
              transition:'all .2s',
            }}>{t.label}</button>
          ))}
        </div>

        {/* ── Contenido ── */}
        <div style={{flex:1,overflow:'hidden',position:'relative'}}>

          {/* SALA */}
          {tab==='sala' && (
            <div ref={roomRef}
              onMouseMove={onDragMove} onMouseUp={onDragEnd} onMouseLeave={onDragEnd}
              onTouchMove={onDragMove} onTouchEnd={onDragEnd}
              style={{width:'100%',height:'100%',touchAction:'none',userSelect:'none'}}>
              <RoomCanvas users={users} myId={UID.current}
                onDragStart={onDragStart} full={false}/>
            </div>
          )}

          {/* CHAT */}
          {tab==='chat' && (
            <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
              <div style={{flex:1,overflowY:'auto',padding:'12px 14px',
                display:'flex',flexDirection:'column',gap:10}}>
                {msgs.length===0&&(
                  <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,marginTop:40}}>
                    Sé el primero en escribir 👋
                  </div>
                )}
                {msgs.map(m=>{
                  const isMe=m.uid===UID.current;
                  return (
                    <div key={m.id} style={{display:'flex',gap:10,
                      flexDirection:isMe?'row-reverse':'row',animation:'slideIn .2s ease'}}>
                      <div style={{width:34,height:34,borderRadius:'50%',flexShrink:0,
                        background:`${m.color}22`,border:`1.5px solid ${m.color}`,
                        display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>
                        {m.avatar}
                      </div>
                      <div style={{maxWidth:'72%'}}>
                        <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:3,
                          flexDirection:isMe?'row-reverse':'row'}}>
                          <span style={{fontSize:11,fontWeight:700,color:m.color,
                            fontFamily:'Barlow Condensed,sans-serif'}}>{m.name}</span>
                          <span style={{fontSize:10,color:'var(--muted)'}}>{m.time}</span>
                        </div>
                        <div style={{
                          background:isMe?`${m.color}18`:'rgba(255,255,255,.04)',
                          padding:'8px 12px',
                          borderRadius:isMe?'12px 4px 12px 12px':'4px 12px 12px 12px',
                          fontSize:13,color:'var(--white)',lineHeight:1.5,
                          border:isMe?`1px solid ${m.color}33`:'1px solid rgba(255,255,255,.06)',
                          wordBreak:'break-word',
                        }}>{m.text}</div>
                      </div>
                    </div>
                  );
                })}
                <div ref={endRef}/>
              </div>
              <div style={{padding:'10px 14px 14px',
                borderTop:'1px solid rgba(255,208,0,.07)',display:'flex',gap:8}}>
                <input value={chatIn} onChange={e=>setChatIn(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&handleSend()}
                  placeholder="Escribe algo..."
                  style={{flex:1,padding:'10px 14px',borderRadius:20,
                    background:'rgba(255,255,255,.04)',
                    border:'1px solid rgba(255,208,0,.15)',
                    color:'white',fontSize:13,outline:'none',fontFamily:'Barlow,sans-serif'}}/>
                <button onClick={handleSend} style={{
                  background:'linear-gradient(135deg,#ffd000,#e6a800)',
                  border:'none',borderRadius:20,color:'#07091f',
                  padding:'10px 18px',fontSize:18,fontWeight:900,
                }}>↑</button>
              </div>
            </div>
          )}

          {/* ASISTENCIA */}
          {tab==='asistencia' && (
            <div style={{overflowY:'auto',height:'100%',padding:14}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:18}}>
                {[
                  {label:'Esta clase',    value:usersArr.length, sub:'presentes',        color:'#22d3ee'},
                  {label:'Tu asistencia', value:attSessions.length, sub:'clases este año',color:'#ffd000'},
                  {label:'Racha 🔥',      value:streak,             sub:'semanas seguidas',color:'#fb923c'},
                ].map(st=>(
                  <div key={st.label} style={{background:'rgba(255,255,255,.03)',
                    border:'1px solid rgba(255,255,255,.06)',
                    borderLeft:`3px solid ${st.color}`,borderRadius:12,padding:12}}>
                    <div style={{fontSize:10,color:'var(--muted)',marginBottom:2,
                      fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.05em',
                      textTransform:'uppercase'}}>{st.label}</div>
                    <div style={{fontSize:28,fontFamily:'Barlow Condensed,sans-serif',
                      fontWeight:900,color:st.color,lineHeight:1}}>{st.value}</div>
                    <div style={{fontSize:10,color:'var(--muted2)',marginTop:2}}>{st.sub}</div>
                  </div>
                ))}
              </div>

              <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',
                textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8,
                fontFamily:'Barlow Condensed,sans-serif'}}>Presentes hoy</div>
              {usersArr.map(([uid,u])=>(
                <div key={uid} style={{display:'flex',alignItems:'center',gap:10,
                  background:'rgba(255,255,255,.03)',padding:'8px 12px',
                  borderRadius:10,marginBottom:6,
                  border:`1px solid ${uid===UID.current?u.color+'44':'rgba(255,255,255,.05)'}`}}>
                  <div style={{width:30,height:30,borderRadius:'50%',
                    background:`${u.color}22`,border:`1.5px solid ${u.color}`,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:15,flexShrink:0}}>{u.avatar}</div>
                  <span style={{fontSize:13,color:'white',flex:1}}>
                    {u.name}
                    {uid===UID.current&&<span style={{color:u.color,fontSize:10,marginLeft:4}}>(tú)</span>}
                  </span>
                  <span style={{fontSize:10,color:'#10b981',background:'rgba(16,185,129,.1)',
                    padding:'2px 9px',borderRadius:20,fontFamily:'Barlow Condensed,sans-serif',
                    fontWeight:700}}>✓</span>
                </div>
              ))}

              {attSessions.length>0&&(
                <div style={{marginTop:16}}>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',
                    textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8,
                    fontFamily:'Barlow Condensed,sans-serif'}}>Tu historial</div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {attSessions.slice(0,16).map(sid=>(
                      <div key={sid} style={{background:'rgba(255,255,255,.03)',
                        padding:'8px 10px',borderRadius:10,textAlign:'center',
                        border:'1px solid rgba(16,185,129,.15)'}}>
                        <div style={{fontSize:14,marginBottom:2}}>✅</div>
                        <div style={{fontSize:8,color:'var(--muted)'}}>
                          {new Date(sid+'T12:00:00').toLocaleDateString('es-CL',
                            {day:'numeric',month:'short'})}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* JUEGOS */}
          {tab==='juegos' && (
            <div style={{height:'100%',display:'flex',flexDirection:'column',
              alignItems:'center',justifyContent:'center',
              gap:14,padding:24,textAlign:'center',position:'relative',overflow:'hidden'}}>
              <BgTriangles/>
              <div style={{position:'relative',zIndex:1,display:'flex',
                flexDirection:'column',alignItems:'center',gap:14}}>
                <div style={{fontSize:52,filter:'drop-shadow(0 0 22px rgba(255,208,0,.5))'}}>🎮</div>
                <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:24,
                  fontWeight:900,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.06em'}}>
                  Juegos · Próximamente
                </h2>
                <p style={{color:'var(--muted)',fontSize:13,maxWidth:220,lineHeight:1.6}}>
                  El profe está preparando algo especial 👀
                </p>
                <div style={{background:'rgba(255,208,0,.06)',border:'1px solid rgba(255,208,0,.2)',
                  borderRadius:12,padding:'10px 20px',color:'#ffd000',fontSize:12,
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'.04em'}}>
                  🔒 SALA BLOQUEADA
                </div>
              </div>
            </div>
          )}

        </div>

        {/* ── Modal editar perfil ── */}
        {editOpen && (
          <EditProfileModal
            profile={profile}
            onSave={saveProfile}
            onClose={()=>setEditOpen(false)}
          />
        )}

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
